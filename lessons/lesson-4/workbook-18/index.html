    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">2.</span>1{!GRI|～てもらう|l3-p001-2}、2{!GRI|<ruby>受身形<rt>うけみけい</rt></ruby>|l4-p001-1}、3{!GRI|<ruby>使役形<rt>しえきけい</rt></ruby>|l4-p001-2}、4{!GRI|<ruby>使役形<rt>しえきけい</rt></ruby>＋てあげる／くれる／もらう|l4-p001-2}、5{!GRI|<ruby>使役受身形<rt>しえきうけみけい</rt></ruby>|l4-p001-3}のどの<ruby>形<rt>かたち</rt></ruby>を使う[　]に番号を書き、文を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '母：部屋がめちゃくちゃじゃない！<ruby>片付<rt>かたづ</rt></ruby>けなさい！<br><br>'+
            '私：はーい……。<br><br>'+
            '<i class="fa">&#xf061;</i> [{5}] 母に部屋を片付け{させられまし}た。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　私：日本に留学したいんだけど……。<br><br>'+
            '両親：まだ高校生だから、ダメ！<br><br>'+
            '<i class="fa">&#xf061;</i> [{4}] 両親は留学{させてくれませんでし}た。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　　　　　私：ゴミ<ruby>箱<rt>ばこ</rt></ruby>がいっぱいになっちゃった。ゴミを出してきてくれない？<br><br>'+
            'ルームメート：いいよ。<br><br>'+
            '<i class="fa">&#xf061;</i> [{1}] ルームメートにお<ruby>願<rt>ねが</rt></ruby>いしてゴミを出{してもらいまし}た。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '友達：この車かっこいいね。ちょっと運転してみてもいい？<br><br>'+
            '　私：ちょっとだけなら、いいよ。<br><br>'+
            '<i class="fa">&#xf061;</i> [{4}] 友達に車を運転{させてあげまし}た。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '私：自分が使った皿は自分で<ruby>洗<rt>あら</rt></ruby>いなさい。<br><br>'+
            '弟：はい……。<br><br>'+
            '<i class="fa">&#xf061;</i> [{3}] 弟に皿を洗{わせまし}た。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '私：あれ、ここに<ruby>置<rt>お</rt></ruby>いておいた私のお<ruby>菓子<rt>かし</rt></ruby>がない！<br><br>'+
            '母：ごめん、さっき食べちゃった……。<br><br>'+
            '<i class="fa">&#xf061;</i> [{2}] 母にお菓子を食{べられまし}た。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
