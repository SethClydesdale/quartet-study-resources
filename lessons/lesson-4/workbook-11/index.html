    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ないで済む|l4-p6}」か「{!GRI|～ずに済む|l4-p6}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem"><ruby>先輩<rt>せんぱい</rt></ruby>が家に泊めてくれたから、{ホテルに泊まらない|ホテルにとまらない|answer;hint:staying at a hotel}で済みました。</div>'+
        
        '<div class="problem">図書館に行けば、{本を買わずに済みます|ほんをかわずに済みます|' + Genki.getAlts('{本}を{買}{わずに}{済}{みます}', 'ほん|か|ないで|す|む') + 'answer;hint:it will save you from buying a book;width:250}。</div>'+
        
        '<div class="problem">友達が車で駅まで送ってくれたから、{歩かないで済みました|あるかないですみました|' + Genki.getAlts('{歩}か{ないで}{済}{みました}', 'ある|ずに|す|んだ') + 'answer;hint:it saved me from walking;width:190}。</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ここまでの道、わかりにくかったでしょ？<br><br>'+
            'B：うん。でも、親切な人が教えてくれたから{迷わないで済んだ|まよわないですんだ|' + Genki.getAlts('{迷}わ{ないで}{済}{んだ}', 'まよ|ずに|す|みました') + 'answer;hint:saved me from getting lost;width:220}よ。'+
          '</div>'+
        '</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ネットショッピングって本当に<ruby>便利<rt>べんり</rt></ruby>だよね。<br><br>'+
            'B：うん。{店に買い物に行かないで済む|みせにかいものにいかないですむ|' + Genki.getAlts('{店}に{買}い{物}に{行}か{ないで}{済}む', 'みせ|か|もの|い|ずに|す') + 'answer;hint:It saves you from going shopping at a store;width:320}からね。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
