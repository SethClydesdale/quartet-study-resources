    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">スピーチを聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>ドイツ人留学生のレオンが、クラスで「夏の長期<ruby>休暇<rt>きゅうか</rt></ruby>」についてスピーチをしています。スピーチを聞いて質問に答えなさい。</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba"><ruby>時期<rt>じき</rt></ruby>　season; period</span>'+
      '<span class="kotoba"><ruby>同僚<rt>どうりょう</rt></ruby>　coworkers</span>'+
      '<span class="kotoba"><ruby>迷惑<rt>めいわく</rt></ruby>がかかる　to bother someone</span>'+
      '<span class="kotoba">それでも　still; nevertheless</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|chokai_l4-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l4-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l4-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+ // <span class="ul-color">{!GRI||l4-p}</span>
        '<div class="title reduced center">夏の長期<ruby>休暇<rt>きゅうか</rt></ruby></div>'+
        '　<span class="line">日本もドイツも勤勉な国として知られていますが、働き方は全然違う<span class="ul-color">{!GRI|ような気がします|l4-p2}</span>。</span>'+
        '<span class="line">夏休みに日本の会社でインターンシップをした時、驚いたことがありました。</span><br>'+
        
        '　<span class="line">それは、日本人が長い休みをあまり取らないことです。</span>'+
        '<span class="line">ドイツでは、7月から8月までの間に2～3週間の長い休みを取って、家族と旅行するのが一般的です。</span>'+
        '<span class="line">週2回のアルバイトで<span class="ul-color">{!GRI|さえ|l4-p4}</span>、ちゃんと休みを取ります。</span>'+
        '<span class="line">日本では8月15日ごろの「お<ruby>盆<rt>ぼん</rt></ruby>」という期間に1週間ぐらいの休みがありますが、2～3週間の休みを取るのは難しいそうです。</span><br>'+
        
        '　<span class="line">インターンシップ先の社員の人にどうして長い休みを取らないのか聞いたら、「自分だけ休むのは<ruby>同僚<rt>どうりょう</rt></ruby>に申し訳ない」とか、「自分がいないとできない仕事があるから、<ruby>周<rt>まわ</rt></ruby>りに<ruby>迷惑<rt>めいわく</rt></ruby>がかかる」と言っていました。</span>'+
        '<span class="line">昔と比べたらずいぶん休みが取りやすくなったそうですが、たいていの人は1日の休みを時々取るだけだそうです。</span>'+
        '<span class="line">長い休みを取れ<span class="ul-color">{!GRI|ば|l4-p9}</span>家族とゆっくり<span class="ul-color">{!GRI|旅行できるのに|l4-p9}</span>、と思いますが、日本ではプライベートより仕事を優先する人が多いようです。</span><br>'+
        
        '　<span class="line">まなさんの国ではどうでしょうか。</span>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>スピーチの<ruby>内容<rt>ないよう</rt></ruby>に<ruby>合<rt>あ</rt></ruby>うものに〇/O、合わないものに×/Xをつけなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">{!PLAY|chokai_l4-2|18.8} ({〇|O|answer}) レオンは、ドイツと日本の働き方は同じではないと感じている。</div>'+
      '<div class="problem">{!PLAY|chokai_l4-2|49.8} ({×|X|answer}) レオンは日本でアルバイトをした。</div>'+
      '<div class="problem">{!PLAY|chokai_l4-2|39.6} ({〇|O|answer}) ドイツ人は夏の間によく家族と旅行する。</div>'+
      '<div class="problem">{!PLAY|chokai_l4-2|54.9} ({〇|O|answer}) 日本では、夏に2週間以上の休みを取ることはあまりない。</div>'+
      '<div class="problem">{!PLAY|chokai_l4-2|86.5} ({×|X|answer}) 日本は、今も昔も休みの取りにくさは変わらない。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|chokai_l4-2|67.4} 日本人はどうして長い休みを取らないのですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{自分だけ休むのは同僚に申し訳ない|じぶんだけやすむのはどうりょうにもうしわけない|' + Genki.getAlts('{自分}だけ{休}むのは{同僚}に{申}し{訳}ない', 'じぶん|やす|どうりょう|もう|わけ') + 'answer}し、</div>'+
      '<div class="problem">{自分がいないとできない仕事がある|じぶんがいないとできないしごとがある|' + Genki.getAlts('{自分}がいないと{出来}ない{仕事}がある', 'じぶん|でき|しごと') + 'answer}から、</div>'+
      '<div class="problem">{休むと周りに迷惑がかかると考える|やすむとまわりにめいわくがかかるとかんがえる|' + Genki.getAlts('{休}むと{周}りに{迷惑}がかかると{考}える', 'やす|まわ|めいわく|かんが') + 'answer}からです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|chokai_l4-2|97.6} レオンは、どうして日本人があまり休まないのだと考えていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{日本人はプライベートより仕事を優先する人が多い|にほんじんはプライベートよりしごとをゆうせんするひとがおおい|' + Genki.getAlts('{日本人}はプライベートより{仕事}を{優先}する{人}が{多}い', 'にほんじん|しごと|ゆうせん|ひと|おお') + 'answer}からです。</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('chokai_l4-2', [
      [18.8, 25.8],
      [26.7, 32.6],
      [33.4, 38.5],
      [39.6, 48.9],
      [49.8, 53.9], // 5
      [54.9, 66.2],
      [67.4, 85.5],
      [86.5, 96.4],
      [97.6, 108.8],
      [109.8, 113]
    ]);
    
    // keeps the audio on-screen when the user scrolls out of view
    Genki.stickyAudio.init('static-audio');
