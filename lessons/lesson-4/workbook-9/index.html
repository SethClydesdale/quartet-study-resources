    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～さえ|l4-p4}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">日本語の勉強を始めたばかりの時は{ひらがな|平仮名|answer;hint:hiragana}さえ{書け|かけ|answer;hint:write}なかった。</div>'+
        
        '<div class="problem">今はお金を持っていないので{水さえ買えない|みずさえかえない|' + Genki.getAlts('{水}さえ{買}え{ない}', 'みず|か|ません') + 'answer;hint:can\'t even buy water;width:160}。</div>'+
        
        '<div class="problem">母はパソコンが苦手で、{インターネットの使い方さえ知らない|インターネットのつかいかたさえ知らない|' + Genki.getAlts('インターネットの{使}い{方}さえ{知}{らない}', 'つか|かた|し|りません') + 'answer;hint:doesn\'t even know how to use the internet;width:320}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：週末はどこかに行った？<br><br>'+
            'B：ずっと家にいたんだ。{コンビニにさえ行かなかった|コンビニにさえいかなかった|' + Genki.getAlts('コンビニにさえ{行}{かなかった}', 'い|きませんでした') + 'answer;hint:(I) didn\'t even go to the convenience store;width:300}よ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>風邪<rt>かぜ</rt></ruby>はよくなった？<br><br>'+
            'B：うん。でも、<ruby>昨日<rt>きのう</rt></ruby>は<ruby>頭<rt>あたま</rt></ruby>が痛くて、{立つことさえできなかった|たつことさえできなかった|' + Genki.getAlts('{立}つことさえ{出来}{なかった}', 'た|でき|ませんでした') + 'answer;hint:(I) couldn\'t even stand}よ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：最近、忙しそうだね。<br><br>'+
            'B：うん。{ゆっくりご飯を食べる時間さえない|ゆっくりごはんをたべるじかんさえない|' + Genki.getAlts('ゆっくりご{飯}を{食}べる{時間}さえ{ない}', 'はん|た|じかん|ありません') + 'answer;hint:(I) don\'t even have time to eat a leisurely meal;width:340}よ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
