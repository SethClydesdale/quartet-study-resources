    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l4-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l4-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l4-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section vertical-text-box" style="width:auto;">'+
        '<div class="title reduced center">留学生の日本体験</div>'+
        
        '<p class="text-passage vertical-text paragraph">'+
          '<span class="line" style="font-weight:bold;font-size:20px;">日本でアルバイトを経験して</span><br>'+
          '<span class="line" style="font-weight:bold;">中国人留学生　ワン・メイリン（王美鈴）</span><br><br>'+
        
          '　<span class="line"><span class="ul-color">{!GRI|せっかく|l4-p3}</span>日本に来たので、私はアルバイトをしてみたいと思っていた。</span>'+
          '<span class="line">それで、ホテルのレストランで働くことにした。</span>'+
          '<span class="line">ホテルで働くことにあこがれていたし、敬語の練習になると思ったからだ。</span><br>'+
        
          '　<span class="line">初日は、一日中トレーニングを受けた。</span>'+
          '<span class="line">おじぎや「いらっしゃいませ」「かしこまりました」などのあいさつがきちんとできるようになるまで、何度も練習させられた。</span>'+
          '<span class="line">「アルバイトなのにどうして？」と思ったが、その理由はすぐにわかった。</span>'+
          '<span class="line">それは、アルバイトも社員と同じようにホテルを代表するスタッフの一人としてお客様に接する必要があるからだ。</span>'+
          '<span class="line">どうりで、ホテルで働く人はみんな礼儀正しい<span class="ul-color">{!GRI|わけだ|l4-p8}</span>と思った。</span><br>'+
        
          '　<span class="line">次の日、一日の仕事の内容を説明してもらって、やっとホールに出してもらえることになった。</span>'+
          '<span class="line">実際に働いてみて、ホールの仕事は思った<span class="ul-color">{!GRI|ほど|l4-p7}</span>楽では<span class="ul-color">{!GRI|ない|l4-p7}</span>ことに気が付いた。</span>'+
          '<span class="line">特に苦労したのは、忙しい時も疲れている時も、いつもお客様の様子をよく見て笑顔で対応しなければならないことだった。</span>'+
        '</p>'+
        '<hr class="dashed">'+
        '<p class="text-passage vertical-text paragraph">'+
          '<span class="line">例えば、お客様のグラスの水が少なくなっていたら、頼まれる前に入れに行かなければならない。</span>'+
          '<span class="line">また、<ruby>閉店<rt>へいてん</rt></ruby>時間になっても、お客様が一人でも残っていたら、店の片付けを初めてはいけないという決まりもあった。</span>'+
          '<span class="line">心の中では「早く帰ってくれれ<span class="ul-color">{!GRI|ば|l4-p9}</span>いい<span class="ul-color">{!GRI|のに|l4-p9}</span>……」と思ったが、そんな時でもお客様のことを一番に考えて行動するのが一流のサービスという<span class="ul-color">{!GRI|わけだ|l4-p8}</span>。</span><br>'+
        
          '　<span class="line">それから、日本人の勤勉さもよくわかった。</span>'+
          '<span class="line">社員は仕事が始まる30分前に来て準備をしたり、帰る時間になっても忙しい時は残って他のスタッフを助けたりする。</span>'+
          '<span class="line">アルバイトの学生<span class="ul-color">{!GRI|さえ|l4-p4}</span>、自分から積極的にできることを見つけて熱心に働いていた。</span>'+
          '<span class="line">でも、私が何よりも驚いたのは、お客様が少なくて暇な時でも、おしゃべりをしている人がいなかったことだ。</span>'+
          '<span class="line">日本ではアルバイトのスタッフもきちんと教育されていて、一人一人がプロ意識を持って働いていると感じた。</span><br>'+
        
          '　<span class="line">このアルバイトを通して、私は日本人の礼儀正しさと勤勉さ、そしてサービスについての考え方を知ることができた。</span>'+
          '<span class="line">あこがれて始めたホテルのバイトだったが、これまで知らなかった日本人の<ruby>一面<rt>いちめん</rt></ruby>が学べて、期待以上の<ruby>有意義<rt>ゆういぎ</rt></ruby>な経験となった。</span>'+
        '</p>'+
      '</div>'+
    '</div>'+
    '<br>'+
    
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>{!PLAY|yomimono_l4-2|29.7} <ruby>筆者<rt>ひっしゃ</rt></ruby>はどうしてアルバイト先としてホテルを選んだのですか。理由を2つ書きなさい。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">{ホテルで働くことに憧れていた|ホテルではたらくことにあこがれていた|' + Genki.getAlts('ホテルで{働}くことに{憧}れていた', 'はたら|あこが') + 'answer}からです。</div>'+
      '<div class="problem">{敬語の練習になると思った|けいごのれんしゅうになるとおもった|' + Genki.getAlts('{敬語}の{練習}になると{思}った', 'けいご|れんしゅう|おも') + 'answer}からです。</div>'+
    '</div>'+
        
      '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|yomimono_l4-2|42.5} 「その理由」<small>(行10)</small>の「その」は何を<ruby>指<rt>さ</rt></ruby>しますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{アルバイトなのに、おじぎやあいさつがきちんとできるようになるまで何度も練習させられた|アルバイトなのに、おじぎやあいさつがきちんとできるようになるまでなんどもれんしゅうさせられた|' + Genki.getAlts('アルバイトなのに、お{辞儀}や{挨拶}がきちんと{出来}るようになるまで{何度}も{練習}させられた', 'じぎ|あいさつ|でき|なんど|れんしゅう') + 'answer}ことを指します。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|yomimono_l4-2|107.5} 「お客様の様子をよく見て笑顔で対応しなければならない」<small>(行19～20)</small>とは、例えば、どのようにすることですか。本文の例を使って説明しなさい。</p>'+
    '<div class="indent-block">'+
      'お客様のグラスを見て、水が少なくなっていたら、'+
      '<div class="problem">{お客様に頼まれる前に入れに行く|おきゃくさまにたのまれるまえにいれにいく|' + Genki.getAlts('お{客様}に{頼}まれる{前}に{入}れに{行}く', 'きゃくさま|たの|まえ|い|い') + 'answer}ということです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">4.</span>{!PLAY|yomimono_l4-2|167.3} 日本人の勤勉さについて、筆者が一番驚いたことは何ですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{お客様が少なくて暇な時でも、おしゃべりをしている人がいなかった|おきゃくさまがすくなくてひまなときでも、おしゃべりをしているひとがいなかった|' + Genki.getAlts('お{客様}が{少}なくて{暇}な{時}でも、お{喋}りをしている{人}がいなかった', 'きゃくさま|すく|ひま|とき|しゃべ|ひと') + 'answer}ことです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">5.</span>{!PLAY|yomimono_l4-2|188.7} 筆者はレストランのアルバイトをして、何を知ることができましたか。3つ書きなさい。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">日本人の{礼儀正しさ|れいぎただしさ|answer;width:250}</div>'+
      '<div class="problem">日本人の{勤勉さ|きんべんさ|answer;width:250}</div>'+
      '<div class="problem">日本人の{サービスについての考え方|サービスについてのかんがえかた|answer;width:250}</div>'+
    '</div>'
    });
