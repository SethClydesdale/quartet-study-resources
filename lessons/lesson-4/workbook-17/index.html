    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span>{!GRI|<ruby>受身形<rt>うけみけい</rt></ruby>|l4-p001-1}か「{!GRI|～てもらう|l3-p001-2}」を使って文を書き換えなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '私が寝ている間に、母が彼からのメッセージを読みました。<br><br>'+
            '<i class="fa">&#xf061;</i> 寝ている間に、{母に彼からのメッセージを読まれました|ははにかれからのメッセージをよまれました|' + Genki.getAlts('{母}に{彼}からのメッセージを{読}まれました', 'はは|かれ|よ') + 'answer}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '<ruby>昨日<rt>きのう</rt></ruby>学校から帰る時、急に雨が<ruby>降<rt>ふ</rt></ruby>って大変でした。<br><br>'+
            '<i class="fa">&#xf061;</i> 昨日学校から帰る時、急に{雨に降られて|あめにふられて|' + Genki.getAlts('{雨}に{降}られて', 'あめ|ふ') + 'answer}、大変でした。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '私は漢字が読めませんでした。友達が私に読み方を教えました。<br><br>'+
            '<i class="fa">&#xf061;</i> 漢字が読めなかった時、友達に読み方を{教えてもらいました|おしえてもらいました|answer}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '<ruby>宮崎駿<rt>みやざきはやお</rt></ruby>が「となりのトトロ」という映画を作りました。<br><br>'+
            '<i class="fa">&#xf061;</i> {「となりのトトロ」という映画は宮崎駿によって作られました|「となりのトトロ」というえいがはみやざきはやおによってつくられました|' + Genki.getAlts('「となりのトトロ」という{映画}は{宮崎駿}によって{作}られました', 'えいが|みやざきはやお|つく') + 'answer}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
