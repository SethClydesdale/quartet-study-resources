    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～わけだ|l4-p8}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>田中<rt>たなか</rt></ruby>さんはベジタリアンだそうですよ。<br><br>'+
            'B：ああ、だから{肉を食べない|にくをたべない|' + Genki.getAlts('{肉}を{食}べない', 'にく|た') + 'answer;hint:doesn\'t eat meat;width:140}わけですね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：今晩、台風が来るそうですよ。<br><br>'+
            'B：ああ、どうりで{風が強くなってきたわけです|かぜがつよくなってきたわけです|' + Genki.getAlts('{風}が{強}くなってきたわけです', 'かぜ|つよ') + 'answer;hint:that\'s why the wind is getting stronger;width:280}ね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ジョージと<ruby>絵理<rt>えり</rt></ruby>ちゃん、最近けんかしたらしいよ。<br><br>'+
            'B：どうりで、{二人は最近一緒にいないわけだ|ふたりはさいきんいっしょにいないわけだ|' + Genki.getAlts('{二人}は{最近}{一緒}にいないわけだ', 'ふたり|さいきん|いっしょ') + 'answer;hint:that\'s why both of them haven\'t been together recently;width:400}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：おはよう、すごく<ruby>眠<rt>ねむ</rt></ruby>そうだね。<br><br>'+
            'B：うん。<ruby>経済<rt>けいざい</rt></ruby>のレポートを書くのに、朝の7時までかかったんだ。<br><br>'+
            'A：じゃあ、<ruby>昨日<rt>きのう</rt></ruby>は、{全然寝られなかったわけ|ぜんぜんねられなかったわけ|' + Genki.getAlts('{全然}{寝}られなかったわけ', 'ぜんぜん|ね') + 'answer;hint:that\'s why you couldn\'t sleep at all;width:270}？大変だったね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '日本の<ruby>人口<rt>じんこう</rt></ruby>は2040年には約1<ruby>憶<rt>おく</rt></ruby>人になり、2065年には約9000万人になると言われている。<br><br>'+
            'つまり、{日本の人口はどんどん少なくなっていくわけだ|にほんのじんこうはどんどんすくなくなっていくわけだ|' + Genki.getAlts('{日本}の{人口}はどんどん{少}なくなっていくわけだ', 'にほん|じんこう|すく') + 'answer;hint:that means Japan\'s population will keep on steadily decreasing;width:450}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
