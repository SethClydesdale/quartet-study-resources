        "企業|きぎょう": "company|兄は<ruby>大<rt>だい</rt></ruby><strong class='main-color'><ruby>企業<rt>きぎょう</rt></ruby></strong>に就職した。", // 企

        "採用|さいよう": "hiring; employment|あの会社は、新卒しか<strong class='main-color'><ruby>採用<rt>さいよう</rt></ruby>しない</strong>。", // 採
        "採る|とる": "to employ; to adopt", 
        "練習|れんしゅう": "practice|漢字の<strong class='main-color'><ruby>練習<rt>れんしゅう</rt></ruby></strong>をしましょう。", // 練

        "接客|せっきゃく": "service|彼女の主な仕事は<strong class='main-color'><ruby>接客<rt>せっきゃく</rt></ruby></strong>だよ。", 
        "礼儀正しい|れいぎただしい": "polite; well-mannered|あの女がカッコイイし<strong class='main-color'><ruby>礼儀正<rt>れいぎただ</rt></ruby>しい</strong>しそれにすっごく強いよ。", // 儀
        "内容|ないよう": "description; content|詳しい<strong class='main-color'><ruby>内容<rt>ないよう</rt></ruby></strong>は、添付書類を見てください。", // 容

        "労わる|いたわる": "to take good care of|陛下からのお言葉もあったが<ruby>改<rt>あらた</rt></ruby>めて<strong class='main-color'><ruby>労<rt>いた</rt></ruby>わせて</strong>もらおう。", 
        "対応|たいおう": "serving; response|彼はいつも素早い<strong class='main-color'><ruby>対応<rt>たいおう</rt></ruby></strong>をするね。", // 応
        "応える|こたえる": "to respond|客からの<ruby>要望<rt>ようぼう</rt></ruby>に<strong class='main-color'><ruby>応<rt>こた</rt></ruby>えた</strong>。", 
        "依頼|いらい": "request; ask|彼に協力を<strong class='main-color'><ruby>依頼<rt>いらい</rt></ruby>しました</strong>。", // 頼
        "頼む|たのむ": "to request; to ask|教授に講演を<strong class='main-color'><ruby>頼<rt>たの</rt></ruby>んだ</strong>。", 
        "断片|だんぺん": "fragment|その時の記憶が<strong class='main-color'><ruby>断片<rt>だんぺん</rt></ruby></strong><ruby>的<rt>てき</rt></ruby>によみがえる。", // 片
        "片付け|かたづけ": "cleaning up|部屋を<strong class='main-color'><ruby>片付<rt>かたづ</rt></ruby>けなさい</strong>。", 
        "勤勉さ|きんべんさ": "diligence|少しは彼女の<strong class='main-color'><ruby>勤勉<rt>きんべん</rt></ruby>さ</strong>を見習ったらどうだ。", // 勤

        "熱心に|ねっしんに": "enthusiastically|彼女は4年間<strong class='main-color'><ruby>熱心<rt>ねっしん</rt></ruby>に</strong>勉強した。", // 熱
