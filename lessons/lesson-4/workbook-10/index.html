    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～さえ～ば|l4-p4}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">{申し込み|もうしこみ|answer;hint:Apply}さえ{すれ}ば、だれでもこのイベントに参加できます。</div>'+
        
        '<div class="problem">{いい友達さえいれば|いいともだちさえいれば|answer;hint:As long as you have a good friend;width:250}、楽しい学生生活が送れると思う。</div>'+
        
        '<div class="problem">{毎回宿題を出してさえいれば|まいかいしゅくだいをだしてさえいれば|' + Genki.getAlts('{毎回}{宿題}を{出}してさえいれば', 'まいかい|しゅくだい|だ') + 'answer;hint:If you just hand in your homework every time;width:340}、この授業は単位がもらえるはずです。</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：週末<ruby>中国<rt>ちゅうごく</rt></ruby>に行くんだけど、中国語がわからないから心配だなあ。<br><br>'+
            'B：<ruby>看板<rt>かんばん</rt></ruby><small>(sign)</small>は全部漢字で書かれているから、{漢字さえわかれば|かんじさえわかれば|' + Genki.getAlts('{漢字}さえ{分}かれば', 'かんじ|わ') + 'answer;hint:as long as you understand kanji;width:250}、<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>だよ。'+
          '</div>'+
        '</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：出かける準備できた？<br><br>'+
            'B：もうちょっと。あと、{窓さえ閉めれば|まどさえしめれば|' + Genki.getAlts('{窓}さえ{閉}めれば', 'まど|し') + 'answer;hint:if I just close the window;width:190}、すぐ出かけられるよ。'+
          '</div>'+
        '</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：昨日、経済の授業のプレゼン<small>(presentation)</small>なんだ。<ruby>緊張<rt>きんちょう</rt></ruby>するなあ。<br><br>'+
            'B：{練習さえすれば、大丈夫だ|れんしゅうさえすれば、だいじょうぶだ|' + Genki.getAlts('{練習}さえすれば、{大丈夫}だ', 'れんしゅう|だいじょうぶ') + 'answer;hint:You\'ll be fine as long as you practice}よ。がんばって。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
