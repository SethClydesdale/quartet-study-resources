    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l4-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l4-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l4-1" class="chokai-script dialogue AB noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">座談会 ～留学を語る～</div>'+
        '　<span class="line">現在、日本に留学しているフランス人のサラ・ゴミスさん、<ruby>韓国人<rt>かんこくじん</rt></ruby>のパク・ジフンさん、そしてアメリカへの留学経験がある日本人大学生の<ruby>本田研<rt>ほんだけん</rt></ruby>さんと<ruby>高橋美希<rt>たかはしみき</rt></ruby>さんの4人に、留学してよかったことと、留学で気を付けるべきことについて、話し合ってもらいました。</span><br><br>'+
        
        '――<span class="line">留学のよい点は？</span><br><br>'+
        
        '<div class="section">'+
          '<div class="name">ゴミス</div>'+
          '<div class="text">'+
            '<span class="line">やっぱり日本語がどんどんうまくなることかなと思います。</span>'+
            '<span class="line">これは私自身、日本に来て<span class="ul-color">{!GRI|以来|l4-p1}</span>ずっと感じていることです。</span>'+
            '<span class="line">日本にいると日常生活の中で日本語を使わなければいけないので、特に「話す」「聞く」については慣れるのが早い<span class="ul-color">{!GRI|ような気がします|l4-p2}。</span></span>'+
            '<span class="line">それから、日本人と気軽に交流ができることも<ruby>魅力<rt>みりょく</rt></ruby>です。</span>'+
          '</div>'+
        '</div>'+
        
        '<div class="section">'+
          '<div class="name">パク</div>'+
          '<div class="text">'+
            '<span class="line">僕もそう思います。</span>'+
            '<span class="line">他の国の言語や文化を学ぶ時に一番重要なのは、何よりも実際に経験することです。</span>'+
            '<span class="line">僕は日本の政治や歴史に興味があるので、<ruby>広島<rt>ひろしま</rt></ruby>の<ruby>原爆<rt>げんばく</rt></ruby>ドームに行ったり、日本人の意見を聞いたりしています。</span>'+
            '<span class="line">自分から積極的に行動すればするほど、日本のことをもっと深く知ることができ、それが留学の魅力だと実感しています。</span>'+
          '</div>'+
        '</div>'+
        
        '<div class="section">'+
          '<div class="name">高橋</div>'+
          '<div class="text">'+
            '<span class="line">一番のメリットは、多様な価値観に触れられることだと思います。</span>'+
            '<span class="line">例えば、私が留学していたアメリカの大学の寮には世界中から人が集まっていたので、様々な意見が聞けました。</span>'+
            '<span class="line">それに、日本とは違う生活様式や習慣が体験できたのもよかったです。</span>'+
            '<span class="line">このような経験を通じて、日本や自分自身を初めて外から見られるようになったと思います。</span>'+
          '</div>'+
        '</div>'+
        
        '<div class="section">'+
          '<div class="name">本田</div>'+
          '<div class="text">'+
            '<span class="line">僕も同じ意見です。</span>'+
            '<span class="line">留学して様々な経験を積むことで、自分の視野を広げることができると思います。</span>'+
            '<span class="line">それに、以前と比べると自分に自信がついた<span class="ul-color">{!GRI|ような気もします|l4-p2}</span>。</span>'+
          '</div>'+
        '</div><br>'+
        
        '――<span class="line">では、留学で気を付けるべきことは？</span><br><br>'+
        
        '<div class="section">'+
          '<div class="name">パク</div>'+
          '<div class="text">'+
            '<span class="line">留学する時に問題になるのは、何と言ってもお金のことでしょう。</span>'+
            '<span class="line">授業料だけでなく、日本での生活費も考えて、十分なお金を用意しておく必要があります。</span>'+
            '<span class="line">それから、<span class="ul-color">{!GRI|せっかく|l4-p3}</span>お金をかけて留学しているのに母語で話す人がいるのは非常に残念です。</span>'+
            '<span class="line">「留学<span class="ul-color">{!GRI|さえ|l4-p4}</span>すれ<span class="ul-color">{!GRI|ば|l4-p4}</span>、その国の言葉が自然に話せるようになる」という考えは正しくないかと。</span>'+
            '<span class="line">お金や時間をむだにしたくなければ、日本語で話すようにすべきです。</span>'+
          '</div>'+
        '</div>'+
        
        '<div class="section">'+
          '<div class="name">ゴミス</div>'+
          '<div class="text">'+
            '<span class="line">確かにそうかもしれません。</span>'+
            '<span class="line">でも、私は日本に来<span class="ul-color">{!GRI|たばかり|l4-p5}</span>の時、言葉の問題でうまく気持ちが伝えられず、ストレスを感じることが多かったです。</span>'+
            '<span class="line">それに、授業にもなかなかついていけず、成績が心配で……。</span>'+
            '<span class="line">自分の国の人としか話さないのはもちろんよくないことかもしれませんが、時には自分の国の人と一緒に時間を過ごすのもいいと思います。</span>'+
            '<span class="line">そうすれば、遠い国で生活していてもホームシックになら<span class="ul-color">{!GRI|ずに済みます|l4-p6}</span>。</span>'+
          '</div>'+
        '</div>'+
        
        '<div class="section">'+
          '<div class="name">本田</div>'+
          '<div class="text">'+
            '<span class="line">僕は留学した後で、卒業が遅れてしまうかもしれないということに気が付いて……。</span>'+
            '<span class="line">というのは、留学生はアメリカ人の学生<span class="ul-color">{!GRI|ほど|l4-p7}</span>自由に授業が取れ<span class="ul-color">{!GRI|ない|l4-p7}</span>場合もあるからです。</span>'+
            '<span class="line">だから、留学先で自分の計画どおりに単位が取れるかどうか、事前に必ず調べたほうがいいと思いました。</span>'+
          '</div>'+
        '</div>'+
        
        '<div class="section">'+
          '<div class="name">高橋</div>'+
          '<div class="text">'+
            '<span class="line">日本人学生が注意すべき点は、留学の時期と日本での就職活動の時期が重なってしまうことでしょう。</span>'+
            '<span class="line">日本の交換留学プログラムの多くは3年生が対象ですが、就活を本格的に始めるのも3年生の時です。</span>'+
            '<span class="line">それに、日本の就活は海外とは大きく異なり、企業は在学中の学生を優先的に採用します。</span>'+
            '<span class="line">つまり、3年生の時に海外に1年間留学すると、就活の期間が短くなってしまうという<span class="ul-color">{!GRI|わけです|l4-p8}</span>。</span>'+
            '<span class="line">だから、留学中も興味がある企業の情報を集めるなど、帰国後の就活のために準備しておくことが必要だと思います。</span>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    
    '<p class="sectionDesc"><span class="sectionNumber">1.</span> 留学について、4人の学生はそれぞれどんな意見を持っていますか。意見の違いに気を付けながら、下のまとめを完成させなさい。</p>'+
    '<div class="indent-block">'+
      '<span class="color-tag">A</span><strong>よい点</strong><br><br>'+
      '<div class="problem"><span class="sm-label">ゴミス</span>　&bull; {!PLAY|yomimono_l4-1|35.7} 日本語が{どんどんうまくなる|どんどん上手くなる|answer}こと</div>'+
      '<div class="problem"><span class="sm-label">パク</span>　&bull; {!PLAY|yomimono_l4-1|83.5} 自分から{積極的に|せっきょくてきに|answer}行動すればするほど、日本のことをもっと{深く知る|ふかくしる|' + Genki.getAlts('{深}く{知}る', 'ふか|し') + 'answer}ことができること</div>'+
      '<div class="problem">'+
        '<span class="sm-label"><ruby>高橋<rt>たかはし</rt></ruby></span>　&bull; {!PLAY|yomimono_l4-1|94.2} {多様な価値観|たようなかちかん|' + Genki.getAlts('{多様}な{価値観}', 'たよう|かちかん') + 'answer}に触れられること<br><br>'+
        '<span class="sm-label"></span>　&bull; {!PLAY|yomimono_l4-1|116.6} 日本や自分自信を{外から見られる|そとからみられる|' + Genki.getAlts('{外}から{見}られる', 'そと|み') + 'answer}ようになること'+
      '</div>'+
      '<div class="problem">'+
        '<span class="sm-label"><ruby>本田<rt>ほんだ</rt></ruby></span>　&bull; {!PLAY|yomimono_l4-1|127.3} 経験を積んで、自分の{視野を広げる|しやをひろげる|' + Genki.getAlts('{視野}を{広}げる', 'しや|ひろ') + 'answer}ことができること<br><br>'+
        '<span class="sm-label"></span>　&bull; {!PLAY|yomimono_l4-1|134.3} 自分に{自信|じしん|answer}がつくこと'+
      '</div>'+
        
      '<span class="color-tag">B</span><strong>気を付けるべきこと</strong><br><br>'+
      '<div class="problem"><span class="sm-label">パク</span>　&bull; {!PLAY|yomimono_l4-1|144.8} 留学する時に問題になるのは{お金の|おかねの|answer}こと</div>'+
      '<div class="problem"><span class="sm-label">ゴミス</span>　&bull; {!PLAY|yomimono_l4-1|181.3} 気持ちが伝えられなくて{ストレス}を感じることが多いこと</div>'+
      '<div class="problem"><span class="sm-label">本田</span>　&bull; {!PLAY|yomimono_l4-1|214.5} 卒業が{遅れてしまう|おくれてしまう|answer}かもしれないこと</div>'+
      '<div class="problem"><span class="sm-label">高橋</span>　&bull; {!PLAY|yomimono_l4-1|240.4} 日本の場合は、{留学|りゅうがく|answer}の時期と{就職活動|しゅうしょくかつどう|answer}の時期が重なってしまうこと</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|yomimono_l4-1|45.8} ゴミスさんは、留学すると特に何が早く上手になると言っていますか。それはどうしてですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">'+
        '{話すことと聞く|はなすことときく|' + Genki.getAlts('{話}すことと{聞}く', 'はな|き') + 'answer}ことです。<br><br>'+
        '{日本にいると、日常生活の中で日本語を使わなければいけない|にほんにいると、にちじょうせいかつのなかでにほんごをつかわなければいけない|' + Genki.getAlts('{日本}にいると、{日常生活}の{中}で{日本語}を{使}わなければいけない', 'にほん|にちじょうせいかつ|なか|にほんご|つか') + 'answer}からです。'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|yomimono_l4-1|99.9} 「このような経験」<small>(行21)</small>とは、どのような経験ですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">'+
        '{世界中の人の様々な意見が聞け|せかいじゅうのひとのさまざまないけんがきけ|' + Genki.getAlts('{世界中}の{人}の{様々}な{意}見が{聞}け', 'せかいじゅう|ひと|さまざま|いけん|き') + 'answer}たり、<br><br>'+
        '{日本とは違う生活様式や習慣を経験できたりした|にほんとはちがうせいかつようしきやしゅうかんをけいけんできたりした|' + Genki.getAlts('{日本}とは{違}う{生活様式}や{習慣}を{経験}{出来}たりした', 'にほん|ちが|せいかつようしき|しゅうかん|けいけん|でき') + 'answer}ことです。'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">4.</span>{!PLAY|yomimono_l4-1|197} ゴミスさんは、ホームシックになりたくなかったら何をしたほうがいいと考えていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{時には自分の国の人と一緒に時間を過ごしたほうがいいと考えています|ときにはじぶんのくにのひとといっしょにじかんをすごしたほうがいいとかんがえています|' + Genki.getAlts('{時}には{自分}の{国}の{人}と{一緒}に{時間}を{過}ごした{方}がいいと{考}えて{い}{ます}', 'とき|じぶん|くに|ひと|いっしょ|じかん|す|ほう|かんが||る') + 'answer}。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">5.</span>{!PLAY|yomimono_l4-1|259.1} 日本の就活が海外の就活と違うのはどのような点ですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{企業が在学中の学生を優先的に採用する|きぎょうがざいがくちゅうのがくせいをゆうせんてきにさいようする|' + Genki.getAlts('{企業}が{在学中}の{学生}を{優先的}に{採用}する', 'きぎょう|ざいがくちゅう|がくせい|ゆうせんてき|さいよう') + 'answer}点です。</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('yomimono_l4-1', [
