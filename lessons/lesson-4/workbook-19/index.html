          '母に「子どもは運動をしたほうがいい」と<span class="problem">【{言われて|!I言ってくれて／言われて／言わされて|spacer:alpha}】</span>、'+

        '</div>'+
      '</div><br><br>'+
        
      '<div class="indent-block">'+
        '<strong>2.</strong><br><br>'+
        '<div class="count-problems indent-block">'+

          '<ruby>将来<rt>しょうらい</rt></ruby>自分の子どもにも<span class="problem">【{食べさせてあげたい|!I食べさせられたい／食べさせてあげたい／食べてあげたい|spacer:alpha}】</span>。'+
        '</div>'+
