    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span><span class="sub-section inline nospacing">　　</span>の言葉をを使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。必要なら<ruby>形<rt>かたち</rt></ruby>を変えなさい。同じ言葉は一度しか使えません。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="sub-section inline">'+
          '　{!GRI|～以来|l4-p1}　　{!GRI|～ずに済む|l4-p6}　　{!GRI|～ような気がする|l4-p2}　　{!GRI|～たばかり|l4-p5}　　{!GRI|～わけ|l4-p8}　'+
        '</div><br><br>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ねえ、この問題の答え、これでいいと思う？<br><br>'+
            'B：うーん、それでいい{%(ような/)気がする|%(ような/)きがする|answer}けど、先生に聞いたほうがいいよ。'+
          '</div>'+
        '</div>'+
                
        '<div class="problem">インドネシア語はまだ習い始め{たばかりな}ので、簡単なあいさつしかできません。</div>'+
                
        '<div class="problem">地図アプリを使ったら、道に迷{わずに済む|わずにすむ|answer}だろう。</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>高田<rt>たかだ</rt></ruby>さんはパーティーに車で来たそうだよ。<br><br>'+
            'B：だから、今日はお酒を飲{んでいないわけだ}。'+
          '</div>'+
        '</div>'+
                
        '<div class="problem">一人<ruby>暮<rt>ぐ</rt></ruby>らしを始め{て以来|ていらい|answer}、コンビニに行くことが多くなった。</div>'+
      '</div><br>'+
        
        
      '<p class="sectionDesc"><span class="sectionNumber">2.</span><span class="sub-section inline nospacing">　　</span>から一番いい言葉を選んで、<span class="ul-color">正しい<ruby>形<rt>かたち</rt></ruby>にして</span>。同じ言葉は一度しか使えません。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="sub-section inline">'+
          '　ある　　いる　　お金　　する　　食べる　　<ruby>復習<rt>ふくしゅう</rt></ruby>　'+
        '</div><br><br>'+
                
        '<div class="problem">{お金|おかね|answer}さえ{あれ}ば幸せだと言う人もいる。</div>'+
                
        '<div class="problem">今度の試験はよく{復習|ふくしゅう|answer}さえ{すれ}ば、<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>だろう。</div>'+
                
        '<div class="problem">毎日いろいろな食べ物をバランスよく{食べて|たべて|answer}さえ{いれ}ば、病気にならないだろう。</div>'+
      '</div>'
    });
