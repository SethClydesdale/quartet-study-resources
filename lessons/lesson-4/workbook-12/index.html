    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ほど～ない|l4-p7}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。(1)～(3)は絵を見て答えなさい。</p>'+
        
      '<div class="center">{!IMG|l4-workbook-12.png}</div><br>'+
        
      '<div class="count-problems">'+
        '<div class="problem"><ruby>富士山<rt>ふじさん</rt></ruby>は{エベレスト}ほど{高く|たかく|answer}ない。</div>'+
        
        '<div class="problem">{北海道|ほっかいどう|answer}は、{アラスカ}ほど{寒く|さむく|answer}ない。</div>'+
        
        '<div class="problem">{アメリカは中国ほど人口が多くない|アメリカはちゅうごくほどじんこうがおおくない|' + Genki.getAlts('アメリカは{中国}ほど{人口}が{多}く{ない}', 'ちゅうごく|じんこう|おお|ありません') + 'answer}。</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：テレビで見たんだけど、日本語は英語<ruby>話者<rt>わしゃ</rt></ruby>にとって難しい言語の一つらしいね。<br><br>'+
            'B：でも、{中国語ほど難しくない|ちゅうごくごほどむずかしくない|' + Genki.getAlts('{中国語}ほど{難}しくない', 'ちゅうごくご|むずか') + 'answer;hint:it\'s not as difficult as Chinese}と思うよ。<br><br>'+
            '<span class="hidden">B：</span>漢字が少ないし、発音が簡単だから。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">なっとうは、{みんなが言うほどまずくない|みんながいうほどまずくない|' + Genki.getAlts('みんなが{言}うほど{不味}く{ない}', 'い|まず|ありません') + 'answer;hint:not as bad as everyone says;width:220}。</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：カプセルホテル<small>(capsule hotel)</small>に泊まったんだって？どうだった？<br><br>'+
            'B：{思ったほどせまくなかった|おもったほどせまくなかった|' + Genki.getAlts('{思}ったほど{狭}く{なかった}', 'おも|せま|ありませんでした') + 'answer;hint:It wasn\'t as cramped as I thought;width:250}よ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
