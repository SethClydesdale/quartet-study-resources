    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd">'+
      '<span class="sectionNumber3rd fa">&#xf054;</span>レストランの店長が、今日からアルバイトを始める留学生のレオンに、仕事の内容について説明しています。会話を聞いて、レオンがやることに〇/Oをつけなさい。'+
    '</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba"><ruby>手<rt>て</rt></ruby>をふく　to wipe hands</span>'+
      '<span class="kotoba">わたす　to hand over</span>'+
      '<span class="kotoba">チャイム　bell</span>'+
      '<span class="kotoba"><ruby>鳴<rt>な</rt></ruby>る　to ring</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|chokai_l4-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l4-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l4-1" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">アルバイトの<ruby>初日<rt>しょにち</rt></ruby></div>'+
        '<div class="line">'+
          '<div class="name">店長</div>'+
          '<div class="text">今から接客の仕方について説明します。これが接客マニュアルです。いろいろ書いてあるけど、とりあえず今から言うことができるようにしてください。チェックしながら聞いてね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">レオン</div>'+
          '<div class="text">はい、お願いします。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">まず、お客様を席に案内したら、すぐにお水とおしぼりを持っていってください。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">レ</div>'+
          '<div class="text">あの、すみません、おしぼりって何ですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">このぬれた小さいタオルのことです。食べる前や食べている時に、手をふくのに使います。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">レ</div>'+
          '<div class="text">へえ、<ruby>洗<rt>あらい</rt></ruby>いに行か<span class="ul-color">{!GRI|ずに済む|l4-p6}</span>から、いいですね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">おしぼりはお客様一人ずつに、広げてわたしてください。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">レ</div>'+
          '<div class="text">わかりました。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">次に、メニューを開いて、お客様にわたしてください。そして、「ご注文が決まりましたら、こちらのボタンでお<ruby>呼<rt>よ</rt></ruby>びください」と言って、<ruby>戻<rt>もど</rt></ruby>ってきてください。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">レ</div>'+
          '<div class="text">はい……あ、あの、「ボタン」って何のことですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">ああ、このテーブルの上にあるボタンのことです。お客様がこれを<ruby>押<rt>お</rt></ruby>すとチャイムが<ruby>鳴<rt>な</rt></ruby>って、あそこの<ruby>番号<rt>ばんごう</rt></ruby>のランプがつきます。</div>'+
        '</div>'+
        '<div class="line">'+ 
          '<div class="name">レ</div>'+
          '<div class="text">ああ、そうなんですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">番号のランプがついたら、すぐにその番号のテーブルに注文を取りに行ってください。お待たせしないようにしてくださいね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">それと、もう一つ、お客様が少ない時は、できるだけお客様のテーブルを回って、コップに水を入れるようにしてください。お客様に言われる前に行動することが大切です。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">レ</div>'+
          '<div class="text">わかりました。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">じゃあ、入っ<span class="ul-color">{!GRI|たばかり|l4-p5}</span>だから大変かもしれないけど、がんばってください。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">レ</div>'+
          '<div class="text">はい、がんばります。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
    
        
    '<div class="sub-section text-passage count-problems">'+
      '<div class="title reduced center">接客マニュアル</div>'+
        
      '<strong class="main-color"><i class="fa">&#xf105;</i> お客様を席に案内する</strong><br>'+
      '<div class="indent-block">'+
        '<span class="problem">{!PLAY|chokai_l4-1|42.4} ({〇|O|answer}) 水とおしぼりを出す：おしぼりは広げてわたす。</span>'+
      '</div><br>'+
        
      '<strong class="main-color"><i class="fa">&#xf105;</i> メニューをわたす</strong><br>'+
      '<div class="indent-block">'+
        '<span class="problem">{!PLAY|chokai_l4-1|72.1} ({||width:21}) メニューの説明：<ruby>本日<rt>ほんじつ</rt></ruby>のおすすめ、当店のおすすめを伝えるようにする。</span>'+
        '<span class="problem">{!PLAY|chokai_l4-1|72.1} ({〇|O|answer}) 「ご注文が決まりましたら、お<ruby>呼<rt>よ</rt></ruby>びください」と伝え、<ruby>戻<rt>もど</rt></ruby>る。</span>'+
      '</div><br>'+
        
      '<strong class="main-color"><i class="fa">&#xf105;</i> 注文を取る</strong><br>'+
      '<div class="indent-block">'+
        '<span class="problem">{!PLAY|chokai_l4-1|72.1} ({||width:21}) お客様がメニューから顔を<ruby>上<rt>あ</rt></ruby>げたら、「ご注文はお決まりでしょうか」と声をかける。</span>'+
        '<span class="problem">{!PLAY|chokai_l4-1|105.7} ({〇|O|answer}) ボタンでお客様に呼ばれたらすぐ行く：お客様をお待たせしない。</span>'+
        '<span class="problem">{!PLAY|chokai_l4-1|42.4} ({||width:21}) 席に案内した時にお客様の注文が決まっていたら、その時に聞いてもいい。</span>'+
        '<span class="problem">{!PLAY|chokai_l4-1|105.7} ({||width:21}) 注文を<ruby>繰<rt>く</rt></ruby>り<ruby>返<rt>かえ</rt></ruby>し、間違いがないか<ruby>確認<rt>かくにん</rt></ruby>する。</span>'+
      '</div><br>'+
        
      '<strong class="main-color"><i class="fa">&#xf105;</i> 料理を運ぶ</strong><br>'+
      '<div class="indent-block">'+
        '<span class="problem">{!PLAY|chokai_l4-1|116.6} ({||width:21}) <ruby>温<rt>あたた</rt></ruby>かい料理は温かいうちに運ぶ。</span>'+
      '</div><br>'+
        
      '<strong class="main-color"><i class="fa">&#xf105;</i> お客様が少ない時</strong><br>'+
      '<div class="indent-block">'+
        '<span class="problem">{!PLAY|chokai_l4-1|116.6} ({〇|O|answer}) 席を回って、お客様のコップに水を入れに行く。</span>'+
        '<span class="problem">{!PLAY|chokai_l4-1|53.6} ({||width:21}) お客様が食べ終わったお皿を片付ける。</span>'+
        '<span class="problem">{!PLAY|chokai_l4-1|24.7} ({||width:21}) トイレを<ruby>掃除<rt>そうじ</rt></ruby>し、いつもきれいにしておく。</span>'+
      '</div><br>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('chokai_l4-1', [
      [24.7, 39.5],
      [39.9, 41.7],
      [42.4, 48.6],
      [49.4, 53],
      [53.6, 60.8],
      [61.3, 64.9],
      [65.6, 70],
      [70.5, 71.5],
      [72.1, 84.8],
      [85.3, 91.1], // 10
      [92.2, 102.4],
      [102.9, 104.7],
      [105.7, 115.5],
      [116.6, 132.2],
      [132.7, 133.7],
      [134.5, 139.7],
      [140, 142]
    ]);
    
    // keeps the audio on-screen when the user scrolls out of view
    Genki.stickyAudio.init('static-audio');
    </script>
