    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ば～のに|l4-p9}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：週末、みんなでドライブに行くんだけど、一緒に行かない？<br><br>'+
            'B：行きたいんだけど、試験の勉強をしなきゃいけないんだ。残念……。<br><br>'+
            '<span class="hidden">B：</span>{試験がなけれ|しけんがなけれ|answer;hint:(If I) didn\'t have an exam;width:190}ば、いいのに……。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '〈店で買い物をしている〉<br><br>'+
            'A：そのぼうし、とてもよく<ruby>似合<rt>にあ</rt></ruby>ってるよ。<br><br>'+
            'B：本当？でも、2万円はちょっと……。もっと{安ければ、買えるのに|やすければ、かえるのに|' + Genki.getAlts('{安}ければ、{買}{える}のに', 'やす|か|う') + 'answer;hint:if it were cheaper, I could buy it;width:240}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：見て、このチラシ<small>(ad)</small>。ボランティアをしながら<ruby>船<rt>ふね</rt></ruby>で世界旅行ができるんだって。申し込もうかなあ。<br><br>'+
            'B：でも、ちょっと待って！3カ国語以上話せないと申し込めないみたいだよ。<br><br>'+
            'A：えっ！{あと1カ国語話せれば、申し込めるのに|あと1カこくごはなせれば、もうしこめるのに|' + Genki.getAlts('あと1{カ}{国語}{話}せれば、{申}し{込}めるのに', 'か|こくご|はな|もう|こ') + 'answer;hint:If I could speak 1 more (national) language, I could apply;width:420}。残念！'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ああ、つまらないなあ。<br><br>'+
            'B：そうだね。{何か面白いことがあれば、いいのに|なにかおもしろいことがあれば、いいのに|' + Genki.getAlts('{何}か{面白}いことがあれば、いいのに', 'なに|おもしろ') + 'answer;hint:I wish something interesting would happen;width:320}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">{休みがもっと長ければ、遠くに旅行に行けるのに|やすみがもっとながければ、とおくにりょこうにいけるのに|' + Genki.getAlts('{休}みがもっと{長}ければ、{遠}くに{旅行}に{行}けるのに', 'やす|なが|とお|りょこう|い') + 'answer;hint:If I had a longer vaction, I could travel farther}と思う。</div>'+
      '</div>'
    });
    </script>
