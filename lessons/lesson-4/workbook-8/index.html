    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|せっかく|l4-p3}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">せっかく新しい文法を習ったんだから、{なるべく使ったほうがいい%(です/)|なるべくつかったほうがいい%(です/)|' + Genki.getAlts('なるべく{使}った{方}がいい{です}', 'つか|ほう|') + 'answer;hint:should use it as much as possible;width:240}。</div>'+
        
        '<div class="problem">{せっかくパーティーに来た|せっかくパーティーにきた|answer;hint:You came all this way to the party;width:260}んだから、楽しんでください。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>京都<rt>きょうと</rt></ruby>に行ったら、まず、カラオケに行こう！<br><br>'+
            'B：えー、{せっかく京都に行く|せっかくきょうとにいく|' + Genki.getAlts('せっかく{京都}に{行}く', 'きょうと|い') + 'answer;hint:we came all this way to Kyoto;width:220}んだから、お寺に行こうよ！'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">{せっかくたくさんスピーチの練習をした|せっかくたくさんスピーチのれんしゅうをした|answer;hint:I went to the trouble of doing a lot of speech practice;width:380}のに、うまくいかなかった。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：金曜日に<ruby>山田<rt>やまだ</rt></ruby>さんとご飯を食べに行くんですが、よかったら一緒にいかがですか。<br><br>'+
            'B：ちょっと金曜日は忙しくて……。<br><br>'+
            '<span class="hidden">B：</span>{せっかく誘ってくれた|せっかくさそってくれた|answer;hint:You went to the trouble of inviting me;width:280}のに、すみません。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：どうしたの？元気ないね。<br><br>'+
            'B：{せっかく新しい服を買った|せっかくあたらしいふくをかった|' + Genki.getAlts('せっかく{新}しい{服}を{買}った', 'あたら|ふく|か') + 'answer;hint:I went to the trouble of buying new clothes;width:320}のに、もう汚してしまったんだ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
