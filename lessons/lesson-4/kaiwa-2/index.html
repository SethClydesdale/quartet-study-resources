    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba"><ruby>帯<rt>おび</rt></ruby>　belt</span>'+
      '<span class="kotoba"><ruby>着付<rt>きつ</rt></ruby>け　dressing</span>'+
      '<span class="kotoba"><ruby>SNS<rt>エスエヌエス</rt></ruby>　social networking service; social media</span><br>'+
      '<span class="kotoba">(Xは[人])にぴったり　X is perfect for [person]</span>'+
      '<span class="kotoba">やる<ruby>価値<rt>かち</rt></ruby>(が)ある　it is worth doing</span><br>'+
      '<span class="kotoba"><ruby>個人的<rt>こじんてき</rt></ruby>には　personally</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|kaiwa_l4-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l4-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l4-2" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">カジュアルな会話</strong>'+
        '<div class="title reduced center">初めての<ruby>京都<rt>きょうと</rt></ruby></div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">昼休みにサラ(サ：)がメイリン(メ：)に話しかける。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">メイリン、今ちょっといい？聞きたいことがあるんだけど……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">何？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">メイリンは何度も<ruby>京都<rt>きょうと</rt></ruby>に行ったことがあるよね？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">うん。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">実は、今度の休みに京都に行こうと思ってて。せっかく行くから、そこでしかできないことがしてみたいんだけど、何かおすすめを教えてくれない？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">うーん、そうだなあ。サラ、着物に興味ある？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">うん。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">それなら、着物をレンタルするのはどうかな？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">えっ、着物のレンタルができるの？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">うん。自分の好きな着物や<ruby>帯<rt>おび</rt></ruby>を選んで<ruby>着付<rt>きつ</rt></ruby>けをしてもらえるんだ。その後、着物を着て<ruby>観光<rt>かんこう</rt></ruby>できるし、写真も<ruby>撮<rt>と</rt></ruby>ってもらえるから、SNSが好きな人にぴったりだよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">へえ、よさそうだね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">ちょっと高いけど、やる価値あると思うよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">本当？じゃあ、調べてみる。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">もしやるんだったら、個人的には、神社で写真を撮るプランがおすすめだよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">わかった。いろいろ教えてくれてありがとう。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">また、何かあったら、いつでも聞いて。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l4-2|24.7} サラはメイリンにどんなことを教えてほしいと言いましたか。<br>'+
          '{京都でしかできないことを教えてほしいと言いました|きょうとでしかできないことをおしえてほしいといいました|' + Genki.getAlts('{京都}でしか{出来}ないことを{教}えて{欲}しいと{言}{いました}', 'きょうと|でき|おし|ほ|い|った') + 'answer;width:420}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l4-2|43.1} メイリンのおすすめは何ですか。<br>'+
          '{着物のレンタル%(です/)|きもののレンタル%(です/)|' + Genki.getAlts('{着物}のレンタル{です}', 'きもの|だ') + 'answer;width:420}。'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>メイリンはサラにおすすめを教える時、何と言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l4-2|43.1} <strong class="main-color">おすすめを<ruby>提案<rt>ていあん</rt></ruby>する時</strong><br>'+
          '<div class="example">'+
            'それなら、着物を{レンタルするのはどうかな}？'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l4-2|50.2} <strong class="main-color">おすすめについて説明する時</strong><br>'+
          '<div class="example">'+
            '写真も<ruby>撮<rt>と</rt></ruby>って{もらえる}から、<br><br>'+
            'SNSが好きな人に{ぴったり}だよ。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l4-2|67.5} <strong class="main-color">もっとすすめる時</strong><br>'+
          '<div class="example">'+
            'ちょっと高いけど、やる{価値ある|かちある|answer}と思うよ。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l4-2|74.6} <strong class="main-color">具体的にすすめる時</strong><br>'+
          '<div class="example">'+
            'もしやるんだったら、{個人的|こじんてき|answer}には、<br><br>'+
            '神社で写真を撮るプランが{おすすめ}だよ。'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('kaiwa_l4-2', [
      [8.4, 11.7],
      [13.6, 18],
      [18.4, 19.1],
      [19.7, 22.6],
      [23.2, 23.8],
      [24.7, 35],
      [36.2, 41.6],
      [41.9, 42.5],
      [43.1, 46.5],
      [46.8, 49.8], // 10
      [50.2, 64.4],
      [64.5, 66.9],
      [67.5, 70.8],
      [71.1, 73.7],
      [74.6, 80.1],
      [81, 84.2],
      [85, 88]
    ]);
    
    // keeps the audio on-screen when the user scrolls out of view
    Genki.stickyAudio.init('static-audio');
    </script>
