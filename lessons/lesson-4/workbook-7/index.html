    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～以来|l4-p1}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">大学に入って以来、{よく図書館に行く|よくとしょかんにいく|' + Genki.getAlts('よく{図書館}に{行}く', 'としょかん|い') + 'answer;hint:going to the library (more) often;width:240}ようになった。</div>'+
        
        '<div class="problem">{この町に引っ越してきて以来|このまちにひっこしてきていらい|' + Genki.getAlts('この{町}に{引}っ{越}してきて{以来}', 'まち|ひ|こ|いらい') + 'answer;hint:Since (I) moved to this town}、ずっと同じアパートに住んでいる。</div>'+
        
        '<div class="problem">{自転車を買って以来|じてんしゃをかっていらい|' + Genki.getAlts('{自転車}を{買}って{以来}', 'じてんしゃ|か|いらい') + 'answer;hint:Ever since I bought a bicycle;width:220}、毎日自転車で学校に通っている。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '<ruby>大木<rt>おおき</rt></ruby>：あっ、<ruby>山田<rt>やまだ</rt></ruby>さん、<ruby>久<rt>ひさ</rt></ruby>しぶり！<br><br>'+
            '山田：あっ、大木さん！本当に久しぶりですね。{卒業%(して/)以来会っていません|そつぎょう%(して/)いらいあっていません|' + Genki.getAlts('{卒業}{して}{以来}{会}って{い}ません', 'そつぎょう||いらい|あ|') + 'answer;hint:I haven\'t seen you since graduation}よね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：日本語の勉強を始めてから何か変わったことがありますか。<br><br>'+
            'B：{日本語の勉強を始めて以来|にほんごのべんきょうをはじめていらい|' + Genki.getAlts('{日本語}の{勉強}を{始}めて{以来}', 'にほんご|べんきょう|はじ|いらい') + 'answer;hint:Ever since I started studying Japanese;width:280}、日本の音楽を聞くようになりました。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
