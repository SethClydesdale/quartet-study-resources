    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba"><ruby>相談<rt>そうだん</rt></ruby>に<ruby>乗<rt>の</rt></ruby>る　to give advice to</span>'+
      '<span class="kotoba"><ruby>悩<rt>なや</rt></ruby>む　to be worried</span>'+
      '<span class="kotoba"><ruby>迷<rt>まよ</rt></ruby>う　to be in two minds; be puzzled</span><br>'+
      '<span class="kotoba"><ruby>以前<rt>いぜん</rt></ruby>は　back in the day</span>'+
      '<span class="kotoba"><ruby>進学<rt>しんがく</rt></ruby>する　to go on to higher education</span>'+
      '<span class="kotoba"><ruby>詳<rt>くわ</rt></ruby>しく　in detail</span><br>'+
      '<span class="kotoba">～<ruby>先生<rt>せんせい</rt></ruby>の<ruby>研究室<rt>けんきゅうしつ</rt></ruby>に<ruby>入<rt>はい</rt></ruby>る　to become a member of Prof. ~\'s lab</span>'+
      '<span class="kotoba"><ruby>立場<rt>たちば</rt></ruby>　situation</span>'+
      '<span class="kotoba">～をもとに　based on ~</span><br>'+
      '<span class="kotoba"><ruby>納得<rt>なっとく</rt></ruby>する　to be convinced to</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|kaiwa_l4-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l4-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l4-1" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">フォーマルな会話</strong>'+
        '<div class="title reduced center">ジョージの<ruby>悩<rt>なや</rt></ruby>み</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">ジョージ・テイラー(ジ：)が大学院生のグエン・ヴァン・タン(グ：)に話しかける。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text"><ruby>先輩<rt>せんぱい</rt></ruby>、ちょっと相談に乗ってもらえませんか。<ruby>悩<rt>なや</rt></ruby>んでいることがあって。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">どうしたの？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">実は、アメリカの大学を卒業したらまた日本に<ruby>戻<rt>もど</rt></ruby>ってこようと思っているんですけど、就職するべきか、大学院に行くべきか、<ruby>迷<rt>まよ</rt></ruby>っているんです。<ruby>以前<rt>いぜん</rt></ruby>は<ruby>進学<rt>しんがく</rt></ruby>しようと思っていたんですが、最近、就職もいいなと思うようになってきて……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">もう少し<ruby>詳<rt>くわ</rt></ruby>しく話してくれない？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">ええと、進学するなら、<ruby>中村<rt>なかむら</rt></ruby>先生の研究室に入りたいと思っていたんですが、アルバイトしている会社の仕事にも興味が出てきたんです。もうそろそろ決めないといけないんですが、どちらのほうがいいか迷ってしまって……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">うーん、難しい問題だよね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">先輩が私の<ruby>立場<rt>たちば</rt></ruby>だったら、どうされますか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">そうだなあ。僕なら進学を選ぶかな。一度働き始めたら、なかなか仕事はやめられないし。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">確かにそうですね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">お金の問題もあるから、ご両親も相談したほうがいいよ。でも、何と言っても大切なのは、ジョージが本当にやりたいことが何かっていうことだと思うよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">そのとおりですね。先輩にいただいたアドバイスをもとに、もう少し考えてみます。ありがとうございます。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text"><ruby>納得<rt>なっとく</rt></ruby>できる答えが見つかるといいね。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l4-1|25.5} ジョージの<ruby>悩<rt>なや</rt></ruby>みは何ですか。<br>'+
          '{就職するべきか、大学院に行くべきか、迷っているんです|しゅうしょくするべきか、だいがくいんにいくべきか、まよっているんです|' + Genki.getAlts('{就職}するべきか、{大学院}に{行}くべきか、{迷}って{い}るん{です}', 'しゅうしょく|だいがくいん|い|まよ||だ') + 'answer;width:500}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l4-1|77.2} グエンは、自分がジョージの<ruby>立場<rt>たちば</rt></ruby><small>(situation)</small>ならどうすると言っていますか。<br>'+
          '{進学を選ぶと言っています|しんがくをえらぶといっています|' + Genki.getAlts('{進学}を{選}ぶと{言}って{い}{ます}', 'しんがく|えら|い||る') + 'answer;width:500}。'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>ジョージは<ruby>変更<rt>へんこう</rt></ruby>の<ruby>希望<rt>きぼう</rt></ruby><small>(request)</small>を言う時、何と言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l4-1|17.1} <strong class="main-color">話しかける時</strong><br>'+
          '<div class="example">'+
            '<ruby>先輩<rt>せんぱい</rt></ruby>、ちょっと{相談に乗って|そうだんにのって|' + Genki.getAlts('{相談}に{乗}って', 'そうだん|の') + 'answer}もらえませんか。<ruby>悩<rt>なや</rt></ruby>んでいることがあって。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l4-1|102.9} <strong class="main-color">アドバイスを聞いた時</strong><br>'+
          '<div class="example">'+
            '先輩にいただいた{アドバイスをもと}に、{もう少し考えて|もうすこしかんがえて|' + Genki.getAlts('もう{少}し{考}えて', 'すこ|かんが') + 'answer}みます。ありがとうございます。'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('kaiwa_l4-1', [
      [10.4, 15.8],
      [17.1, 23.1],
      [23.7, 24.7],

      [46.2, 48.6],
      [49.6, 66.9],
      [67.9, 71.2],
      [72.4, 75.8],
      [77.2, 86.1],
      [86.9, 88.3], // 10
      [88.9, 101.8],
      [102.9, 112.1],
      [112.8, 116]
    ]);
    
    // keeps the audio on-screen when the user scrolls out of view
    Genki.stickyAudio.init('static-audio');
