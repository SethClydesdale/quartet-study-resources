    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">3.</span>文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：日本語のディスカッションでは、言いたいことがうまく伝えられないから大変…。<br><br>'+
            'B：本当にそうだよね。ああ、{日本語がもっと上手に話せればいいのに|にほんごがもっとじょうずにはなせればいいのに|' + Genki.getAlts('{日本語}がもっと{上手}に{話}せればいいのに{なあ}', 'にほんご|じょうず|はな|') + 'answer;hint:I wish I could speak Japanese better}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '{車の運転ができればいいのになあ|くるまのうんてんができればいいのになあ|' + Genki.getAlts('{車}の{運転}が{出来}ればいいのに{なあ}', 'くるま|うんてん|でき|') + 'answer;hint:I wish I could drive a car}と思う。<br><br>'+
            '家の近くのバスは<ruby>便利<rt>べんり</rt></ruby>じゃなくて<ruby>困<rt>こま</rt></ruby>っているからだ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">大学の寮に住むと、{電車で通わないで済みます|でんしゃでかよわないですみます|' + Genki.getAlts('{電車}で{通}わないで{済}{みます}', 'でんしゃ|かよ|す|む') + 'answer;hint:it will save you from commuting by train;width:300}。</div>'+
        
        '<div class="problem">最近は、{マイケル・ジャクソンさえ知らない人|マイケル・ジャクソンさえしらないひと|' + Genki.getAlts('マイケル・ジャクソンさえ{知}らない{人}', 'し|ひと') + 'answer;hint:people who don\'t even know <ruby>Michael Jackson<rt>マイケル・ジャクソン</rt></ruby>;width:330}もいる。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：今度、友達とイタリアを旅行するんですけど、友達も私もイタリア語が上手じゃないんです。<br><br>'+
            'B：{簡単な挨拶さえ覚えておけば|かんたんなあいさつさえおぼえておけば|' + Genki.getAlts('{簡単}な{挨拶}さえ{覚}えておけば', 'かんたん|あいさつ|おぼ') + 'answer;hint:As long as you memorize simple greetings in advance;width:380}大丈夫ですよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ヤンさんは学生の時、レストランでシェフのアルバイトをしていたそうですよ。<br><br>'+
            'B：だから、{料理が上手なわけです|りょうりがじょうずなわけです|' + Genki.getAlts('{料理}が{上手}なわけです', 'りょうり|じょうず') + 'answer;hint:that\'s why he\'s good at cooking;width:230}ね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　先生：Aさん、宿題を出してください。<ruby>昨日<rt>きのう</rt></ruby>、今日は絶対出すと言いましたね。<br><br>'+
            '学生Ａ：あの、昨日は夜遅くまでずっとアルバイトをしていたので、時間がなくて……。<br><br>'+
            '　先生：つまり、{まだ宿題をしていないわけです|まだしゅくだいをしていないわけです|answer;hint:that\'s why you haven\'t did your homework yet;width:340}ね。<br><br>'+
            '学生Ａ：はい……。すみません。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'アメリカのハンバーガーは、{みんなが思っているほど、大きくない|みんながおもっているほど、おおきくない|' + Genki.getAlts('{皆}が{思}って{い}るほど、{大}きくない{です}', 'みんな|おも||おお|') + 'answer;hint:aren\'t as big as everyone thinks}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'アメリカのコンビニは、{日本のコンビニほど便利じゃない|にほんのコンビニほどべんりじゃない|' + Genki.getAlts('{日本}のコンビニほど{便利}じゃない', 'にほん|べんり') + 'answer;hint:aren\'t as convenient as Japan\'s convenience stores;width:360}と思う。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">{寮に住み始めて以来|りょうにすみはじめていらい|' + Genki.getAlts('{寮}に{住}み{始}めて{以来}', 'りょう|す|はじ|いらい') + 'answer;hint:Ever since I started living in the dorm;width:280}、よく料理するようになった。</div>'+
        
        '<div class="problem">{せっかくクッキーを作ったのに|せっかくクッキーをつくったのに|answer;hint:I went through the trouble of making cookies, but...;width:380}、彼はあまり食べてくれなかった。</div>'+
        
        '<div class="problem">{せっかく日本語を勉強している|せっかくにほんごをべんきょうしている|' + Genki.getAlts('せっかく{日本語}を{勉強}している', 'にほんご|べんきょう') + 'answer;hint:I\'m going through the trouble of studying Japanese;width:370}ので、将来、日本の会社に就職したい。</div>'+
      '</div>'
    });
    </script>
