    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">3.</span>1.～4.の<ruby>状況<rt>じょうきょう</rt></ruby><small>(situation)</small>を「{!GRI|～てあげる／くれる／もらう|l3-p001}」を使って<ruby>説明<rt>せつめい</rt></ruby>しなさい。<span class="ul-color">　　</span>の<ruby>動詞<rt>どうし</rt></ruby>を使いなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '<ruby>暇<rt>ひま</rt></ruby>そうだったので、ホストファミリーの子どもを<ruby>公園<rt>こうえん</rt></ruby>に<span class="ul-color">連れていった</span>。<br><br>'+
            '<i class="fa">&#xf061;</i>　ホストファミリーの子ども{を公園に連れていってあげた|をこうえんにつれていってあげた|' + Genki.getAlts('を{公園}に{連}れて{い}ってあげた', 'こうえん|つ|行') + 'answer}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '私の自転車が<ruby>壊<rt>こわ</rt></ruby>れた。私が<ruby>困<rt>こま</rt></ruby>っているのを見て、ホストファミリーのお父さんが自転車を<span class="ul-color"><ruby>直<rt>なお</rt></ruby>した</span>。<br><br>'+
            '<i class="fa">&#xf061;</i>　ホストファミリーのお父さんが私{の自転車を直してくれた|のじてんしゃをなおしてくれた|' + Genki.getAlts('の{自転車}を{直}してくれた', 'じてんしゃ|なお') + 'answer}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'お母さんが料理している時、家に<ruby>卵<rt>たまご</rt></ruby>がなかった。お母さんが困っているのを見たので、私はスーパーに卵を<span class="ul-color">買いに行った</span>。<br><br>'+
            '<i class="fa">&#xf061;</i>　私{は|が|answer}お母さん{のためにスーパーに卵を買いに行ってあげた|のためにスーパーにたまごをかいにいってあげた|' + Genki.getAlts('の{ため}にスーパーに{卵}を{買}いに{行}ってあげた', '為|たまご|か|い') + 'answer}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'ホストファミリーのお母さんに「朝早く起こしてください」とお<ruby>願<rt>ねが</rt></ruby>いした。次の日、お母さんは私を朝6時に<span class="ul-color">起こした</span>。<br><br>'+
            '<i class="fa">&#xf061;</i>　お母さんに{朝6時に起こしてもらった|あさ6じにおこしてもらった|' + Genki.getAlts('{朝}6{時}に{起}こしてもらった', 'あさ|じ|お') + 'answer}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
