    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l3-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l3-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l3-1" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">留学生のための<ruby>富士<rt>ふじ</rt></ruby>登山ガイド</div>'+
        '　<span class="line">日本にいる<span class="ul-color">{!GRI|うちに|l3-p1}</span>一度訪れてほしい場所は、<span class="ul-color">{!GRI|何と言っても|l3-p2}</span><ruby>富士山<rt>ふじさん</rt></ruby>です。</span>'+
        '<span class="line">富士山は3,776メートルの日本一高い山で、<ruby>山梨<rt>やまなし</rt></ruby>県と<ruby>静岡<rt>しずおか</rt></ruby>県の県境にあります。</span>'+
        '<span class="line">日本人<span class="ul-color">{!GRI|にとって|l3-p3}</span>特別な山で、日本の象徴<span class="ul-color">{!GRI|として|l3-p4}</span>愛されており、千円札にも<ruby>描<rt>えが</rt></ruby>かれています。</span>'+
        '<span class="line">2013年に世界文化<ruby>遺産<rt>いさん</rt></ruby>に登録された<span class="ul-color">{!GRI|ため|l3-p5}</span>、外国からの登山客も多くなってきています。</span><br>'+
        
        '　<span class="line">これから、留学生のみなさんに富士登山に役立つ情報をご紹介します。</span><br>'+
        
        '<div class="sub-title" style="margin-bottom:5px;"><strong class="line">登山期間とルート</strong></div>'+
        '　<span class="line">まず、いつ、どんなルートを登るのがいいのでしょうか。</span>'+
        '<span class="line">一般的な登山期間は7月<ruby>上旬<rt>じょうじゅん</rt></ruby>から9月上旬までの約2カ月です。</span>'+
        '<span class="line">この間は山小屋が開いていて、登山バスも走っています。</span>'+
        '<span class="line">登山ルートは全部で4つあり、歩く<ruby>距離<rt>きょり</rt></ruby>や難しさなどがルート<span class="ul-color">{!GRI|によって|l3-p6}</span>違います。</span>'+
        '<span class="line">よく調べて自分に合ったルートを選びましょう。</span><br>'+
        
        '<div class="sub-title" style="margin-bottom:5px;"><strong class="line">登山計画</strong></div>'+
        '　<span class="line">次に、登山にはどのぐらい時間がかかるのでしょうか。</span>'+
        '<span class="line">例えば、登る人が最も多い「<ruby>吉田<rt>よしだ</rt></ruby>ルート」では、山頂まで約6時間かかります。</span>'+
        '<span class="line">その<span class="ul-color">{!GRI|ため|l3-p5}</span>、1日目は山頂に近い山小屋に泊まり、次の日の朝、山頂で日の出を見てから下山するのが一般的です。</span>'+
        '<span class="line">この日の出のことを「ご<ruby>来光<rt>らいこう</rt></ruby>」と言います。</span>'+
        '<span class="line">山頂から美しいご来光を見れば、一生の思い出になるでしょう。</span><br>'+
        
        '　<span class="line">また、旅行会社の登山ツアーに参加すればガイドが案内してくれるので、初めて登る人でも安心です。</span>'+
        '<span class="line">富士登山は人気があるので、ツアーや山小屋はなるべく早く予約しておきましょう。</span><br>'+
        
        '<div class="sub-title" style="margin-bottom:5px;"><strong class="line">服装</strong></div>'+
        '　<span class="line">登山の計画を立てから、次は服です。</span>'+
        '<span class="line">登山にはどのような服を着ていく<span class="ul-color">{!GRI|べき|l3-p7}</span>でしょうか。</span>'+
        '<span class="line">夏だ<span class="ul-color">{!GRI|からといって|l3-p8}</span>、雪が降らない<span class="ul-color">{!GRI|とは限りません|l3-p9}</span>。</span>'+
        '<span class="line">山頂は0度以下になることがあるので、ダウンジャケットやセーターなどを忘れないようにしてください。</span>'+
        '<span class="line">それに、<ruby>丈夫<rt>じょうぶ</rt></ruby>な登山<ruby>靴<rt>ぐつ</rt></ruby>も、岩が多い山頂の近くを歩く<span class="ul-color">{!GRI|のに|l3-p10}</span>必要です。</span>'+
        '<span class="line">安全のために必ず用意しておきましょう。</span><br>'+
        
        '<div class="sub-title" style="margin-bottom:5px;"><strong class="line">注意点</strong></div>'+
        '　<span class="line">その他には、どのようなことに気を<ruby>付<rt>つ</rt></ruby>けたらいいでしょうか。</span>'+
        '<span class="line">富士山にはトイレが少ないので、見つけたらその時に行っておいたほうがいいでしょう。</span>'+
        '<span class="line">また、富士山にゴミ箱はないので、自分のゴミは必ず持ち帰って下さい。</span>'+
        '<span class="line">山を汚さないようにすることは、登山客が守る<span class="ul-color">{!GRI|べき|l3-p7}</span>ルールです。</span><br>'+
        
        '　<span class="line">富士山には、日本だけでなく世界中から人が集まります。</span>'+
        '<span class="line">準備をしっかり行い、マナーを守って、日本一の山に登る感動を味わってください。</span>'+
      '</div>'+
    '</div>'+
    '<br>'+
     
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>本文の<ruby>内容<rt>ないよう</rt></ruby>と<ruby>合<rt>あ</rt></ruby>うものに〇/O、合わないものに×/Xをつけなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">{!PLAY|yomimono_l3-1|27.7} ({〇|O|answer}) <ruby>富士山<rt>ふじさん</rt></ruby>は日本に象徴で、人々に愛されている。</div>'+
      '<div class="problem">{!PLAY|yomimono_l3-1|64.5} ({〇|O|answer}) 山小屋は冬には開いていない。</div>'+
      '<div class="problem">{!PLAY|yomimono_l3-1|101.7} ({×|X|answer}) 山頂で日の出を見たければ、ツアーに申し込まなければいけない。</div>'+
      '<div class="problem">{!PLAY|yomimono_l3-1|163.9} ({〇|O|answer}) 夏に富士山に登る時も、<ruby>暖<rt>あたた</rt></ruby>かい服を持っていったほうがいい。</div>'+
      '<div class="problem">{!PLAY|yomimono_l3-1|199.4} ({×|X|answer}) 富士山にはトイレとゴミ箱がない。</div>'+
    '</div>'
    });
