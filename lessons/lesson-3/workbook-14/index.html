    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span><span class="sub-section inline nospacing">　　</span>の言葉をを使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。同じ言葉は一度しか使えません。</p>'+
      
      '<div class="count-problems indent-block">'+
        '<div class="sub-section inline">'+
          '　{!GRI|～にとって|l3-p3}　　{!GRI|～のに|l3-p10}　　{!GRI|～によって|l3-p6}　　{!GRI|～として|l3-p4}　<br>'+
          '　{!GRI|～ため|l3-p5}　　{!GRI|～からといって|l3-p8}　　{!GRI|何と言っても|l3-p2}　'+
        '</div><br><br>'+
        
        '<div class="problem"><ruby>相談<rt>そうだん</rt></ruby>できる友達は、若い人{にとって}大切なものだ。</div>'+
        
        '<div class="problem">私の町で有名な食べ物は{何と言っても|なんといっても|' + Genki.getAlts('{何}と{言}っても', 'なん|い') + 'answer}うどんです。</div>'+
        
        '<div class="problem">私は旅行者{として}日本に来たので、働くことができません。</div>'+
        
        '<div class="problem">このICカードは、日本全国の電車に乗る{のに}使えます。</div>'+
        
        '<div class="problem">先生{によって}、教え方が違う。</div>'+
        
        '<div class="problem">病気{のため}、1カ月仕事を休むことになった。</div>'+
      '</div>'+
        
      '<p class="sectionDesc"><span class="sectionNumber">2.</span>例と同じ意味の「{!GRI|ため|l3-p5}」を使っているものに〇/Oをつけなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="example-problem">台風が近づいている<span class="ul-color">ため</span>に、風が強くなっている。</div>'+
        
        '<div class="problem">({〇|O|answer})　暑さのためにダム<small>(dam)</small>の水が少なくなっている。</div>'+
        '<div class="problem">({||width:21})　来年日本へ行くためにアルバイトをしています。</div>'+
        '<div class="problem">({〇|O|answer})　東京は<ruby>地下鉄<rt>ちかてつ</rt></ruby>が多いために車がなくても<ruby>不便<rt>ふべん</rt></ruby>ではない。</div>'+
        '<div class="problem">({||width:21})　やせるためにダイエットをしすぎるのはよくないだろう。</div>'+
        '<div class="problem">({〇|O|answer})　朝、時計のアラームが<ruby>鳴<rt>な</rt></ruby>らなかったために<ruby>遅刻<rt>ちこく</rt></ruby>してしまった。</div>'+
      '</div>'
    });
    </script>
