    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd">'+
      '<span class="sectionNumber3rd fa">&#xf054;</span>登山サークルのアンドレアと<ruby>研<rt>けん</rt></ruby>が、<ruby>富士山<rt>ふじさん</rt></ruby>のパンフレットを見ながら登山イベントの計画を立てています。会話を聞いて、この人たちが登るルートに〇/Oをつけなさい。'+
    '</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba"><ruby>急<rt>きゅう</rt></ruby>な　steep</span>'+
    '</div>'+

    '{!AUDIO|chokai_l3-1}'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l3-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l3-1" class="chokai-script dialogue clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center"><ruby>富士<rt>ふじ</rt></ruby>登山の計画</div>'+
        '<div class="line">'+
          '<div class="name"><ruby>研<rt>けん</rt></ruby></div>'+
          '<div class="text">そろそろ<ruby>富士<rt>ふじ</rt></ruby>登山のイベントの計画を立てないとね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">アンドレア</div>'+
          '<div class="text">研は何度も登ったことあるんだよね？<ruby>僕<rt>ぼく</rt></ruby>、1回しか行ったことがないから、不安だなあ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text"><ruby>大丈夫<rt>だいじょうぶ</rt></ruby>。わからないことがあったら聞いてよ。まずはルートを決めようか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ア</div>'+
          '<div class="text">ええと、ルートは4つあるんだよね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">今年は初めて登る人もいるんだよね？でも、何度も登ってる人もいるし、人<span class="ul-color">{!GRI|によって|l3-p6}</span>登りたいルートが違うかもしれないね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ア</div>'+
          '<div class="text">そうだね。どうしよう？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">初めての人がいるなら、一番長いルートはやめたほうがいいと思う。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ア</div>'+
          '<div class="text">そうだね。他のルートに比べて、登る<span class="ul-color">{!GRI|のに|l3-p10}</span>ずいぶん時間がかかるみたいだし……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">うん。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ア</div>'+
          '<div class="text">じゃあ、この一番短いルートは？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">短い<span class="ul-color">{!GRI|からって|l3-p8}</span>、簡単だ<span class="ul-color">{!GRI|とは限らない|l3-p9}</span>よ。このルートは道が急だから、難しいんだ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ア</div>'+
          '<div class="text">そっか。じゃあ、人気の「<ruby>吉田<rt>よしだ</rt></ruby>ルート」はどう？道が安全で歩きやすいって聞いたけど……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">うーん。人気があるルートは人が多いから、ゆっくり歩かないといけないことがあるんだよね。登るスピードがゆっくりだと、登山経験が長い4年生はいらいらしたり、疲れたりするかも。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ア</div>'+
          '<div class="text">そうなんだ。じゃあ、あまり人が多くなくて、長すぎないルートがいいね。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<table class="table large-width center">'+
      '<tr class="table-head">'+
        '<td></td>'+
        '<td><ruby>吉田<rt>よしだ</rt></ruby>ルート</td>'+
        '<td><ruby>富士宮<rt>ふじのみや</rt></ruby>ルート</td>'+
        '<td><ruby>須走<rt>すばしり</rt></ruby>ルート</td>'+
        '<td><ruby>御殿場<rt>ごてんば</rt></ruby>ルート</td>'+
      '</tr>'+

      '<tr>'+
        '<td>長さ</td>'+
        '<td>14 km</td>'+
        '<td>8.5 km</td>'+
        '<td>13 km</td>'+
        '<td>17.5 km</td>'+
      '</tr>'+

      '<tr>'+
        '<td>登り時間</td>'+
        '<td>6時間10分</td>'+
        '<td>5時間30分</td>'+
        '<td>6時間50分</td>'+
        '<td>8時間10分</td>'+
      '</tr>'+

      '<tr>'+
        '<td>下り時間</td>'+
        '<td>3時間30分</td>'+
        '<td>3時間50分</td>'+
        '<td>3時間20分</td>'+
        '<td>4時間20分</td>'+
      '</tr>'+

      '<tr>'+
        '<td>人の多さ</td>'+
        '<td>多い</td>'+
        '<td>ふつう</td>'+
        '<td>少ない</td>'+
        '<td>少ない</td>'+
      '</tr>'+
    '</table><br>'+
    '<div class="right"><small>(出典：ウェブサイト「初心者のための登山とキャンプ入門」)</small></div><br>'+
        
    '<ol class="alpha">'+
      '<li class="problem">{!PLAY|chokai_l3-1|93} ({||width:21}) <ruby>吉田<rt>よしだ</rt></ruby>ルート</li>'+
      '<li class="problem">{!PLAY|chokai_l3-1|81} ({||width:21}) <ruby>富士宮<rt>ふじのみや</rt></ruby>ルート</li>'+
      '<li class="problem">{!PLAY|chokai_l3-1|119.8} ({〇|O|answer}) <ruby>須走<rt>すばしり</rt></ruby>ルート</li>'+
      '<li class="problem">{!PLAY|chokai_l3-1|66.8} ({||width:21}) <ruby>御殿場<rt>ごてんば</rt></ruby>ルート</li>'+
    '</ol>'+
        
    '<div class="center">{!IMG|chokai-l3-1.png}</div>'
    });
