    <script>Genki.generateQuiz({

    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l3-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l3-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l3-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section vertical-text-box" style="width:auto;">'+
        '<div class="title reduced center">居酒屋 ～日本らしさが感じられる場所～</div>'+
        
        '<p class="text-passage vertical-text paragraph">'+
          '　<span class="line">「安い値段でおいしい料理やお酒を楽しみたい」「友達と仲良くなる機会を作りたい」、そして「日本らしさを感じたい」。</span>'+
          '<span class="line">そんな時は居酒屋に行くとよい。</span>'+
          '<span class="line">特にチェーンの居酒屋は数が多く、学生や会社帰りのサラリーマン、<ruby>主婦<rt>しゅふ</rt></ruby>、家族連れなど、様々な客に人気がある。</span>'+
          '<span class="line">人々は何を求めて居酒屋に行くのだろうか。</span>'+
          '<span class="line">その特徴から居酒屋の<ruby>魅力<rt>みりょく</rt></ruby>を考えてみたい。</span><br>'+
        
          '　<span class="line">一つめの特徴は、料理もお酒も種類が多いことだ。</span>'+
          '<span class="line">席に着き、メニューを見れば、そのことにすぐ気が付くだろう。</span>'+
          '<span class="line">サラダやデザートがあるのは普通の飲食店と変わらないが、<ruby>枝豆<rt>えだまめ</rt></ruby>やから<ruby>揚<rt>あ</rt></ruby>げなど、「おつまみ」と<ruby>呼<rt>よ</rt></ruby>ばれるお酒に合う料理がたくさんある。</span>'+
          '<span class="line">また、ビールやワインの他に、日本酒やチューハイなど、いろいろなお酒が注文できる点も異なる。</span>'+
          '<span class="line">ジュースやお茶などのソフトドリンクもあるので、お酒が飲めない人でも楽しむことができる。</span><br>'+
        '</p>'+
        '<hr class="dashed">'+
        '<p class="text-passage vertical-text paragraph">'+
          '　<span class="line">二つめの特徴<span class="ul-color">{!GRI|として|l3-p4}</span>考えられるのは、その安さだ。</span>'+
          '<span class="line">料理も飲み物も安い<span class="ul-color">{!GRI|ため|l3-p5}</span>、注文する時に値段を気にしなくていい。</span>'+
          '<span class="line">だから、あまりお金がない時でも安心して食べたり飲んだりできる。</span>'+
          '<span class="line">さらに、お酒を飲む量が多い人は、「飲み放題」というシステムを覚えておくといい。</span>'+
          '<span class="line">「飲み放題」では決まった金額を払えば、90文などと決められた時間内に何種類ものお酒が好きなだけ飲める。</span><br>'+
        
          '　<span class="line">しかし、<span class="ul-color">{!GRI|何と言っても|l3-p2}</span>最大の特徴は、居酒屋が交流の場になっていることだ。</span>'+
          '<span class="line">どの店にもたいてい個室があるので、居酒屋はグループで集まる<span class="ul-color">{!GRI|のに|l3-p10}</span>とても<ruby>便利<rt>べんり</rt></ruby>だ。</span>'+
          '<span class="line">例えば、大学のサークルの「飲み会」や会社のプロジェクトやイベント後の「打ち上げ」でよく使われる。</span>'+
          '<span class="line">年来の「忘年会」や年始の「新年会」なども開かれる。</span>'+
          '<span class="line">そういう集まりでみんなでわいわい話せば、疲れている時の息抜きやストレス解消にもなる。</span>'+
          '<span class="line">また、あまり話したことがなかった人と親しくなれるチャンスにもなる。</span><br>'+
        
          '　<span class="line">このように、おいしい料理やお酒が安く楽しめ、交流が深められる場所――それが居酒屋だ。</span>'+
          '<span class="line">あなたもぜひ一度、居酒屋に足を運んで、その独特な<ruby>雰囲気<rt>ふんいき</rt></ruby>を感じてみてほしい。</span>'+
        '</p>'+
      '</div>'+
    '</div>'+
    '<br>'+
     
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>本文の<ruby>内容<rt>ないよう</rt></ruby>と<ruby>合<rt>あ</rt></ruby>うものに〇/O、合わないものに×/Xをつけなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">{!PLAY|yomimono_l3-2|} ({〇|O|answer}) 居酒屋では食事もお酒も楽しむことができる。</div>'+
      '<div class="problem">{!PLAY|yomimono_l3-2|} ({×|X|answer}) 会社員はあまり居酒屋に行かないようだ。</div>'+
      '<div class="problem">{!PLAY|yomimono_l3-2|} ({×|X|answer}) 居酒屋にはお酒に合う料理しかない。</div>'+
      '<div class="problem">{!PLAY|yomimono_l3-2|} ({×|X|answer}) 飲み放題の料金を払えば、店が閉まるまでお酒が好きなだけ飲める。</div>'+
      '<div class="problem">{!PLAY|yomimono_l3-2|} ({〇|O|answer}) 多くの居酒屋にはグループで集まる時に<ruby>便利<rt>べんり</rt></ruby>な部屋がある。</div>'+
    '</div>'
    });
