    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～のに|l3-p10}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">インターネットは{分からない言葉を調べる|わからないことばをしらべる|' + Genki.getAlts('{分}からない{言葉}を{調}べる', 'わ|ことば|しら') + 'answer;hint:to look up words that you don\'t know;width:270}のに<ruby>便利<rt>べんり</rt></ruby>だ。</div>'+
        
        '<div class="problem">{留学に申し込むのに|りゅうがくにもうしこむのに|' + Genki.getAlts('{留学}に{申}し{込}むのに', 'りゅうがく|もう|こ') + 'answer;hint:In order to apply for studying abroad;width:270}必要なものは<ruby>推薦状<rt>すいせんじょう</rt></ruby>だ。</div>'+
        
        '<div class="problem">{このアプリは単語を覚えるのに役に立つ|このアプリはたんごをおぼえるのにやくにたつ|' + Genki.getAlts('このアプリは{単語}を{覚}えるのに{役}に{立}{つ}', 'たんご|おぼ|やく|た|ちます') + 'answer;hint:This <ruby>app<rt>アプリ</rt></ruby> is useful for memorizing vocab}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：{宿題をするのに|しゅくだいをするのに|answer;hint:In order to do (your) homework;width:230}、たいていどのぐらいかかりますか。<br><br>'+
            'B：1時間ぐらいです。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：クイズです。これは<ruby>道具<rt>どうぐ</rt></ruby><small>(tool)</small>です。この道具は{食べ物を切るのに使う|たべものをきるのにつかう|' + Genki.getAlts('{食}べ{物}を{切}るのに{使}う', 'た|もの|き|つか') + 'answer;hint:used to cut food}ものです。これは何でしょう。<br><br>'+
            'B：それは<ruby>包丁<rt>ほうちょう</rt></ruby>ですか。<br><br>'+
            'A：そうです。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
