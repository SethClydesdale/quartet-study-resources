    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">2.</span>正しいものを<ruby>選<rt>えら</rt></ruby>びなさい。{!GRI|<button class="button small-button"><i class="fa">&#xf02d;</i><span class="en">View「あげる／くれる／もらう」in Grammar Index</span><span class="ja">文法索引で「あげる／くれる／もらう」を見る</span></button>|l3-p001}</p>'+
      '<div class="indent-block">'+
        '<strong>1. サラがバレンタインデーについて話している。</strong><br><br>'+
        '<div class="count-problems indent-block">'+
          '「私の国では、バレンタインデーに、彼や彼女がいる人はその人にプレゼントを<span class="problem">【{あげたり|!Iあげたり／くれたり／もらったり|spacer:alpha}】、</span>'+
          'その人からプレゼントを<span class="problem">【{もらったり|!Iあげたり／くれたり／もらったり|spacer:alpha}】</span>する。'+
          'しかし、日本ではバレンタインデーに女の人が男の人にチョコレートを<span class="problem">【{あげる|!Iあげる／くれる／もらう|spacer:alpha}】</span>のが<ruby>一般的<rt>いっぱんてき</rt></ruby>だそうだ。'+
          '女の人はお世話になったお<ruby>礼<rt>れい</rt></ruby>に会社の<ruby>男性<rt>だんせい</rt></ruby>の<ruby>上司<rt>じょうし</rt></ruby><small>(boss)</small>にチョコレートを<span class="problem">【{あげる|!Iあげる／くれる／もらう|spacer:alpha}】</span>こともあると聞いた。'+
          '私は<ruby>山中<rt>やまなか</rt></ruby>先生に大変お世話になったので、先生にチョコレートを<span class="problem">【{さしあげよう|!Iさしあげよう／くださろう／いただこう|spacer:alpha}】</span>と思っている。<br><br>'+
        
          '最近では、男の<ruby>友達<rt>ともだち</rt></ruby>だけではなく、女の友達にもチョコレートを<span class="problem">【{あげる|!Iあげる／くれる／もらう|spacer:alpha}】</span>「<ruby>友<rt>とも</rt></ruby>チョコ」も人気があるそうだ。'+
          '私も去年<ruby>絵理<rt>えり</rt></ruby>に<ruby>抹茶<rt>まっちゃ</rt></ruby>チョコを<span class="problem">【{もらった|!Iあげた／くれた／もらった|spacer:alpha}】</span>。'+
          '私が抹茶が好きなので、絵理が作って<span class="problem">【{くれた|!Iあげた／くれた／もらった|spacer:alpha}】</span>のだ。'+
          'バレンタインが近くなると、デパートにたくさんの<ruby>種類<rt>しゅるい</rt></ruby>のチョコレートが売られていて楽しい。今年のバレンタインには友達に<span class="problem">【{あげる|!Iあげる／くれる／もらう|spacer:alpha}】</span>チョコレートを買いに、デパートに行ってみようと思う。」'+
        '</div>'+
      '</div><br><br>'+
        
      '<div class="indent-block">'+
        '<strong>2. 13歳のけんたくんが去年の<ruby>誕生日<rt>たんじょうび</rt></ruby>について話している。</strong><br><br>'+
        '<div class="count-problems indent-block">'+
          '「去年の誕生日は悲しかった。だれにもプレゼントを<span class="problem">【{もらわ|!Iあげ／くれ／もらわ|spacer:alpha}】</span>なかったからだ。'+
          'お母さんはケーキを<ruby>焼<rt>や</rt></ruby>いて<span class="problem">【{くれる|!Iあげる／くれる／もらう|spacer:alpha}】</span>と言っていたのに、忘れてしまった。'+
          'お父さんに<ruby>野球<rt>やきゅう</rt></ruby>の<ruby>試合<rt>しあい</rt></ruby>に連れていって<span class="problem">【{もらおう|!Iあげよう／くれよう／もらおう|spacer:alpha}】</span>と思っていたのに、雨が<ruby>降<rt>ふ</rt></ruby>って行けなかった。'+
          '今年の誕生日はだれかが何かを<span class="problem">【{くれたら|!Iあげたら／くれたら／もらったら|spacer:alpha}】</span>いいんだけど……。」'+
        '</div>'+
      '</div>'
    });
    </script>
