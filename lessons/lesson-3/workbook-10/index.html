    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～べきだ|l3-p7}」か「{!GRI|～べきではない|l3-p7}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem"><ruby>政治家<rt>せいじか</rt></ruby>は{もっと税金を安くす%(る/)|もっとぜいきんをやすくす%(る/)|' + Genki.getAlts('{もっと}{税金}を{安}くす{る}', '|ぜいきん|やす|') + 'answer;hint:make taxes cheaper}べきだ。</div>'+
        
        '<div class="problem">授業中は{隣の人と授業に関係ないことを話す|となりのひととじゅぎょうにかんけいないことをはなす|' + Genki.getAlts('{隣}の{人}と{授業}に{関係}ないことを{話}す', 'となり|ひと|じゅぎょう|かんけい|はな') + 'answer;hint:talk to the person next to you about things unrelated to class;width:430}べきではない。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '親は{小さい子どもを家に残して出かけるべきではない|ちいさいこどもをいえにのこしてでかけるべきではない|' + Genki.getAlts('{小}さい{子}{供}を{家}に{残}して{出}かけるべきではない', 'ちい|こ|ども|いえ|のこ|で') + 'answer;hint:you shouldn\'t leave little kids at home when you go out;width:390}と思う。<br><br>'+
            '小さい子どもだけで家にいるのは<ruby>危<rt>あぶ</rt></ruby>ないからだ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem"><ruby>健康<rt>けんこう</rt></ruby>のためには、{夜遅くに食べるべきではない|よるおそくにたべるべきではない|' + Genki.getAlts('{夜遅}くに{食}べるべきではない', 'よるおそ|た') + 'answer;hint:shouldn\'t eat late at night}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>田中<rt>たなか</rt></ruby>さんに借りた本を少し汚しちゃったんだけど、{新しいのを買って返すべき|あたらしいのをかってかえすべき|' + Genki.getAlts('{新}しいのを{買}って{返}すべき', 'あたら|か|かえ') + 'answer;hint:should buy a new one and return it;width:260}かな。<br><br>'+
            'B：うん、そうしたほうがいいと思うよ'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：若いうちに、何をしておいたほうがいいと思いますか。<br><br>'+
            'B：{色々な経験をしておくべきだと思います|いろいろなけいけんをしておくべきだとおもいます|' + Genki.getAlts('{色々}な{経験}をしておくべきだと{思}います', 'いろいろ|けいけん|おも') + 'answer;hint:I think that you should have all sorts of experiences;width:370}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
