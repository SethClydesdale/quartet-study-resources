    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～とは限らない|l3-p9}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：日本の大学生はみんなアルバイトをしていますね。<br><br>'+
            'B：アルバイトをしている人は多いですが、必ずしも日本の大学生が{みんなアルバイトをしている|everyone is working part-time}とは限りませんよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：日本人はよく海外旅行に行きますね。日本人はみんな外国に行くのが好きなんですか。<br><br>'+
            'B：いいえ、日本人が{みんな外国に行くのが好きだとは限りません|みんながいこくにいくのがすきだとはかぎりません|' + Genki.getAlts('みんな{外国}に{行}くのが{好}きだとは{限}りません', 'がいこく|い|す|かぎ') + 'answer;hint:it\'s not always the case that everyone likes going to foreign countries;width:500}よ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：グエンさんの親は社長はらしいよ。グエンさんも将来社長になるのかな？<br><br>'+
            'B：親が社長だからといって{子どもも社長になるとは限らない|こどももしゃちょうになるとはかぎらない|' + Genki.getAlts('{子}{供}も{社長}になるとは{限}らない', 'こ|ども|しゃちょう|かぎ') + 'answer;hint:it doesn\'t mean that their kid will become the president of a company as well;width:560}よ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">若いからといって、{健康だとは限りません|けんこうだとはかぎりません|' + Genki.getAlts('{健康}だとは{限}{りません}', 'けんこう|かぎ|らない') + 'answer;hint:doesn\'t necessarily mean that you\'re healthy;width:320}。</div>'+
        
        '<div class="problem">頭がよくても{仕事ができるとは限らない|しごとができるとはかぎらない|' + Genki.getAlts('{仕事}が{出来}るとは{限}{らない}', 'しごと|でき|かぎ|りません') + 'answer;hint:doesn\'t necessarily mean that you can do the job;width:350}。</div>'+
        
        '<div class="problem">私の国の人(日本人)は静かだと言われますが、{日本人がみんな静かだとは限りません|にほんじんがみんなしずかだとはかぎりません|' + Genki.getAlts('{日本人}がみんな{静}かだとは{限}りません', 'にほんじん|しず|かぎ') + 'answer;hint:doesn\'t mean that every Japanese person is quiet;width:360}。</div>'+
      '</div>'
    });
    </script>
