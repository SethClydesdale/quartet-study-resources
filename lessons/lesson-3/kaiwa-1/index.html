    <script>Genki.generateQuiz({

        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">お電話ありがとうございます。居酒屋「花火」です。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">すみません、明日の7時に予約をしているテイラーと申しますが、予約の<ruby>変更<rt>へんこう</rt></ruby>をしたいんですが。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">７時にご予約のテイラー様ですね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">はい。</div>'+
        '</div>'+

      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+

        '</div>'+
      '</div>'+

        '</div>'+
      '</div>'+
    '</div>'+

      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+

            '予約をしているテイラーと申しますが、{予約の変更をしたい|よやくのへんこうをしたい|' + Genki.getAlts('{予約}の{変更}をしたい', 'よやく|へんこう') + 'answer}んですが。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+

        '</div>'+
      '</div>'+
