    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|Nにとって|l3-p3}」を使って、1.と2.は文を<ruby>完成<rt>かんせい</rt></ruby>させ、3.と4.は質問に答えなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">大学生にとって一番<ruby>便利<rt>べんり</rt></ruby>なものは{パソコン|personal computer}です。</div>'+
        
        '<div class="problem"><ruby>富士山<rt>ふじさん</rt></ruby>は、{私の国の人にとって特別な山|わたしのくにのひとにとってとくべつなやま|' + Genki.getAlts('{私}の{国}の{人}にとって{特別}な{山}', 'わたし|くに|ひと|とくべつ|やま') + 'answer;hint:a special mountain to the people of my country;width:340}です。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：留学生にとって難しいことはどんなことだと思いますか。どうしてですか。<br><br>'+
            'B：{留学生にとって難しいことは、日本人の友達を作る|りゅうがくせいにとってむずかしいことは、にほんじんのともだちをつくる|' + Genki.getAlts('{留学生}にとって{難}しいことは、{日本人}の{友達}を{作}る', 'りゅうがくせい|むずか|にほんじん|ともだち|つく') + 'answer;hint:The hardest thing for exchange students is making friends with Japanese people;width:570}ことです。<br><br>'+
            '<span class="hidden">B：</span>{日本人と話すチャンスが少ない|にほんじんとはなすチャンスがすくない|' + Genki.getAlts('{日本人}と{話}すチャンスが{少}ない', 'にほんじん|はな|すく') + 'answer;hint:There\'s few chances to talk with Japanese people;width:350}からです。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：あなたにとって一番大切なことは何ですか。どうしてですか<br><br>'+
            'B：{私にとって一番大切なことは、何でもチャレンジしてみる|わたしにとっていちばんたいせつなことは、なんでもチャレンジしてみる|' + Genki.getAlts('{私}にとって{一番}{大切}なことは、{何}でもチャレンジしてみる', 'わたし|いちばん|たいせつ|なん') + 'answer;hint:The most important thing to me is to try challenging anything}ことです。<br><br>'+
            '<span class="hidden">B：</span>{チャレンジすれば強くなれる|チャレンジすればつよくなれる|answer;hint:If you challenge (yourself), you\'ll get stronger;width:330}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
