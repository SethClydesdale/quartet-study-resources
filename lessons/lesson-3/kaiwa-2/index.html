    <script>Genki.generateQuiz({

      '<span class="kotoba">なべ　hot pot</span>'+
      '<span class="kotoba">ついている　to be attached; to be included</span>'+
      '<span class="kotoba">おすすめ　recommendation</span><br>'+
      '<span class="kotoba">しいたけ　shiitake-mushrooms</span>'+
      '<span class="kotoba"><ruby>白菜<rt>はくさい</rt></ruby>　Chinese cabbage</span>'+
      '<span class="kotoba">とりあえず　for the time being; for the present</span><br>'+
      '<span class="kotoba"><ruby>足<rt>た</rt></ruby>りる　to be sufficient</span>'+
      '<span class="kotoba"><ruby>瓶<rt>びん</rt></ruby>ビール　bottle beer</span>'+
      '<span class="kotoba"><ruby>追加<rt>ついか</rt></ruby>(する)　to add; to make an additional order</span><br>'+
      '<span class="kotoba">レモンハイ　lemon sour cocktail</span>'+
      '<span class="kotoba"><ruby>氷<rt>こおり</rt></ruby>　ice</span>'+
      '<span class="kotoba">(～を)<ruby>抜<rt>ぬ</rt></ruby>く　without; not include</span><br>'+
      '<span class="kotoba"><ruby>以上<rt>いじょう</rt></ruby>で(お<ruby>願<rt>ねが</rt></ruby>いします)　That\'s it for now.</span>'+
    '</div>'+

    '{!AUDIO|kaiwa_l3-2}'+

    '<div id="script-kaiwa_l3-2" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">フォーマルな会話</strong>'+
        '<div class="title reduced center">居酒屋で</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">居酒屋でジョージ(ジ：)、<ruby>絵理<rt>えり</rt></ruby>(絵：)、メイリン(メ：)たちがメニューを見ながら店員(店：)と話している。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">お決まりでしょうか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">すみません、あの、この「ちゃんこなべコース」ってどんな料理が出るんですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">メインのちゃんこなべに、サラダ、ごはん、デザートがついている90分の飲み放題コースです。おすすめですよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">ちゃんこなべって、何が入っているんですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text"><ruby>鶏肉<rt>とりにく</rt></ruby>、<ruby>豆腐<rt>とうふ</rt></ruby>、しいたけ、あと、<ruby>白菜<rt>はくさい</rt></ruby>などの<ruby>野菜<rt>やさい</rt></ruby>が入っています。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">へえ。おいしそうだね。それにする？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">うん。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">じゃあ、そのコースをお願いします。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">かしこまりました。飲み放題のお飲み物はどうされますか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">みんな、とりあえずビールでいい？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">うん。10人だから、5本で<ruby>足<rt>た</rt></ruby>りるかな。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">うん。じゃあ、<ruby>瓶<rt>びん</rt></ruby>ビール5本、お願いします。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">少々お待ちください。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">〈30分後〉</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">あ、ビールなくなちゃった。<ruby>追加<rt>ついか</rt></ruby>で<ruby>頼<rt>たの</rt></ruby>もうか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text"><ruby>僕<rt>ぼく</rt></ruby>、次はレモンハイにする。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">オッケー。すみませーん。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">はーい。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">ビール5本とレモンハイ1つ、追加でお願いします。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">はい。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">あの、できれば、レモンハイの<ruby>氷<rt>こおり</rt></ruby>を抜いてもらえますか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">店</div>'+
          '<div class="text">はい、かしこまりました。レモンハイの氷抜きですね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">とりあえず、以上でお願いします。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+

    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="indent-block">'+
      '1. {!PLAY|kaiwa_l3-2|31.5} 客が注文した「コース」に含まれる<small>(be included)</small>料理にすべて〇/Oをつけなさい。<br>'+
      '<div class="sub-section inline">'+
        '　({〇|O|answer}) ちゃんこなべ　　({〇|O|answer}) サラダ　　({||width:21}) から<ruby>揚<rt>あ</rt></ruby>げ　　({||width:21}) 天ぷら　　({||width:21}) おさしみ　<br>'+
        '　({||width:21}) おにぎり　　({〇|O|answer}) ごはん　　({〇|O|answer}) デザート　　({〇|O|answer}) 飲み放題　'+
      '</div><br><br>'+
        
      '2. {!PLAY|kaiwa_l3-2|44.5} 客が注文した「なべ料理」に入っているものにすべて〇/Oをつけなさい。<br>'+
      '<div class="sub-section inline">'+
        '　({〇|O|answer}) <ruby>白菜<rt>はくさい</rt></ruby>などの<ruby>野菜<rt>やさい</rt></ruby>　　({||width:21}) 牛肉　　({||width:21}) <ruby>豚肉<rt>ぶたにく</rt></ruby>　　({〇|O|answer}) <ruby>鶏肉<rt>とりにく</rt></ruby>　　({||width:21}) 魚　<br>'+
        '　({||width:21}) えび　　({〇|O|answer}) <ruby>豆腐<rt>とうふ</rt></ruby>　　({||width:21}) まいたけ　　({〇|O|answer}) しいたけ　'+
      '</div><br><br><br>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>ジョージたちは料理や飲み物を注文する時、何と言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l3-2|25} <strong class="main-color">コースについて質問する時</strong><br>'+
          '<div class="example">'+
            'この「ちゃんこなべコース」って、{どんな料理が出る|どんなりょうりがでる|' + Genki.getAlts('どんな{料理}が{出}る', 'りょうり|で') + 'answer}んですか。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l3-2|40.6} <strong class="main-color">なべについて質問する時</strong><br>'+
          '<div class="example">'+
            'ちゃんこなべって、{何が入っている|なにがはいっている|' + Genki.getAlts('{何}が{入}っている', 'なに|はい') + 'answer}んですか。'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'
    });
