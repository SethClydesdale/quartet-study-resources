    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">3.</span>文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：日本の子どもはみんなゲームをしますか。<br><br>'+
            'B：いいえ、必ずしも日本の子どもが{みんなゲームをするとは限りません|みんなゲームをするとはかぎりません|answer;hint:it doesn\'t mean that they all play games;width:300}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：外国に住めば、みんなその国の言葉ができるようになると思いますか。<br><br>'+
            'B：いいえ、{外国に住んだからといって|がいこくにすんだからといって|' + Genki.getAlts('{外国}に{住}んだからと{言}って', 'がいこく|す|い') + 'answer;hint:just because you live in a foreign country;width:300}{みんながその国の言葉ができるようになるとは限らない|みんながそのくにのことばができるようになるとはかぎらない|' + Genki.getAlts('みんながその{国}の{言葉}が{出来}るようになるとは{限}らない', 'くに|ことば|でき|かぎ') + 'answer;hint:doesn\'t necessarily mean that everyone will be able to speak that country\'s language;width:600}と思います。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">{子どものうちに、外国語を勉強す%(る/)べき|こどものうちに、がいこくごをべんきょうす%(る/)べき|' + Genki.getAlts('{子}{供}のうちに、{外国語}を{勉強}す{る}べき', 'こ|ども|がいこくご|べんきょう|') + 'answer;hint:While you\'re still a child, you should study a foreign language;width:430}だ。</div>'+
        
        '<div class="problem">{両親が元気なうちに|りょうしんがげんきなうちに|' + Genki.getAlts('{両親}が{元気}なうちに', 'りょうしん|げんき') + Genki.getAlts('{両親}が{健康}なうちに', 'りょうしん|けんこう') + 'answer;hint:While my parents are still healthy;width:260}、旅行に連れていってあげたいです。</div>'+
        
        '<div class="problem">日本語が上手になりたかったら、{毎日勉強す%(る/)べき|まいにちべんきょうす%(る/)べき|' + Genki.getAlts('{毎日}{勉強}す{る}べき', 'まいにち|べんきょう|') + 'answer;hint:should study every day}だ。</div>'+
        
        '<div class="problem">図書館では{大きな声で話すべきではない|おおきなこえではなすべきではない|' + Genki.getAlts('{大}きな{声}で{話}すべきでは{ない}', 'おお|こえ|はな|ありません') + 'answer;hint:shouldn\'t talk loudly}。</div>'+
        
        '<div class="problem">{私にとって大切なものは|わたしにとってたいせつなものは|' + Genki.getAlts('{私}にとって{大切}なものは', 'わたし|たいせつ') + 'answer;hint:The most important thing to me is;width:250}、子供の時、母にもらった<ruby>指輪<rt>ゆびわ</rt></ruby>です。</div>'+
        
        '<div class="problem">{子どもにとって難しいことは|こどもにとってむずかしいことは|' + Genki.getAlts('{子}{供}にとって{難}しいことは', 'こ|ども|むずか') + 'answer;hint:The most difficult thing for kids is;width:240}、<ruby>我慢<rt>がまん</rt></ruby>することです。</div>'+
        
        '<div class="problem">{試験がないからといって、授業を休むべきではない|しけんがないからといって、じゅぎょうをやすむべきではない|' + Genki.getAlts('{試験}がないからと{言}って、{授業}を{休}むべきでは{ない}', 'しけん|い|じゅぎょう|やす|ありません') + 'answer;hint:You shouldn\'t be absent from class, just because there isn\'t an exam;width:490}。</div>'+
        
        '<div class="problem">{日本人だからといって、漢字が得意だとは限らない|にほんじんだからといって、かんじがとくいだとはかぎらない|' + Genki.getAlts('{日本人}だからと{言}って、{漢字}が{得意}だとは{限}{らない}', 'にほんじん|い|かんじ|とくい|かぎ|りません') + 'answer;hint:Just because someone is Japanese, doesn\'t mean that they\'re good at kanji;width:530}。</div>'+
        
        '<div class="problem">私は卒業後、{ツアーガイドとして日本に住みたい|ツアーガイドとしてにほんにすみたい|' + Genki.getAlts('ツアーガイドとして{日本}に{住}みたい{です}', 'にほん|す|') + 'answer;hint:I want to live in Japan as a tour guide;width:270}。</div>'+
        
        '<div class="problem">彼は前に{医者として働いていた|いしゃとしてはたらいていた|' + Genki.getAlts('{医者}として{働}いていた', 'いしゃ|はたら') + 'answer;hint:was working as a doctor}ことがあるそうだ。</div>'+
        
        '<div class="problem">私はスマートフォンを{予定をメモするのに使っている|よていをメモするのにつかっている|' + Genki.getAlts('{予定}をメモするのに{使}って{い}る', 'よてい|つか|') + Genki.getAlts('{予定}をメモするのに{使}って{い}ます', 'よてい|つか|') + 'answer;hint:using it for <ruby>noting down<rt>メモする</rt></ruby> my schedule;width:270}。</div>'+
      '</div>'
    });
    </script>
