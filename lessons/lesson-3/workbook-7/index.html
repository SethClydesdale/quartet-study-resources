    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～うちに|l3-p1}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">学生のうちに{色々な経験をした|いろいろなけいけんをした|' + Genki.getAlts('{色々}な{経験}をした', 'いろいろ|けいけん') + 'answer;hint:have various experiences}ほうがいい。</div>'+
        
        '<div class="problem">傘をもっていないので、{雨が降らないうちに|あめがふらないうちに|' + Genki.getAlts('{雨}が{降}らないうちに', 'あめ|ふ') + 'answer;hint:before it rains}帰りたいです。</div>'+
        
        '<div class="problem">自分の国ではできないから、{日本にいるうちに色々なお寺や神社に行きたい|にほんにいるうちにいろいろなおてらやじんじゃにいきたい|' + Genki.getAlts('{日本}にいるうちに{色々}なお{寺}や{神社}に{行}きたい', 'にほん|いろいろ|てら|じんじゃ|い') + 'answer;hint:I want to go to various temples and shrines while I\'m in Japan;width:440}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '<ruby>大川<rt>おおかわ</rt></ruby>：おいしそうですね。このスープ、<ruby>上田<rt>うえだ</rt></ruby>さんが作ったんですか。<br><br>'+
            '上田：ええ。{温かいうちに|あたたかいうちに|answer;hint:while it\'s hot}、食べてください。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：留学説明会は来週の月曜日の3時からだって。<br><br>'+
            'B：月曜日の3時ね。{忘れないうちに|わすれないうちに|answer;hint:before you forget}メモをしておこう。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：もうすぐ休みが終わるね。新学期は忙しくなりそうだなあ……。<br><br>'+
            'B：そうだね。{今のうちにゆっくり休んで|いまのうちにゆっくりやすんで|' + Genki.getAlts('{今}のうちにゆっくり{休}んで', 'いま|やす') + 'answer;hint:take it easy and rest while you can;width:250}おこう。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
