    <script>Genki.generateQuiz({

          '<span style="font-size:30px;">最～</span>　　'+

            '{最高||width:120}<hr class="dashed">'+

          '<div class="split-problem">'+
            '{最初||width:120}<hr class="dashed">'+
            '({さいしょ||width:120})'+

      '</div>'+

            '</div>'+
          '</div>'+
