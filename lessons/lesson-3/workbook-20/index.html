    <script>Genki.generateQuiz({

    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span>1.～6.の漢字の前に<span class="sub-section inline nospacing">　　</span>のどれかを<ruby>付<rt>つ</rt></ruby>けて単語を作り、<span class="ul-problem-color">　　</span>に書きなさい。また、(　)に読み方を書きなさい。同じ漢字は一度しか使えません。</p>'+

        '　芸術　　図書　　給　　国際　　店　　花　'+

        '<div class="example-problem">'+
          '<span style="font-size:30px;">～館</span>　　'+
          '<div class="split-problem">'+

          '</div>　'+

            '{図書館||width:120}<hr class="dashed">'+

          '<span style="font-size:30px;">～屋</span>　　'+

            '({はなや||width:120})'+
          '</div>'+
        '</div>'+

          '<span style="font-size:30px;">～料</span>　　'+
          '<div class="split-problem">'+
            '{授業料||width:120}<hr class="dashed">'+
            '({じゅぎょうりょう||width:120})'+
          '</div>　'+
          '<div class="split-problem">'+
            '{給料||width:120}<hr class="dashed">'+
            '({きゅうりょう||width:120})'+
          '</div>'+

          '<span style="font-size:30px;">～員</span>　　'+

          '<span style="font-size:30px;">～者</span>　　'+

            '{医者||width:120}<hr class="dashed">'+
            '({いしゃ||width:120})'+

            '{記者||width:120}<hr class="dashed">'+
            '({きしゃ||width:120})'+

        '</div>'+

          '<span style="font-size:30px;">～的</span>　　'+

            '({げいじゅつてき||width:120})'+

            '{国際的||width:120}<hr class="dashed">'+

        '</div>'+
      '</div>'+

        '　場　　者　　家　　書　　化　'+
      '</div><br><br>'+

            '</div>'+
          '</div>'+
