    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l3-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l3-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l3-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section vertical-text-box" style="width:auto;">'+
        '<div class="title reduced center">居酒屋 ～日本らしさが感じられる場所～</div>'+
        
        '<p class="text-passage vertical-text paragraph">'+
          '　<span class="line">「安い値段でおいしい料理やお酒を楽しみたい」「友達と仲良くなる機会を作りたい」、そして「日本らしさを感じたい」。</span>'+
          '<span class="line">そんな時は居酒屋に行くとよい。</span>'+
          '<span class="line">特にチェーンの居酒屋は数が多く、学生や会社帰りのサラリーマン、<ruby>主婦<rt>しゅふ</rt></ruby>、家族連れなど、様々な客に人気がある。</span>'+
          '<span class="line">人々は何を求めて居酒屋に行くのだろうか。</span>'+
          '<span class="line">その特徴から居酒屋の<ruby>魅力<rt>みりょく</rt></ruby>を考えてみたい。</span><br>'+
        
          '　<span class="line">一つめの特徴は、料理もお酒も種類が多いことだ。</span>'+
          '<span class="line">席に着き、メニューを見れば、そのことにすぐ気が付くだろう。</span>'+
          '<span class="line">サラダやデザートがあるのは普通の飲食店と変わらないが、<ruby>枝豆<rt>えだまめ</rt></ruby>やから<ruby>揚<rt>あ</rt></ruby>げなど、「おつまみ」と<ruby>呼<rt>よ</rt></ruby>ばれるお酒に合う料理がたくさんある。</span>'+
          '<span class="line">また、ビールやワインの他に、日本酒やチューハイなど、いろいろなお酒が注文できる点も異なる。</span>'+
          '<span class="line">ジュースやお茶などのソフトドリンクもあるので、お酒が飲めない人でも楽しむことができる。</span><br>'+
        '</p>'+
        '<hr class="dashed">'+
        '<p class="text-passage vertical-text paragraph">'+
          '　<span class="line">二つめの特徴<span class="ul-color">{!GRI|として|l3-p4}</span>考えられるのは、その安さだ。</span>'+
          '<span class="line">料理も飲み物も安い<span class="ul-color">{!GRI|ため|l3-p5}</span>、注文する時に値段を気にしなくていい。</span>'+
          '<span class="line">だから、あまりお金がない時でも安心して食べたり飲んだりできる。</span>'+
          '<span class="line">さらに、お酒を飲む量が多い人は、「飲み放題」というシステムを覚えておくといい。</span>'+
          '<span class="line">「飲み放題」では決まった金額を払えば、90分などと決められた時間内に何種類ものお酒が好きなだけ飲める。</span><br>'+
        
          '　<span class="line">しかし、<span class="ul-color">{!GRI|何と言っても|l3-p2}</span>最大の特徴は、居酒屋が交流の場になっていることだ。</span>'+
          '<span class="line">どの店にもたいてい個室があるので、居酒屋はグループで集まる<span class="ul-color">{!GRI|のに|l3-p10}</span>とても<ruby>便利<rt>べんり</rt></ruby>だ。</span>'+
          '<span class="line">例えば、大学のサークルの「飲み会」や会社のプロジェクトやイベント後の「打ち上げ」でよく使われる。</span>'+
          '<span class="line">年来の「忘年会」や年始の「新年会」なども開かれる。</span>'+
          '<span class="line">そういう集まりでみんなでわいわい話せば、疲れている時の息抜きやストレス解消にもなる。</span>'+
          '<span class="line">また、あまり話したことがなかった人と親しくなれるチャンスにもなる。</span><br>'+
        
          '　<span class="line">このように、おいしい料理やお酒が安く楽しめ、交流が深められる場所――それが居酒屋だ。</span>'+
          '<span class="line">あなたもぜひ一度、居酒屋に足を運んで、その独特な<ruby>雰囲気<rt>ふんいき</rt></ruby>を感じてみてほしい。</span>'+
        '</p>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>{!PLAY|yomimono_l3-2|25.2} 居酒屋はどんな人に人気がありますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{学生や会社帰りのサラリーマン、主婦、家族連れなど、様々な人|がくせいやかいしゃがえりのサラリーマン、しゅふ、かぞくづれなど、さまざまなひと|' + Genki.getAlts('{学生}や{会社}{帰}りのサラリーマン、{主婦}、{家族連}れなど、{様々}な{人}', 'がくせい|かいしゃ|がえ|しゅふ|かぞくづ|さまざま|ひと') + 'answer}に人気があります。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>2段落目には、居酒屋と普通の飲食店では何が違うと書かれていますか。2つ書きなさい。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">{!PLAY|yomimono_l3-2|59.9} {「おつまみ」と呼ばれるお酒に合う料理がたくさんある|「おつまみ」とよばれるおさけにあうりょうりがたくさんある|' + Genki.getAlts('「おつまみ」と{呼}ばれるお{酒}に{合}う{料理}がたくさんある', 'よ|さけ|あ|りょうり') + 'answer}ことです。</div>'+
      '<div class="problem">{!PLAY|yomimono_l3-2|72.5} {ビールやワインの他に、日本酒やチューハイなど、いろいろなお酒が注文できる|ビールやワインのほかに、にほんしゅやチューハイなど、いろいろなおさけがちゅうもんできる|' + Genki.getAlts('ビールやワインの{他}に、{日本酒}やチューハイなど、{色々}なお{酒}が{注文}{出来}る', 'ほか|にほんしゅ|いろいろ|さけ|ちゅうもん|でき') + 'answer}ことです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|yomimono_l3-2|96.9} 「あまりお金がない時でも安心して食べたり飲んだりできる」<small>(行19～20)</small>とありますが、それはどうしてですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{料理も飲み物も安いため、注文する時に値段を気にしなくていい|りょうりものみものもやすいため、ちゅうもんするときにねだんをきにしなくていい|' + Genki.getAlts('{料理}も{飲}み{物}も{安}い{ため}、{注文}する{時}に{値段}を{気}にしなくていい', 'りょうり|の|もの|やす|為|ちゅうもん|とき|ねだん|き') + 'answer}からです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">4.</span>{!PLAY|yomimono_l3-2|118.1} 「飲み放題」<small>(行21)</small>とは何ですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{決まった金額を払えば、決められた時間内に何種類ものお酒が好きなだけ飲めるシステム|きまったきんがくをはらえば、きめられたじかんないになんしゅるいものおさけがすきなだけのめるシステム|' + Genki.getAlts('{決}まった{金額}を{払}えば、{決}められた{時間内}に{何種類}ものお{酒}が{好}きなだけ{飲}めるシステム', 'き|きんがく|はら|き|じかんない|なんしゅるい|さけ|す|の') + 'answer}のことです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">5.</span>{!PLAY|yomimono_l3-2|137} どうして居酒屋はグループで集まるのに<ruby>便利<rt>べんり</rt></ruby>なのですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{どの店にもたいてい個室がある|どのみせにもたいていこしつがある|' + Genki.getAlts('どの{店}にもたいてい{個室}がある', 'みせ|こしつ') + 'answer}からです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">6.</span>{!PLAY|yomimono_l3-2|145.7} 「打ち上げ」<small>(行28)</small>とは何ですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{プロジェクトやイベントの後の飲み会%(パーティー/)|プロジェクトやイベントのあとののみかい%(パーティー/)|' + Genki.getAlts('プロジェクトやイベントの{後}の{飲}み{会}{パーティー}', 'あと|の|かい|') + 'answer}のことです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">7.</span>{!PLAY|yomimono_l3-2|145.7} 「そういう集まり」<small>(行29～30)</small>とは何を<ruby>指<rt>さ</rt></ruby>しますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{「飲み会」「打ち上げ」「忘年会」「新年会」など|「のみかい」「うちあげ」「ぼうねんかい」「しんねんかい」など|' + Genki.getAlts('「{飲}み{会}」「{打}ち{上}げ」「{忘年会}」「{新年会}」など', 'の|かい|う|あ|ぼうねんかい|しんねんかい') + 'answer}を指します。</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('yomimono_l3-2', [
