    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|Nとして|l3-p4}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '子ども：この新聞紙、集めた後どうなるの？<br><br>'+
            '　　父：リサイクルされて、{トイレットペーパー||width:150;hint:toilet paper}として使われるんだよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>山田<rt>やまだ</rt></ruby>さんは今、ベトナムにいるそうですね。何をしているんですか。<br><br>'+
            'B：{日本語の先生として働い|にほんごのせんせいとしてはたらい|' + Genki.getAlts('{日本語}の{先生}として{働}い', 'にほんご|せんせい|はたら') + 'answer;hint:Working as a Japanese teacher}ているそうですよ。(山田さん＝日本語の先生)'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">私の将来の夢は{映画監督としてハリウッドで仕事をする|えいがかんとくとしてハリウッドでしごとをする|' + Genki.getAlts('{映画}{監督}としてハリウッドで{仕事}をする', 'えいが|かんとく|しごと') + 'answer;hint:to work as a movie director in <ruby>Hollywood<rt>ハリウッド</rt></ruby>}ことです。</div>'+
        
        '<div class="problem"><ruby>京都<rt>きょうと</rt></ruby>は{長い歴史がある町として|ながいれきしがあるまちとして|' + Genki.getAlts('{長}い{歴史}がある{町}として', 'なが|れきし|まち') + 'answer;hint:as a town with a long history}有名です。</div>'+
        
        '<div class="problem">私の町は{日本一観光客が多い町として|にっぽんいちかんこうきゃくがおおいまちとして|' + Genki.getAlts('{日本一}{観光客}が{多}い{町}として', 'にっぽんいち|かんこうきゃく|おお|まち') + Genki.getAlts('{日本一}{観光客}が{多}い{町}として', 'にほんいち|かんこうきゃく|おお|まち') + 'answer;hint:as Japan\'s #1 town with many tourists}知られています。</div>'+
      '</div>'
    });
