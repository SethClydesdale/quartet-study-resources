    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～からといって|l3-p8}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：来週、国の友達が日本に来るんだ。授業をサボって<ruby>一緒<rt>いっしょ</rt></ruby>に<ruby>遊<rt>あそ</rt></ruby>びに行きたいなあ。<br><br>'+
            'B：{国の友達が来る|くにのともだちが来る|' + Genki.getAlts('{国}の{友}{達}が{来}る', 'くに|とも|だち|く') + 'answer;hint:A friend from home (country);width:220}からといって、授業をサボってはいけないよ！'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ジョージが<ruby>絵理<rt>えり</rt></ruby>ちゃんに「新しい<ruby>髪型<rt>かみがた</rt></ruby>、こわいね」って言ったんだって。<br>'+
            '<span class="hidden">A：</span>「かわいい」と間違えたらしいよ。あっははははは。あー、おもしろい。<br><br>'+
            'B：{おもしろいからといって|面白いからと言って|' + Genki.getAlts('{面白}いからと{言}って', 'おもしろ|い') + 'answer;hint:Just because it\'s funny}、人の間違いを笑わないほうがいいよ。<br>'+
            '<span class="hidden">B：</span>ジョージも<ruby>頑張<rt>がんば</rt></ruby>って日本語を話しているんだから。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：天気予報で今日は<ruby>晴<rt>は</rt></ruby>れだって言ってたのに、雨が降ってきた……。<br><br>'+
            'B：{天気予報で晴れだと言っていたからといって|てんきよほうではれだといっていたからといって|' + Genki.getAlts('{天気}{予報}で{晴}れだと{言}って{い}たからと{言}って', 'てんき|よほう|は||い|い') + 'answer;hint:Just because they said it would be sunny on the weather forecast;width:460}雨が降らないとは限らないんだね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">{失敗したからといって諦めないで|しっぱいしたからといってあきらめないで|' + Genki.getAlts('{失敗}したからと{言}って{諦}めないで', 'しっぱい|い|あきら') + 'answer;hint:Don\'t give up just because you failed}ください。</div>'+
        
        '<div class="problem">{いい大学を卒業したからといって|いいだいがくをそつぎょうしたからといって|' + Genki.getAlts('いい{大学}を{卒業}したからと{言}って', 'だいがく|そつぎょう|い') + 'answer;hint:Just because you graduated from a good college;width:350}、いい会社に入れるとは限らない。</div>'+
        
        '<div class="problem">{お金持ちだからといって幸せだとは限らない|おかねもちだからといってしあわせだとはかぎらない|' + Genki.getAlts('お{金持}ちだからと{言}って{幸}せだとは{限}らない', 'かねも|い|しあわ|かぎ') + 'answer;hint:Just because you\'re rich doesn\'t necessarily mean that you\'ll be happy;width:500}。</div>'+
      '</div>'
    });
    </script>
