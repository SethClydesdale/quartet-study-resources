    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">スピーチを聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>イタリア人留学生のアンドレアが、クラスで「レストランで<ruby>並<rt>なら</rt></ruby>ぶこと」についてスピーチをしています。スピーチを聞いて質問に答えなさい。</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba"><ruby>並<rt>なら</rt></ruby>ぶ　to line up</span>'+
      '<span class="kotoba"><ruby>行列<rt>ぎょうれつ</rt></ruby>　line</span>'+
      '<span class="kotoba"><ruby>発売<rt>はつばい</rt></ruby>される　to be released</span>'+
    '</div>'+

    '{!AUDIO|chokai_l3-2}'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l3-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l3-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">レストランで<ruby>並<rt>なら</rt></ruby>ぶこと</div>'+
        '　<span class="line">週末、日本人の友達と晩ご飯を食べに行きました。</span>'+
        '<span class="line">その友達が「食べたいラーメンがある」と言うのでそのお店に行ったのですが、私たちが行った時には、もうたくさんの人が<ruby>並<rt>なら</rt></ruby>んでいました。</span>'+
        '<span class="line">お店の人に聞いたら、「１時間ほどかかります」と言うのです。</span>'+
        '<span class="line">そんなに待ちたくなかったので、私は「別の店に行こう」と言ったのですが、友達が「絶対にここで食べたい」と言うので、<ruby>結局<rt>けっきょく</rt></ruby><ruby>行列<rt>ぎょうれつ</rt></ruby>に並ぶことになりました。</span><br>'+
        
        '　<span class="line">待っている間に、友達に、「日本人は待つのが好きだよね。本当によく行列を見るよ」と言ったら、</span>'+
        '<span class="line">「外国の人も並んでるよ。</span>'+
        '<span class="line">何か新しいものが発売される時は、どこでもたくさん並んでるでしょう？</span>'+
        '<span class="line">例えば、スマートフォンとか、テレビゲームとか。</span>'+
        '<span class="line">それに、イタリアに旅行に行った時、ピザの店で<ruby>結構<rt>けっこう</rt></ruby>待たされたよ」と言われました。</span><br>'+
        
        '　<span class="line">確かに日本人だけが長い行列に並ぶ{!GRI|とは限りません|l3-p9}。</span>'+
        '<span class="line">でも、日本人{!GRI|にとって|l3-p3}行列に並ぶことは、あまり大変なことではないようだと感じます。</span>'+
        '<span class="line">みなさんは何のためなら並んでもいいですか。</span>'+
        '<span class="line">どのぐらいの時間なら待てますか。</span>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>スピーチの<ruby>内容<rt>ないよう</rt></ruby>に<ruby>合<rt>あ</rt></ruby>うものに〇/O、合わないものに×/Xをつけなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">{!PLAY|chokai_l3-2|38.9} ({〇|O|answer}) アンドレアたちは、ラーメン屋で1時間くらい待たなくてはいけなかった。</div>'+
      '<div class="problem">{!PLAY|chokai_l3-2|45.3} ({×|X|answer}) アンドレアは、おいしいラーメンを食べるためだったら、長い時間待てる。</div>'+
      '<div class="problem">{!PLAY|chokai_l3-2|61.8} ({×|X|answer}) アンドレアは、日本人は待つのが好きじゃないと思っている。</div>'+
      '<div class="problem">{!PLAY|chokai_l3-2|72.1} ({〇|O|answer}) アンドレアの友達によると、外国の人もよく並んでいるそうだ。</div>'+
      '<div class="problem">{!PLAY|chokai_l3-2|84.4} ({×|X|answer}) アンドレアの友達は、イタリアのピザやで<ruby>行列<rt>ぎょうれつ</rt></ruby>に並ばなかった。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|chokai_l3-2|74.6} アンドレアの友達によると、外国人はどんなものが発売される時、並びますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{スマートフォンやテレビゲームなど、新しいものが発売される時です|スマートフォンやテレビゲームなど、あたらしいものがはつばいされるときです|' + Genki.getAlts('{スマートフォン}やテレビゲームなど、{新}しいものが{発売}される{時}{です}', 'スマホ|あたら|はつばい|とき|だ') + 'answer;width:600}。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|chokai_l3-2|99.5} アンドレアの考えによると、日本人は<ruby>行列<rt>ぎょうれつ</rt></ruby>に並ぶことをどのように思っていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{あまり大変なことではないと思っています|あまりたいへんなことではないとおもっています|' + Genki.getAlts('あまり{大変}なことではないと{思}って{い}ます', 'たいへん|おも|') + Genki.getAlts('あまり{大変}なことではないと{思}って{い}る', 'たいへん|おも|') + 'answer;width:600}。</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('chokai_l3-2', [
      [20, 25.1],

      [38.9, 44.5],

    ]);
