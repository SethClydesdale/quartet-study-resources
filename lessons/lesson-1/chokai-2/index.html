    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">スピーチを聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>アメリカ人留学生のジョージが、クラスで「店員へのあいさつ」というタイトルでスピーチをしています。スピーチを聞いて質問に答えなさい。</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba"><ruby>変<rt>へん</rt></ruby>な<ruby>顔<rt>かお</rt></ruby>をする　to have a puzzled look</span>'+    
      '<span class="kotoba"><ruby>不思議<rt>ふしぎ</rt></ruby>に<ruby>思<rt>おも</rt></ruby>う　to wonder</span>'+    
      '<span class="kotoba"><ruby>様子<rt>ようす</rt></ruby>を<ruby>見<rt>み</rt></ruby>る　to watch</span>'+    
    '</div>'+

    '{!AUDIO|chokai_l1-2}'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l1-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l1-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '　<span class="line">日本に着いた日、飲み物を買う<span class="ul-color">{!GRI|ために|l1-p5}</span>コンビニ行きました。</span>'+
        '<span class="line">店に入ると店員さんが笑顔で「いっらしゃいませ、こんにちは」とあいさつをしてくれたので、私も笑顔で「こんにちは」と<ruby>返<rt>かえ</rt></ruby>したら、なぜか店員さんに変な顔をされてしまいました。</span><br>'+
        '　<span class="line">次の日、スーパーのレジでも同じようなことがありました。</span>'+
        '<span class="line">「お待たせしました」と言われたので「いえいえ、<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>です」と返したのですが、また変な顔をされてしまいました。</span><br>'+
        '　<span class="line"><ruby>不思議<rt>ふしぎ</rt></ruby>に思って<ruby>他<rt>ほか</rt></ruby>のお<ruby>客<rt>きゃく</rt></ruby>さんの<ruby>様子<rt>ようす</rt></ruby>を見てみると、店員さんに<ruby>返事<rt>へんじ</rt></ruby>をする人はあまりいません。</span>'+
        '<span class="line">コンビニでアルバイトをしている日本人の<ruby>友達<rt>ともだち</rt></ruby><span class="ul-color">{!GRI|によると|l1-p9}</span>、レジで店員さんに「こんにちは」などとあいさつするお客さんはほとんどいない<span class="ul-color">{!GRI|らしい|l1-p4}</span>です。</span>'+
        '<span class="line">「いらっしゃいませ、こんにちは」はマニュアル<span class="ul-color">{!GRI|どおり|l1-p3}</span>のあいさつで、意味がないのかもしれません。</span>'+
        '<span class="line">でも、店員さんにあいさつしてもらったら、あいさつを返すほうが気持ちよく買い物ができるし、店員さんも楽しく働けると思います。</span>'+
        '<span class="line">みなさんはどう思いますか。</span>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>スピーチの<ruby>内容<rt>ないよう</rt></ruby>に<ruby>合<rt>あ</rt></ruby>うものに〇/O、合わないものに×/Xをつけなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">{!PLAY|chokai_l1-2|27} ({×|X|answer}) 店員はジョージにあいさつしなかった</div>'+
      '<div class="problem">{!PLAY|chokai_l1-2|27} ({×|X|answer}) ジョージは店員にあいさつしなかった</div>'+
      '<div class="problem">{!PLAY|chokai_l1-2|45} ({×|X|answer}) ジョージはスーパーで「こんにちは」と言われた。</div>'+
      '<div class="problem">{!PLAY|chokai_l1-2|62.5} ({〇|O|answer}) <ruby>他<rt>ほか</rt></ruby>の日本人は、店員に返事をしない。</div>'+
      '<div class="problem">{!PLAY|chokai_l1-2|72} ({〇|O|answer}) コンビニの店員の「こんにちは」にはあまり意味がないらしい。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|chokai_l1-2|85} ジョージがコンビニに行った時に、店員が変な顔をしたのはどうしてですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{店員さんに「こんにちは」と言われて、「こんにちは」と返したからです。|てんいんさんに「こんにちは」といわれて、「こんにちは」とかえしたからです。|' + Genki.getAlts('{店員}さんに{「}こんにちは{」}と{言}われて、{「}こんにちは{」}と{返}したから{です}。', 'てんいん|||い|||かえ|') + 'answer}</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|chokai_l1-2|94} ジョージは、どうして店員にあいさつを返したほうがいいと思っていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{あいさつを返すほうが気持ちよく買い物ができるし、店員さんも楽しく働けると思っているからです。|あいさつをかえすほうがきもちよくかいものができるし、てんいんさんもたのしくはたらけるとおもっているからです。|' + Genki.getAlts('{あいさつ}を{返}す{ほう}が{気持}ちよく{買}い{物}が{でき}るし、{店員}さんも{楽}しく{働}けると{思}って{い}るから{です}。', '挨拶|かえ|方|きも|か|もの|出来|てんいん|たの|はたら|おも||') + 'answer}</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('chokai_l1-2', [

      [51, 61], 
      [62.5, 71], 
      [72, 84], 
      [85, 92],

    ]);
