    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span><span class="sub-section inline nospacing">　　</span>の言葉をを使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。同じ言葉は一度しか使えません。</p>'+
      
      '<div class="count-problems indent-block">'+
        '<div class="sub-section inline">'+
          '　{!GRI|～といえば|l1-p1}　　{!GRI|～がきっかけで|l1-p6}　　{!GRI|～のような|l1-p002-3}　　{!GRI|～によると|l1-p9}　<br>'+
          '　{!GRI|～らしい|l1-p4}　　{!GRI|～ようになる|l1-p7}　　{!GRI|～とおりに|l1-p3}　'+
        '</div><br><br>'+
        
        '<div class="problem">新聞{によると}、日本の<ruby>経済<rt>けいざい</rt></ruby>はよくなっているそうだ。</div>'+
        
        '<div class="problem">部長に言われた{とおりに|通りに|answer}したのに、<ruby>文句<rt>もんく</rt></ruby>を言われてしまった。</div>'+
        
        '<div class="problem">世界で有名な日本の映画{といえば|と言えば|answer}、<ruby>宮崎<rt>みやざき</rt></ruby><ruby>監督<rt>かんとく</rt></ruby>の映画だろう。</div>'+
        
        '<div class="problem">高校の時、日本人留学生が私の学校に来たこと{がきっかけで|}、日本語を勉強したいと思うようになりました。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '留学生A：日本{らしい}おみやげが買いたいんだけど、何がいいと思う？<br>'+
            '留学生B：着物はどう？'+
          '</div>'+
        '</div>'+
      '</div>'
    });
