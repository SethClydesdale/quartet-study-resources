    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l1-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l1-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l1-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section vertical-text-box">'+
        '<div class="title reduced center">ノーベル賞を取った研究者<ruby>山中伸弥<rt>やまなかしんや</rt></ruby>教授</div>'+
        
        '<p class="text-passage vertical-text paragraph">'+
          '　<span class="line">「iPS<ruby>細胞<rt>さいぼう</rt></ruby>」という言葉を聞いたことがありますか。</span>'+
          '<span class="line">iPS細胞というのは、体のいろいろな部分になることができる細胞です。</span>'+
          '<span class="line">近い将来、iPS細胞で難しい病気の人を助けられる<span class="ul-color">{!GRI|ようになる|l1-p7}</span>と考えられていて、「夢の細胞」とも言われています。</span>'+
          '<span class="line">この細胞を作ったのが、研究者の<ruby>山中伸弥<rt>やまなかしんや</rt></ruby>教授です。</span>'+
          '<span class="line">彼は2012年、50歳の時に、iPS細胞の研究でノーベル賞を受賞しました。</span><br>'+

          '　<span class="line">山中教授は1962年生まれて、出身は<ruby>大阪<rt>おおさか</rt></ruby>です。</span>'+
          '<span class="line">彼は学生時代に<ruby>柔道<rt>じゅうどう</rt></ruby>やラグビーをしていて、何回もけがをしました。</span>'+
          '<span class="line">そのこと<span class="ul-color">{!GRI|がきっかけで|l1-p6}</span>、けがをした人を助けられる医者になろうと決心しました。</span>'+
          '<span class="line">しかし、病院で働き始めた時、病気をなおす<span class="ul-color">{!GRI|ための|l1-p5}</span>方法がなくて苦しんでいる人がたくさんいるのを知って、ショックを受けました。</span>'+
          '<span class="line">それが、医者をやめて研究をしようと思った理由の一つだったそうです。</span><br>'+
        
          '　<span class="line">山中教授は明るい性格でおもしろい人です。</span>'+
          '<span class="line">講演では必ず1回は笑わせる<span class="ul-color">{!GRI|ようにしている|l1-p8}</span>そうです。</span>'+
        '</p>'+
        '<hr class="dashed">'+
        '<p class="text-passage vertical-text paragraph">'+
          '<span class="line">例えば、医者だった時にした手術の話があります。</span>'+
          '<span class="line"><ruby>患者<rt>かんじゃ</rt></ruby>は山中教授の友人でした。</span>'+
          '<span class="line">15分ほどの簡単な手術だったのですが、山中教授は手術が苦手なので、1時間以上かかってしまいました。</span>'+
          '<span class="line">それで、手術中の友人に「すまん」とあやまりました。</span>'+
          '<span class="line">声が聞こえた友人は、「すまんって……」と不安になったそうです。</span><br>'+
        
          '　<span class="line">教授<span class="ul-color">{!GRI|によると|l1-p9}</span>、「人生の目標は、iPSの技術をベッドサイドに<ruby>届<rt>とど</rt></ruby>けて、多くの患者を<ruby>救<rt>すく</rt></ruby>う事」だそうです。</span>'+
          '<span class="line">教授がアメリカ留学中に学んで大切にしている「VW」という言葉があります。</span>'+
          '<span class="line">これは、研究で結果を出す<span class="ul-color">{!GRI|ために|l1-p5}</span>はV<span class="sideways">(Vision)</span>とW<span class="sideways">(Work hard)</span>、つまり、「目標を決めてがんばる」ことが必要だという意味です。</span>'+
          '<span class="line">「9回<ruby>失敗<rt>しっぱい</rt></ruby>しないと1回<ruby>成功<rt>せいこう</rt></ruby>しない。失敗するのは、はずかしいことではない」という言葉<span class="ul-color">{!GRI|どおり|l1-p3}</span>、山中教授はiPS細胞ができるまで決して研究をやめませんでした。</span>'+
          '<span class="line">これが、彼が多くの人に尊敬されている理由なのかもしれません。</span>'+
        '</p>'+
      '</div>'+
    '</div>'+
    '<br>'+
     
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>{!PLAY|yomimono_l1-2|49.8} 「ショックを受けました」<small>(行13-14)</small>の<ruby>主語<rt>しゅご</rt></ruby>はだれですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{山中教授|!I病気の人／山中教授／多くの人|spacer:alpha}</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|yomimono_l1-2|70} 山中教授はどうして「ショックを受けました」<small>(行13-14)</small>か。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{病気をなおすための方法がなくて苦しんでいる人がたくさんいるのを知った|びょうきをなおすためのほうほうがなくてくるしんでいるひとがたくさんいるのをしった|' + Genki.getAlts('{病気}を{治}す{為}の{方法}がなくて{苦}しんで{い}る{人}が{沢山}いるのを{知}った', 'びょうき|なお|ため|ほうほう|くる||ひと|たくさん|し') + 'answer}からです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|yomimono_l1-2|94} 山中教授は講演の時に何をするようにしていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{必ず1回は笑わせる|かならず1かいはわらわせる|answer' + Genki.getAlts('{必}ず{一回}は{笑}わせる', 'かなら|いっかい|わら') + Genki.getAlts('{必}ず1{回}は{笑}わせる', 'かなら|かい|わら') + 'answer}ようにしています。</div>'+
    '</div>'+
     
    '<p class="sectionDesc"><span class="sectionNumber">4.</span>{!PLAY|yomimono_l1-2|125} 「不安になった」<small>(行22-23)</small>の主語はだれですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{友人|!I友人／山中教授／講演を聞いている人|spacer:alpha}</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">5.</span>{!PLAY|yomimono_l1-2|133} 山中教授が言っている「人生の目標」とは何ですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{iPSの技術をベッドサイドに届けて多くの患者を救うこと|iPSのぎじゅつをベッドサイドにとどけておおくのかんじゃをすくうこと|' + Genki.getAlts('iPSの{技術}をベッドサイドに{届}けて{多}くの{患者}を{救}うこと', 'ぎじゅつ|とど|おお|すく') + 'answer}です。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">6.</span>{!PLAY|yomimono_l1-2|151.5} 「V(Vision)とW(Work hard)」<small>(行28)</small>は、それぞれどういう意味ですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">&bull; V (Vision) {「目標を決める」という意味です|「もくひょうをきめる」といういみです|' + Genki.getAlts('{「}{目標}を{決}める{」}という{意味}です', '|もくひょう|き||いみ') + 'answer}。</div>'+
      '<div class="problem">&bull; W (Work hard) {「がんばる」という意味です|「がんばる」といういみです|' + Genki.getAlts('「{頑張}る」という{意味}です', 'がんば|いみ') + 'answer}。</div>'+
    '</div>'
    });
