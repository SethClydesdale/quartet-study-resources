    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba">ジブリ<ruby>美術館<rt>びじゅつかん</rt></ruby>　Ghibli Museum (the animation and art museum of Studio Ghibli, the animation studio founded by Hayao Miyazaki)</span><br>'+
      '<span class="kotoba">むし<ruby>暑<rt>あつ</rt></ruby>い　muggy</span>'+
      '<span class="kotoba">ぎょうざ　dumpling</span><br>'+
      '<span class="kotoba"><ruby>順番<rt>じゅんばん</rt></ruby>に　in turn</span>'+
      '<span class="kotoba">～<ruby>専門<rt>せんもん</rt></ruby>　specialized in ~</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|kaiwa_l1-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l1-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l1-2" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">カジュアルな会話</strong>'+
        '<div class="title reduced center">授業の前に</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">授業の前にジョージ(ジ：)がメイリン(メ：)に話しかける。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">メイリン、おはよう。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">おはよう。今日も朝からむし<ruby>暑<rt>あつ</rt></ruby>いね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">そうだね。もうすぐ10月なのに、信じられない。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">本当。ところで、週末は何してたの？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text"><ruby>友達<rt>ともだち</rt></ruby>と<ruby>東京<rt>とうきょう</rt></ruby>に行ったんだ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">えっ、そうだったの？で、どこに行ったの？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">ジブリ<ruby>美術館<rt>びじゅつかん</rt></ruby>。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">え、あの<ruby>宮崎<rt>みやざき</rt></ruby><ruby>監督<rt>かんとく</rt></ruby>の？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">そうそう。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">いいなあ。それで、どうだった？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">宮崎監督が<ruby>描<rt>か</rt></ruby>いた本物の絵があって感動したよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">へえ。<ruby>他<rt>ほか</rt></ruby>にはどんなものがあるの？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">15分ぐらいのオリジナル映画がすごくよかったよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">おもしろそう。私もいつか行きたいな。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">ところで、メイリンは週末、何をしてたの？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text"><ruby>寮<rt>りょう</rt></ruby>の友達とぎょうざパーティーをしたんだ。いろんな国の人が住んでいるから、毎週<ruby>順番<rt>じゅんばん</rt></ruby>に国の料理を作ってるの。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">えー！今度、<ruby>僕<rt>ぼく</rt></ruby>も行ってもいい？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">もちろん！でも、食べるだけじゃなくて、ジョージも何か作ってね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">……作らなきゃだめ？僕、食べるの<ruby>専門<rt>せんもん</rt></ruby>がいいな。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l1-2|15} 今日はどんな天気ですか。<br>'+
          '{蒸し暑いです|むしあついです|' + Genki.getAlts('{蒸}し{暑}い{です}', 'む|あつ|') + 'answer;width:350}。'+
        '</div>'+
      '</div>'+
      
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l1-2|30} ジョージは週末、どこに行きましたか。<br>'+
          '{ジブリ美術館%(です/)|ジブリびじゅつかん%(です/)|' + Genki.getAlts('ジブリ{美術館}{です}', 'びじゅつかん|だ') + 'answer;width:350}。'+
        '</div>'+
      '</div>'+
      
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l1-2|59} メイリンは週末、何をしましたか。<br>'+
          '{寮の友達と餃子パーティーをしました|りょうのともだちとぎょうざパーティーをしました|' + Genki.getAlts('{寮}の{友}{達}と{餃子}パーティーを{しました}', 'りょう|とも|だち|ぎょうざ|した') + 'answer;width:350}。'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span><ruby>話題<rt>わだい</rt></ruby>を変える時、ジョージとメイリンは何を言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l1-2|23.2} <strong class="main-color">メイリンが話題を「天気」から「週末」に変える時</strong><br>'+
          '<div class="example AB">'+
            '<div class="line">'+
              '<div class="name">ジ</div>'+
              '<div class="text">……もうすぐ10月なのに、信じられない。</div>'+
            '</div>'+
            '<div class="line">'+
              '<div class="name">メ</div>'+
              '<div class="text">本当。{ところで|所で|answer}、週末は何してたの？</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l1-2|39.1} <strong class="main-color">メイリンがジョージの答えについて、もっとくわしく聞いた時</strong><br>'+
          '<div class="example AB">'+
            '<div class="line">'+
              '<div class="name">ジ</div>'+
              '<div class="text">そうそう。</div>'+
            '</div>'+
            '<div class="line">'+
              '<div class="name">メ</div>'+
              '<div class="text">いいなあ。{それで}、どうだった？</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<div class="box-color bg padded min-width">'+
      '<h4 class="sub-title-color" style="margin:5px 0;"><i class="fa">&#xf0eb;</i> <span class="en">Noteworthy Points</span><span class="ja">ここにも注目</span></h4>'+
      '<ul>'+
        '<li>{!GRI|～なきゃ|l1-p0003}</li>'+
        '<li>{!GRI|天気|l1-p0004}</li>'+
      '</ul>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('kaiwa_l1-2', [
      [8, 11],
      [13.5, 14.5],
      [15, 18.5],

      [23.2, 27.5],
      [28, 29.5],
      [30, 33.5],
      [33.6, 35],

      [38.3, 39],
      [39.1, 42.4],

      [76, 80.5],
      [81, 86]
    ]);

    Genki.stickyAudio.init('static-audio');
