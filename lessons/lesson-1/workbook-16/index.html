    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span>次の表を<ruby>完成<rt>かんせい</rt></ruby><small>(to complete)</small>させなさい。</p>'+
      '<div class="count-problems">'+
        '<table class="table large-width center">'+
          '<tr class="table-head">'+
            '<td>{!GRI|です・ます<ruby>体<rt>たい</rt></ruby>|l1-p001-1}</td>'+
            '<td>だ<ruby>体<rt>たい</rt></ruby></td>'+
            '<td>である<ruby>体<rt>たい</rt></ruby></td>'+
          '</tr>'+

          '<tr>'+
            '<td>本です</td>'+
            '<td class="problem">{本だ|ほんだ|answer}</td>'+
            '<td class="problem">{本である|ほんである|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td>本ではありません</td>'+
            '<td class="problem">{本ではない|ほんではない|answer}</td>'+
            '<td></td>'+
          '</tr>'+

          '<tr>'+
            '<td>きれいでした</td>'+
            '<td class="problem">{きれいだった|綺麗だった|answer}</td>'+
            '<td class="problem">{きれいであった|綺麗であった|answer}</td>'+
          '</tr>'+

          '<tr>'+
            '<td>きれいではありませんでした</td>'+
            '<td class="problem">{きれいではなかった|綺麗ではなかった|answer}</td>'+
            '<td></td>'+
          '</tr>'+

          '<tr>'+
            '<td>かわいい</td>'+
            '<td class="problem">{かわいい|可愛い|answer}</td>'+
            '<td></td>'+
          '</tr>'+

          '<tr>'+
            '<td>かわいくありません</td>'+
            '<td class="problem">{かわいくない|可愛くない|answer}</td>'+
            '<td></td>'+
          '</tr>'+

          '<tr>'+
            '<td>かわいかったです</td>'+
            '<td class="problem">{かわいかった|可愛かった|answer}</td>'+
            '<td></td>'+
          '</tr>'+

          '<tr>'+
            '<td>かわいくありませんでした</td>'+
            '<td class="problem">{かわいくなかった|可愛くなかった|answer}</td>'+
            '<td></td>'+
          '</tr>'+

          '<tr>'+
            '<td>留学します</td>'+
            '<td class="problem">{留学する|りゅうがくする|answer}</td>'+
            '<td></td>'+
          '</tr>'+
        '</table>'+

    });
