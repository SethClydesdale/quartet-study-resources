    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span>「{!GRI|そうだ|l1-p002-1}」「{!GRI|らしい|l1-p002-2}」「{!GRI|ようだ|l1-p002-3}」のどれかを使って、文を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem"><ruby>昨日<rt>きのう</rt></ruby>デパートでおいし{そうな}ケーキを見つけたが、高ったので買わなかった。</div>'+
        '<div class="problem"><ruby>長崎<rt>ながさき</rt></ruby>はカステラが有名だ{そうだ}。</div>'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '日本では電車でマンガを読んでいる学生や会社員をよく見る。<br>'+
            '日本は子どもだけじゃなく大人もマンガをよく読む{ようだ}。'+
          '</div>'+
        '</div>'+
        '<div class="problem">今は10月(＝秋)ですが、毎日とても<ruby>暑<rt>あつ</rt></ruby>くて、夏{のような}天気です。</div>'+
        '<div class="problem">今は8月(＝夏)です。毎日とても暑くて、夏{らしい}天気です。</div>'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：最近、疲れている{ようだ}ね。元気がないし、顔色も悪いし……。<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>？<br>'+
            'B：うん。バイトが<ruby>忙<rt>いそが</rt></ruby>しくて……。'+
          '</div>'+
        '</div>'+
        '<div class="problem">私の5歳の弟は、子ども{らしい}です。毎日、外で元気に<ruby>遊<rt>あそ</rt></ruby>んでいます。</div>'+
        '<div class="problem">私の5歳の弟はいつも勉強していて、あまり子ども{らしく}ない。</div>'+
        '<div class="problem">兄は今年で30歳だが、すぐ怒ったり<ruby>泣<rt>な</rt></ruby>いたりして、子ども{のようだ}。</div>'+
        '<div class="problem">メイリンは日本語がペラペラで日本人{のように}日本語を話します。</div>'+
        '<div class="problem"><ruby>金沢<rt>かなざわ</rt></ruby>、古い<ruby>建物<rt>たてもの</rt></ruby>がたくさんあって<ruby>京都<rt>きょうと</rt></ruby>{のような}町です。</div>'+
      '</div>'
    });
