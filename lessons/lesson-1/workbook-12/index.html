    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ようにする|l1-p8}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      
      '<div class="count-problems">'+
        '<div class="problem">漢字の読み方がわからない時は、{すぐ辞書で調べる|すぐじしょでしらべる|' + Genki.getAlts('{直}ぐ{辞書}で{調}べる', 'す|じしょ|しら') + 'answer;hint:immediately look it up in a dictionary;width:300}ようにしている。</div>'+
        
        '<div class="problem">発表する時は、{できるだけアイコンタクトをするようにした|出来るだけアイコンタクトをするようにした|answer;hint:try to make eye contact as much as possible;width:350}ほうがいい。</div>'+
        
        '<div class="problem"><ruby>風邪<rt>かぜ</rt></ruby>をひきたくないので、{家に帰ったら手を洗うようにしている|いえにかえったらてをあらうようにしている|' + Genki.getAlts('{家}に{帰}ったら{手}を{洗}うようにしている', 'いえ|かえ|て|あら') + 'answer;hint:I try to wash my hands when I return home;width:320}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'ホストマザー：遅かったね。電話もないから、心配したんだよ。<br>'+
            '　　　　学生：すみません。図書館で勉強していたんです。<br>'+
            'ホストマザー：帰るのが遅くなる時は、{連絡するようにして|れんらくするようにして|answer;hint:try to get in contact}ね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '先生：作文の宿題は{きれいな字で書くようにして|きれいなじでかくようにして|' + Genki.getAlts('{綺麗}な{字}で{書}くようにして', 'きれい|じ|か') + 'answer;hint:try to write in neat handwriting;width:240}ください。<br>'+
            '学生：すみません。これから気を<ruby>付<rt>つ</rt></ruby>けます。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：日本人の<ruby>友達<rt>ともだち</rt></ruby>がほしいんですが、なかなかできないんです。<br>'+
            'B：そうですか。じゃあ、{日本人が来るイベントに行くようにしたら|にほんじんがくるイベントにいくようにしたら|' + Genki.getAlts('{日本人}が{来}るイベントに{行}くようにしたら', 'にほんじん|く|い') + 'answer;hint:try going to an event that Japanese people come to;width:370}どうですか。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
