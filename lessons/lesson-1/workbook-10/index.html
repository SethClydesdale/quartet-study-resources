    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ために|l1-p5}」か「{!GRI|～ためのN|l1-p5}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
        
      '<h4 class="sub-title-color"><span class="num">1</span> ～ために</h4><br>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">{父にプレゼントする|ちちにプレゼントする|answer;hint:Present for my father}ために車を買いたい。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：何のために日本語を勉強しているんですか。<br>'+
            'B：{日本の小説を読むために勉強|にほんのしょうせつをよむためにべんきょう|' + Genki.getAlts('{日本}の{小説}を{読}む{ため}に{勉強}', 'にほん|しょうせつ|よ|為|べんきょう') + 'answer;hint:(I\'m) study(ing) in order to read Japanese novels;width:380}しています。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：何をしに<ruby>東京<rt>とうきょう</rt></ruby>に行くの？<br>'+
            'B：{インターンシップの面接を受けるために行く|インターンシップのめんせつをうけるためにいく|' + Genki.getAlts('インターンシップの{面接}を{受}ける{ため}に{行}く', 'めんせつ|う|為|い') + 'answer;hint:(I\'m) going in order to take an intership interview;width:360}んだ。'+
          '</div>'+
        '</div>'+
      '</div>'+
      
      '<h4 class="sub-title-color"><span class="num">2</span> ～ためのN</h4><br>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">キッチンは{料理する|りょうりする|answer;hint:cooking}ためのところだ。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：どうしてそんなにたくさんアルバイトをしてるの？<br>'+
            'B：{留学するための|りゅうがくするための|' + Genki.getAlts('{留学}する{ため}の', 'りゅうがく|為') + 'answer;hint:For studying abroad}お金が必要なんだ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '子：お母さん、これ何？<br>'+
            '母：これは<ruby>缶切<rt>かんき</rt></ruby>り<small>(can opener)</small>って言うんだよ。<br>'+
            '子：えっ、缶切り？<br>'+
            '母：そう。{缶詰を開けるための|かんづめをあけるための|' + Genki.getAlts('{缶詰}を{開}ける{ため}の', 'かんづめ|あ|為') + 'answer;hint:For opening canned food;width:180}<ruby>道具<rt>どうぐ</rt></ruby><small>(tool)</small>だよ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
