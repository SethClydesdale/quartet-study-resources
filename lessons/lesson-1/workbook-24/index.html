    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span>1.～4.の<ruby>音符<rt>おんぷ</rt></ruby>が使われている単語を<span class="sub-section inline nospacing">　　</span>から<ruby>選<rt>えら</rt></ruby>んで<span class="ul-problem-color">　　</span>に書き、下の(　)に読み方を書きなさい。</p>'+
        
      '<div class="sub-section inline">'+
        '　<span class="double-strike">五人</span>　　<span class="double-strike">日本語</span>　　簡単　　会社　　生活　<br>'+
        '　受験　　一週間　　性格　　教授　　映画　'+
      '</div><br><br>'+
        
      '<div class="count-problems indent-block">'+
        '<div class="example-problem">'+
          '<span style="font-size:30px;">五</span>　　'+
          '<div class="split-problem">'+
            '五人<hr class="dashed">'+
            '(ごにん)'+
          '</div>　'+
          '<div class="split-problem">'+
            '日本語<hr class="dashed">'+
            '(にほんご)'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<span style="font-size:30px;">生</span>　　'+
          '<div class="split-problem">'+
            '{生活||width:120}<hr class="dashed">'+
            '({せいかつ||width:120})'+
          '</div>　'+
          '<div class="split-problem">'+
            '{性格||width:120}<hr class="dashed">'+
            '({せいかく||width:120})'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<span style="font-size:30px;">間</span>　　'+
          '<div class="split-problem">'+
            '{簡単||width:120}<hr class="dashed">'+
            '({かんたん||width:120})'+
          '</div>　'+
          '<div class="split-problem">'+
            '{一週間||width:120}<hr class="dashed">'+
            '({いっしゅうかん||width:120})'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<span style="font-size:30px;">受</span>　　'+
          '<div class="split-problem">'+
            '{受験||width:120}<hr class="dashed">'+
            '({じゅけん||width:120})'+
          '</div>　'+
          '<div class="split-problem">'+
            '{教授||width:120}<hr class="dashed">'+
            '({きょうじゅ||width:120})'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<span style="font-size:30px;">会</span>　　'+
          '<div class="split-problem">'+
            '{会社||width:120}<hr class="dashed">'+
            '({かいしゃ||width:120})'+
          '</div>　'+
          '<div class="split-problem">'+
            '{映画||width:120}<hr class="dashed">'+
            '({えいが||width:120})'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<p class="sectionDesc"><span class="sectionNumber">2.</span><span class="challenge"></span>AとBの<span class="ul-problem-color">　　</span>には同じ<ruby>音符<rt>おんぷ</rt></ruby>を持った漢字が入ります。下の<span class="sub-section inline nospacing">　　</span>から漢字を<ruby>選<rt>えら</rt></ruby>んで<span class="ul-problem-color">　　</span>に書きなさい。</p>'+
        
      '<div class="sub-section inline">'+
        '　性／姓　　紅／工　　帳／長　<br>'+
        '　紹／招　　校／郊　　凍／東　'+
      '</div><br><br>'+
        
      '<div class="count-problems indent-block ruby-always-visible" style="font-size:18px;">'+
        '<div class="columns-2 clear">'+
          '<div>'+
            '<div class="problem">'+
              '<div class="inner-problem">'+
                'A. <ruby>学<rt>がっ</rt></ruby><ruby>{校}<rt>こう</rt></ruby><br><br>'+
                'B. <ruby>{郊}<rt>こう</rt></ruby><ruby>外<rt>がい</rt></ruby>'+
              '</div>'+
            '</div>'+
          '</div>'+

          '<div>'+
            '<div class="problem">'+
              '<div class="inner-problem">'+
                'A. <ruby>女<rt>じょ</rt></ruby><ruby>{性}<rt>せい</rt></ruby><br><br>'+
                'B. <ruby>姓<rt>せい</rt></ruby><ruby>{名}<rt>めい</rt></ruby>'+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div>'+
            '<div class="problem">'+
              '<div class="inner-problem">'+
                'A. <ruby>{東}<rt>とう</rt></ruby><ruby>京<rt>きょう</rt></ruby><br><br>'+
                'B. <ruby>{凍}<rt>とう</rt></ruby><ruby>結<rt>けつ</rt></ruby>'+
              '</div>'+
            '</div>'+
          '</div>'+

          '<div>'+
            '<div class="problem">'+
              '<div class="inner-problem">'+
                'A. <ruby>部<rt>ぶ</rt></ruby><ruby>{長}<rt>ちょう</rt></ruby><br><br>'+
                'B. <ruby>手<rt>て</rt></ruby><ruby>{帳}<rt>ちょう</rt></ruby>'+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div>'+
            '<div class="problem">'+
              '<div class="inner-problem">'+
                'A. <ruby>{紹}<rt>しょう</rt></ruby><ruby>介<rt>かい</rt></ruby><br><br>'+
                'B. <ruby>{招}<rt>しょう</rt></ruby><ruby>待<rt>たい</rt></ruby>'+
              '</div>'+
            '</div>'+
          '</div>'+

          '<div>'+
            '<div class="problem">'+
              '<div class="inner-problem">'+
                'A. <ruby>{工}<rt>こう</rt></ruby><ruby>学<rt>がく</rt></ruby><br><br>'+
                'B. <ruby>{紅}<rt>こう</rt></ruby><ruby>葉<rt>よう</rt></ruby>'+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
