    <script>Genki.generateQuiz({

      '<p class="sectionDesc"><span class="sectionNumber">4.</span><ruby>次の文章を「{!GRI|だ・である体|l1-p001-1}」に変えなさい。また、話し言葉を{!GRI|書き言葉|l1-p001-2}にしなさい。</p>'+

        '私が留学している大学は、<ruby>東京<rt>とうきょう</rt></ruby>に<span class="ruby-always-visible"><ruby><span class="ul-color">あります</span><rt style="font-size:16px;"><span class="label-color">例</span>ある</rt></ruby></span>。'+
        'キャンパスは{少し|すこし|answer;hint:ちょっと}{小さいが|ちいさいが|answer;hint:小さいですけど}、新しくて{きれいだ|綺麗だ|answer;hint:きれいです}。'+
        '特におすすめの場所は{食堂だ|しょくどうだ|answer;hint:食堂です}。'+
        '食堂のご飯は安くておいしいし、{聞いていない|きいていない|answer;hint:聞いてない}時は勉強もできるので、{とても|大変|たいへん|answer;hint:すごく}{便利だ|べんりだ|answer;hint:<ruby>便利<rt>べんり</rt></ruby>です}。'+
        '{しかし|でも}、お昼ご飯の時間は{とても|とっても}{込んでいて|こんでいて|answer;hint:<ruby>込<rt>こ</rt></ruby>んでて}テーブルが{なくなってしまう|なくなっちゃう}ので、注文する前にテーブルを{取っておいた|とっておいた|answer;hint:<ruby>取<rt>と</rt></ruby>っといた}ほうが{いい|いいです}。'+
        '一番人気があるメニューは{カレーだ|カレーです}。'+
        'もし<ruby>辛<rt>から</rt></ruby>いものが{嫌いではなかったら|きらいではなかったら|answer;hint:<ruby>嫌<rt>きら</rt></ruby>いじゃなかったら}、ぜひ{食べてみてほしい|たべてみてほしい|answer;hint:食べてみてください}。'+
      '</div>'
    });
