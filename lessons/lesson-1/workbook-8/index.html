    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～とおり(に)／Nどおり(に)|l1-p3}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '{聞いていた|きいていた|聞いてた|きいてた|answer;hint:Heard}【{とおり|!Iとおり／どおり|spacer:・}】、<ruby>富士山<rt>ふじさん</rt></ruby>はきれいだった。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '雨が<ruby>降<rt>ふ</rt></ruby>らなかったら、<ruby>予定<rt>よてい</rt></ruby>どおり{ピクニックに行きましょう|ピクニックにいきましょう|answer;hint:let\'s go on a picnic}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '先生が{おっしゃったとおり|仰ったとおり|' + Genki.getAlts('{仰}った{通}り', 'おっしゃ|とお') + 'answer;hint:as said}、町の図書館には日本の昔話の本がたくさんあった。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>昨日<rt>きのう</rt></ruby>のパーティー、どうだった。<br>'+
            'B：{思ったとおり|おもったとおり|' + Genki.getAlts('{思}った{通}り', 'おも|とお') + 'answer;hint:As (I) thought}、人がたくさんいて楽しかったよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：日本料理、作ってみたんだって？どうだった？<br>'+
            'B：うーん、{レシピどおり%(に/)|レシピ通り%(に/)|answer;hint:according to the recipe;width:180}作ったんだけど、あまりおいしくなかったんだ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：今日のテスト、難しかった？<br>'+
            'B：ううん。先輩が{教えてくれたとおり|教えてくれた通り|' + Genki.getAlts('{教}えてくれた{通}り', 'おし|とお') + 'answer;hint:as taught me}、宿題を<ruby>復習<rt>ふくしゅう</rt></ruby>しておいたから簡単だったよ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
