    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">2.</span>文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">{日本のことをもっと知るために|にほんのことをもっとしるために|' + Genki.getAlts('{日本}の{事}をもっと{知}る{為}に', 'にほん|こと|し|ため') + 'answer;hint:In order to learn more about Japan;width:260}ホストファミリーと毎晩話します。</div>'+
        
        '<div class="problem">電子レンジ<small>(microwave)</small>は{食べ物を温めるための|たべものをあたためるための|' + Genki.getAlts('{食}べ{物}を{温}める{為}の', 'た|もの|あたた|ため') + 'answer;hint:for warming food}ものだ。</div>'+
        
        '<div class="problem">私は{政治を勉強するために|せいじをべんきょうするために|' + Genki.getAlts('{政治}を{勉強}する{為}に', 'せいじ|べんきょう|ため') + 'answer;hint:in order to study politics}大学に入りました。</div>'+
        
        '<div class="problem">日本人と話す時は、{日本語だけで話すようにしています|にほんごだけではなすようにしています|' + Genki.getAlts('{日本語}だけで{話}すようにして{います}', 'にほんご|はな|いる') + Genki.getAlts('{日本語}だけで{話}すようにして{ます}', 'にほんご|はな|る') + 'answer;hint:I make it a habit to only talk in Japanese;width:300}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：敬語がなかなか<ruby>覚<rt>おぼ</rt></ruby>えられないんだけど、どうしたらいいかなあ。<br>'+
            'B：{先生と話す時はもっと敬語を使うようにしたらどう|せんせいとはなすときはもっとけいごをつかうようにしたらどう|' + Genki.getAlts('{先生}と{話}す{時}はもっと{敬語}を{使}うようにしたらどう', 'せんせい|はな|とき|けいご|つか') + 'answer;hint:How about trying to use more Keigo when talking to your teacher;width:460}？'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">最近日本語が前より{話せるようになった|はなせるようになった|answer;hint:have come to be able to speak;width:220}ので、うれしい。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '{和食が作れるようになりたい|わしょくがつくれるようになりたい|' + Genki.getAlts('{和食}が{作}れるようになりたい', 'わしょく|つく') + 'answer;hint:I want to come to be able to make Japanese food;width:360}から、<br>'+
            '{毎日作るようにしています|まいにちつくるようにしています|' + Genki.getAlts('{毎日}{作}るようにして{います}', 'まいにち|つく|いる') + Genki.getAlts('{毎日}{作}るようにして{ます}', 'まいにち|つく|る') + 'answer;hint:I try to make it every day;width:200}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem"><ruby>健康<rt>けんこう</rt></ruby>のために、{甘い物は食べすぎないようにした|あまいものはたべすぎないようにした|' + Genki.getAlts('{甘}い{物}は{食}べ{過}ぎないようにした', 'あま|もの|た|す') + 'answer;hint:try not to eat too much sweets;width:240}ほうがいい。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：{先生によると|せんせいによると|answer;hint:According to the teacher;width:190}、{来週の試験はなくなるらしい|らいしゅうのしけんはなくなるらしい|' + Genki.getAlts('{来週}の{試験}は{無}くなるらしい', 'らいしゅう|しけん|な') + 'answer;hint:it seems there will be no test next week;width:300}よ。<br>'+
            'B：えっ、本当？'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：来年日本に留学するんです。<br>'+
            'B：{日本に留学するなら|にほんにりゅうがくするなら|' + Genki.getAlts('{日本}に{留学}するなら', 'にほん|りゅうがく') + 'answer;hint:If you\'re studying abroad}、{リスニングの練習をしておいたほうがいいですよ|リスニングのれんしゅうをしておいたほうがいいですよ|' + Genki.getAlts('リスニングの{練習}をして{置}いた{方}がいいですよ', 'れんしゅう|お|ほう') + 'answer;hint:you should practice listening in advance}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：あーあ、3日も休みがあるのに、何も<ruby>予定<rt>よてい</rt></ruby>がなくて……。<br>'+
            'B：{予定がないなら|よていがないなら|' + Genki.getAlts('{予定}が{無}いなら', 'よてい|な') + 'answer;hint:If you have no plans;width:150}、<ruby>一緒<rt>いっしょ</rt></ruby>に{旅行したい|りょこうしたい|answer;hint:want to go on a trip;width:150}？'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">{予定どおりに空港に着いた|予定どおりにくうこうについた|' + Genki.getAlts('{予定}{通}りに{空港}に{着}{いた}', 'よてい|どお|くうこう|つ|きました') + 'answer;hint:(We) arrived at the airport as planned;width:280}。</div>'+
        
        '<div class="problem">日本に来て、日本は{聞いていたとおり|きいていたとおり|' + Genki.getAlts('{聞}いていた{通}り', 'き|とお') + 'answer;hint:as I heard}、{道がきれいな|みちがきれいな|' + Genki.getAlts('{道}が{綺麗}な', 'みち|きれい') + 'answer;hint:clean streets}国だ。</div>'+
      '</div>'+
        
      '<p class="sectionDesc"><span class="sectionNumber">3.</span>あなたの国では大学生は何のためにアルバイトをしていますか。「{!GRI|～ために|l1-p5}」を使って2つ書きなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">&bull; {授業料を払うためにアルバイトをしています|じゅぎょうりょうをはらうためにアルバイトをしています|' + Genki.getAlts('{授業料}を{払}う{為}にアルバイトをして{います}', 'じゅぎょうりょう|はら|ため|いる') + Genki.getAlts('{授業料}を{払}う{為}にアルバイトをして{ます}', 'じゅぎょうりょう|はら|ため|る') + 'answer;hint:(They) work part-time in order to pay their tuition;width:420}。</div>'+
        
        '<div class="problem">&bull; {好きな物を買うためにアルバイトをしています|すきなものをかうためにアルバイトをしています|' + Genki.getAlts('{好}きな{物}を{買}う{為}にアルバイトをして{います}', 'す|もの|か|ため|いる') + Genki.getAlts('{好}きな{物}を{買}う{為}にアルバイトをして{ます}', 'す|もの|か|ため|る') + 'answer;hint:(They) work part-time in order to buy things that they like;width:420}。</div>'+
      '</div>'
    });
