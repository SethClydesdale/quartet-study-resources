    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|Nによると|l1-p9}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      
      '<div class="count-problems">'+
        '<div class="problem">先生によると、来週{漢字の試験がある|かんじのしけんがある|' + Genki.getAlts('{漢字}の{試験}がある', 'かんじ|しけん') + 'answer;hint:there\'s a kanji test}そうだ。</div>'+
        
        '<div class="problem">ニュースによると、{北海道で大雨が降った|ほっかいどうでおおあめがふった|' + Genki.getAlts('{北海道}で{大雨}が{降}った', 'ほっかいどう|おおあめ|ふ') + 'answer;hint:it rained heavily in Hokkaido}そうだ。</div>'+
        
        '<div class="problem">{ジョージによると|According to George}、{研はトマトが食べられない|けんはトマトがたべられない|' + Genki.getAlts('{研}はトマトが{食}べられない', 'けん|た') + 'answer;hint:Ken <small>(研)</small> can\'t eat tomatoes}らしい。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：駅の前に新しいビルが建てられていますね。<br>'+
            'B：ええ。{駅員さんによると|えきいんさんによると|answer;hint:According to the station attendant;width:250}、お店の入ったオフィスビルができるそうです。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：最近、びっくりするニュースが多いですね。<br>'+
            'B：ええ。{昨日のニュースによると|きのうのニュースによると|answer;hint:According to yesterday\'s news;width:220}、{90歳の人がマラソンに出たそうですよ|90さいのひとがマラソンにでたそうですよ|' + Genki.getAlts('90{歳}の{人}がマラソンに{出}たそう{です}よ', 'さい|ひと|で|だ') + 'answer;hint:I heard that a 90 year-old person participated in a marathon;width:430}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
