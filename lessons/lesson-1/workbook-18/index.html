    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">3.</span><ruby>下線<rt>かせん</rt></ruby><small>(underline)</small>の部分を{!GRI|書き言葉<small>(written language)|l1-p001-2}</small>に変えなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">おもしろい<span class="ul-color">って</span><span class="ul-color">言ってた</span>。　<i class="fa">&#xf061;</i>　おもしろい{と}{言っていた|いっていた|answer}。</div>'+
        '<div class="problem"><span class="ul-color">すごく</span>きれいだった。　<i class="fa">&#xf061;</i>　{大変|とても|たいへん|answer}きれいだった。</div>'+
        '<div class="problem"><span class="ul-color">ちょっと</span>高い。　<i class="fa">&#xf061;</i>　{少し|すこし|answer}高い。</div>'+
        '<div class="problem">話してみた<span class="ul-color">けど</span>、<ruby>怖<rt>こわい</rt></ruby>い人<span class="ul-color">じゃなかった</span>。　<i class="fa">&#xf061;</i>　話してみた{が}、怖い人{ではなかった}。</div>'+
        '<div class="problem">疲れ<span class="ul-color">ちゃった</span>。　<i class="fa">&#xf061;</i>　疲れ{てしまった}。</div>'+
        '<div class="problem">本を<span class="ul-color">見といた</span>。　<i class="fa">&#xf061;</i>　本を{見ておいた|みておいた|answer}。</div>'+
        '<div class="problem"><span class="ul-color">飲んじゃった</span>。　<i class="fa">&#xf061;</i>　{飲んでしまった|のんでしまった|answer}。</div>'+
        '<div class="problem"><span class="ul-color">読んどいたほうがいい</span>。　<i class="fa">&#xf061;</i>　{読んでおいた方がいい|よんでおいたほうがいい|' + Genki.getAlts('{読}んで{置}いた{方}がいい', 'よ|お|ほう') + 'answer}。</div>'+
        '<div class="problem"><span class="ul-color">来てください</span>。　<i class="fa">&#xf061;</i>　{来てほしい|きてほしい|answer}。</div>'+
      '</div>'
    });
