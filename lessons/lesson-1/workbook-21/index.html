    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">2.</span>文を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems indent-block">'+
        
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>{!GRI|ようだ|l1-p002-3}</p>'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '(<ruby>友達<rt>ともだち</rt></ruby>が<ruby>一生懸命<rt>いっしょうけんめい</rt></ruby>勉強している)<br>'+
            '<i class="fa">&#xf061;</i> 明日、{試験があるようだ|しけんがあるようだ|answer;hint:it seems that there will be a test;width:240}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '(日本語の<ruby>教科書<rt>きょうかしょ</rt></ruby>を持っている人がいる)<br>'+
            '<i class="fa">&#xf061;</i> あの人は{日本語の授業を取っているようだ|にほんごのじゅぎょうをとっているようだ|' + Genki.getAlts('{日本語}の{授業}を{取}っているようだ', 'にほんご|じゅぎょう|と') + 'answer;hint:appear to be taking Japanese classes}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '(先生は毎日コーヒーを飲んでいる)<br>'+
            '<i class="fa">&#xf061;</i> 先生は{コーヒーが好きなようだ|コーヒーがすきなようだ|answer;hint:seems to like coffee}。'+
          '</div>'+
        '</div>'+
        
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>{!GRI|みたいだ|l1-p002-4}</p>'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '(みんなかさを持っている)<br>'+
            '<i class="fa">&#xf061;</i> 今日は{雨が降るみたいだ|あめがふるみたいだ|' + Genki.getAlts('{雨}が{降}るみたいだ', 'あめ|ふ') + 'answer;hint:it seems like it will rain;width:180}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '(あのレストランはいつも<ruby>込<rt>こ</rt></ruby>んでいる)<br>'+
            '<i class="fa">&#xf061;</i> あのレストランは{人気があるみたいだ|にんきがあるみたいだ|answer;hint:seems to be popular}。'+
          '</div>'+
        '</div>'+
        
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>{!GRI|らしい|l1-p002-2}</p>'+
        '<div class="problem">うわさによると、{サラの弟はすごくかっこいいらしい|サラのおとうとはすごくかっこいいらしい|' + Genki.getAlts('サラの{弟}は{凄}くかっこいいらしい', 'おとうと|すご') + 'answer;hint:I hear that Sara\'s little brother is really cool;width:320}。</div>'+
        
        '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>{!GRI|そうだ|l1-p002-1}</p>'+
        '<div class="problem"><ruby>先輩<rt>せんぱい</rt></ruby>から聞いたが、{田中先生の歴史のクラスは試験が多いそうだ|たなかせんせいのれきしのクラスはしけんがおおいそうだ|' + Genki.getAlts('{田中}{先生}の{歴史}のクラスは{試験}が{多}いそうだ', 'たなか|せんせい|れきし|しけん|おお') + 'answer;hint:I hear that professor Tanaka\'s history class has a lot of tests;width:440}。</div>'+
        
        '<div class="problem">{父によると|ちちによると|answer;hint:According to my father;width:180}、{ペットの犬に子犬が生まれたそうだ|ペットのいぬにこいぬがうまれたそうだ|' + Genki.getAlts('ペットの{犬}に{子犬}が{生}まれたそうだ', 'いぬ|こいぬ|う') + 'answer;hint:I heard that our pet dog gave birth to puppies;width:340}。</div>'+
      '</div>'
    });
