    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ようになる|l1-p7}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      
      '<div class="count-problems">'+
        '<div class="problem">1年日本にいるが、最近やっと日本人の会話が少し{分かる|わかる|answer;hint:to understand;spoiler;width:120}ようになった。</div>'+
        
        '<div class="problem">前はなっとうが食べられなかったが、今は{食べられるようになった|たべられるようになった|answer;hint:have come to be able to eat;spoiler;width:220}。</div>'+
        
        '<div class="problem">この町に来てから、{毎日スーパーで買い物をするようになった|まいにちスーパーでかいものをするようになった|' + Genki.getAlts('{毎日}スーパーで{買}い{物}をするようになった', 'まいにち|か|もの') + 'answer;hint:have started shopping at the supermarket every day;width:380}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：大学の図書館は本が5<ruby>冊<rt>さつ</rt></ruby>しか借りられないから、あまり<ruby>便利<rt>べんり</rt></ruby>じゃないよね。<br>'+
            'B：そうだね。でも、来月から{10冊借りられるようになるらしい|10さつかりられるようになるらしい|' + Genki.getAlts('10{冊}{借}りられるようになるらしい', 'さつ|か') + 'answer;hint:it seems that you\'ll be able to borrow 10;width:300}よ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：子どもの時は苦手だったけど、大人になってできるようになったことってある？<br>'+
            'B：そうだなあ。{ピーマンが食べられるようになった|ピーマンがたべられるようになった|answer;hint:I\'ve come to be able to eat green peppers;width:320}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：どんなことができるようになりたいですか。<br>'+
            'B：{バイオリンが弾けるようになりたいです|バイオリンがひけるようになりたいです|' + Genki.getAlts('バイオリンが{弾}けるようになりたい{です}', 'ひ|') + 'answer;hint:I want to come to be able to play the violin;width:340}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
