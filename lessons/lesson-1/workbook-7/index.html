    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～なら|l1-p2}」を使って、会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　　　留学生：ちょっと<ruby>郵便局<rt>ゆうびんきょく</rt></ruby>に行ってきます。<br>'+
            'ホストマザー：{郵便局に行く|ゆうびんきょくにいく|' + Genki.getAlts('{郵便局}に{行}く', 'ゆうびんきょく|い') + 'answer;hint:Going to the post office;spoiler;width:180}なら、切手を買ってきて。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ああ、<ruby>頭<rt>あたま</rt></ruby>が痛い……。<br>'+
            'B：{頭が痛いなら|あたまがいたいなら|' + Genki.getAlts('{頭}が{痛}いなら', 'あたま|いた') + 'answer;hint:If (your) head hurts;spoiler}、{薬を飲んだ|くすりをのんだ|' + Genki.getAlts('{薬}を{飲}んだ', 'くすり|の') + 'answer;hint:take medicine}ほうがいいですよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：あれ？私のめがねがない！<br>'+
            'B：{めがねなら|眼鏡なら|メガネなら|answer;hint:If it\'s glasses (that you\'re looking for);spoiler;width:300}、テレビの上にあったよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：だれを<ruby>探<rt>さが</rt></ruby>してるの？<br>'+
            'B：グエンさん。<ruby>一緒<rt>いっしょ</rt></ruby>にお昼ご飯を食べようって言ってたんだけど。<br>'+
            'A：{グエンさんなら|As for グエン|spoiler}、{食堂に行った|しょくどうにいった|' + Genki.getAlts('{食堂}に{行}った', 'しょくどう|い') + 'answer;hint:went to the cafeteria;width:160}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：この近くに、スーパーはありませんか？<br>'+
            'B：スーパーはないですねえ。でも、{コンビニなら|if a convenience store (will suffice)}、{ありますよ|there is (one here)|spoiler}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：土曜日に映画見に行かない？<br>'+
            'B：土曜日はバイトなんだ。{日曜日なら|にちようびなら|answer;hint:As for Sunday}、{暇な|ひまな|answer;hint:I\'m free}んだけど…。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：おいしいケーキが食べたいなあ。<br>'+
            'B：{美味しいケーキが食べたいなら|おいしいケーキがたべたいなら|' + Genki.getAlts('{美味}しいケーキが{食}べたいなら', 'おい|た') + 'answer;hint:If you want to eat delicious cake;spoiler;width:240}、{ブランという店のケーキがおすすめだよ|ブランというみせのケーキがおすすめだよ|' + Genki.getAlts('ブランという{店}のケーキがおすすめ{だ}よ', 'みせ|です') + 'answer;hint:I recommend the cake from a store called ブラン;width:350}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
