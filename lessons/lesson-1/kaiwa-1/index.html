    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba">もしかして　by any chance</span>'+
      '<span class="kotoba">お<ruby>世話<rt>せわ</rt></ruby>になります　Thank you in advance for taking care of me.</span><br>'+
      '<span class="kotoba">ちなみに　for your information; incidentally</span>'+
      '<span class="kotoba"><ruby>国際学部<rt>こくさいがくぶ</rt></ruby>　department of international studies</span><br>'+
      '<span class="kotoba"><ruby>偶然<rt>ぐうぜん</rt></ruby>　coincidence</span>'+
      '<span class="kotoba">たいしたものじゃないんだけど　it\'s nothing special but</span><br>'+
      '<span class="kotoba">コーヒー<ruby>豆<rt>まめ</rt></ruby>　coffee beans</span>'+
      '<span class="kotoba"><ruby>早速<rt>さっそく</rt></ruby>　right now; right away</span>'+
    '</div>'+

    '{!AUDIO|kaiwa_l1-1}'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l1-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l1-1" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">カジュアルな会話</strong>'+
        '<div class="title reduced center">新しいルームメート</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">ジョージ・テイラー（ジ：）が、<ruby>寮<rt>りょう</rt></ruby>で日本人学生の<ruby>本田研<rt>ほんだけん</rt></ruby>（研：）に初めて会う。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">〈ノックの音〉はい、どうぞ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">はじめまして。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">あ、もしかして新しいルームメートの？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">'+
            'はい。<strong class="main-color">ジョージ・テイラー</strong>って言います。<strong class="main-color">ジョージ</strong>って<ruby>呼<rt>よ</rt></ruby>んでください。<br>'+
            'アメリカのシアトル出身です。<strong class="main-color">これから1年間</strong>、お<ruby>世話<rt>せわ</rt></ruby>になります。<br>'+
            'よろしくお<ruby>願<rt>ねが</rt></ruby>いします。'+
          '</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">こちらこそ、よろしく。本田研です。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">何て読んだらいいですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">研でいいよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">研は何年生ですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">3年生。ちなみに、国際学部です。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">えっ、<ruby>僕<rt>ぼく</rt></ruby>も国際学部の3年生！</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">偶然だね。何かわからないことがあったら、いつでも僕に聞いて。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">ありがとう。……<strong class="main-color">あの、これ、</strong>たいしたものじゃない<strong class="main-color">んだけど</strong>、<strong class="main-color">シアトルで</strong>有名なコーヒー<ruby>豆<rt>まめ</rt></ruby><strong class="main-color">です</strong>。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">わあ、ありがとう。僕、コーヒー、大好きなんだ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text"><ruby>喜<rt>よろこ</rt></ruby>んでもらえてよかった。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">じゃあ、<ruby>早速<rt>さっそく</rt></ruby>コーヒーいれるから、飲みながらゆっくり話そうよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">うん。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l1-1|0} ジョージの出身はどこですか。<br>'+
          '{%(ジョージの出身は/)シアトルです|%(ジョージのしゅっしんは/)シアトルです|シアトル|answer}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l1-1|0} ジョージは何学部ですか。<br>'+
          '{%(ジョージは/)国際学部です|%(ジョージは/)こくさいがくぶです|国際学部|こくさいがくぶ|answer}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l1-1|0} ジョージは<ruby>研<rt>けん</rt></ruby>に何をあげましたか。<br>'+
          '{ジョージは研にコーヒー豆をあげました|ジョージはけんにコーヒーまめをあげました|' + Genki.getAlts('ジョージは{研}にコーヒー{豆}をあげました', 'けん|まめ') + Genki.getAlts('コーヒー{豆}{です}', 'まめ|') + 'answer}。'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>ジョージは初めて会った研に何を言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l1-1|0} <strong class="main-color">自己紹介する時</strong><br>'+
          '<div class="example">'+
            'ジョージ・テイラー{って言います|っていいます|answer}。ジョージ{って呼んでください|ってよんでください|answer}。<br>'+
            '……これから1年間、{お世話になります|おせわになります|answer}。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l1-1|0} <strong class="main-color">手<ruby>土産<rt>みやげ</rt></ruby>を<ruby>渡<rt>わた</rt></ruby>す時</strong><br>'+
          '<div class="example">'+
            'あの、これ、{たいしたものじゃない|大したものじゃない|answer}んだけど、シアトルで{有名なコーヒー豆|ゆうめいなコーヒーまめ|' + Genki.getAlts('{有名}なコーヒー{豆}', 'ゆうめい|まめ') + 'answer}です。'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('kaiwa_l1-1', [
      [9, 15],
      [16.5, 20],
      [21, 22.5],
      [23, 27],
      [27.5, 40],
      [41.5, 45],
      [46, 47.5],
      [48.5, 50],
      [51, 52.5],
      [53, 57],
      [57.5, 61],
      [62, 67],
      [67.8, 75.5],
      [76.5, 80.5],
      [81, 83],
      [84, 88],
      [89, 90]
    ]);
    </script>
