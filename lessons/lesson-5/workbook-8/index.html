    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～たび(に)|l5-p2}」を使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '子：あっ、お父さんが<ruby>出張<rt>しゅっちょう</rt></ruby>から帰ってきた！お帰りなさい！おみやげは？<br><br>'+
            '父：ただいま。はい、これ。いつものお<ruby>菓子<rt>かし</rt></ruby>だよ。みんなで食べよう。<br><br>'+
            '<span class="hidden">父：</span>(<i class="fa">&#xf061;</i> 父は、{出張に行く|しゅっちょうにいく|' + Genki.getAlts('{出張}に{行}く', 'しゅっちょう|い') + 'answer;hint:goes on a business trip;width:180}たびに、おみやげを買ってきてくれる。)'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">{出身の町に帰るたびに|しゅっしんのまちにかえるたびに|' + Genki.getAlts('{出身}の{町}に{帰}るたびに', 'しゅっしん|まち|かえ') + 'answer;hint:Whenever I return to my home town;width:280}、小学校の時の友達と会います。</div>'+
        
        '<div class="problem">私は{料理を作るたびに|りょうりをつくるたびに|' + Genki.getAlts('{料理}を{作}るたびに', 'りょうり|つく') + 'answer;hint:every time I make food;width:180}、<ruby>失敗<rt>しっぱい</rt></ruby>してしまう。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　　　<ruby>研<rt>けん</rt></ruby>：ジョージ、また<ruby>絵理<rt>えり</rt></ruby>とけんかしたそうだね？<br><br>'+
            'ジョージ：うん。最近、{会うたびに|あうたびに|answer;hint:every time we meet;width:150}、けんかしてしまうんだ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：どんな時、子どもの時のことを思い出しますか。<br><br>'+
            'B：{公園に行くたびに|こうえんにいくたびに|' + Genki.getAlts('{公園}に{行}くたびに', 'こうえん|い') + 'answer;hint:Whenever I go to the park;width:200}、子どもの時のことを思い出します。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：どんな時、うれしくなりますか。<br><br>'+
            'B：{誰かに褒められるたびに嬉しくなります|だれかにほめられるたびにうれしくなります|' + Genki.getAlts('{誰}かに{褒}められるたびに{嬉}しくなります', 'だれ|ほ|うれ') + 'answer;hint:It makes me happy whenever someone praises me;width:360}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
