    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span>正しいものを<ruby>選<rt>えら</rt></ruby>びなさい。{!GRI|<button class="button small-button"><i class="fa">&#xf02d;</i><span class="en">View「条件文 ～たら／～と／～ば／～なら」in Grammar Index</span><span class="ja">文法索引で「条件文 ～たら／～と／～ば／～なら」を見る</span></button>|l5-p001}</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">時間が【{あったら|!Iあったら／あると|spacer:・}】ぜひ見てください。</div>'+

        '<div class="problem">家に【{帰ったら|!I帰ったら／帰れば|spacer:・}】、母から手紙が来ていた。</div>'+
        
        '<div class="problem">電車の中で音楽を【{聞くなら|!I聞いたら／聞けば／聞くなら|spacer:・}】、イヤホンを使ってください。</div>'+
        
        '<div class="problem">自分の国へ【{帰ったら|!I帰ったら／帰ると／帰れば|spacer:・}】、仕事を<ruby>探<rt>さが</rt></ruby>すつもりです。</div>'+
        
        '<div class="problem">ここを【{押すと|!I押すと／押すなら|spacer:・}】、電気が付きます。</div>'+
        
        '<div class="problem">【{暗ければ|!I暗いと／暗ければ|spacer:・}】、電気を付けましょうか。</div>'+
        
        '<div class="problem"><ruby>風邪<rt>かぜ</rt></ruby>を【{ひいたら|!Iひいたら／ひくと／ひけば|spacer:・}】、薬を飲んだほうがいい。</div>'+
        
        '<div class="problem"><ruby>田中<rt>たなか</rt></ruby>さんが【{来るなら|!I来ると／来るなら|spacer:・}】、もう一枚ピザを注文しましょう。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：あっ、<ruby>牛乳<rt>ぎゅうにゅう</rt></ruby>がなくなった！<br><br>'+
            'B：【{なくなったなら|!Iなくなるなら／なくなったなら／なくなれば|spacer:・}】買ってきてくれない？'+
          '</div>'+
        '</div>'+
        
        '<div class="problem"><ruby>沖縄<rt>おきなわ</rt></ruby>へ【{行ったら|!I行ったら／行くと／行けば|spacer:・}】、海で泳ぎたいです。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：来週、<ruby>絵理<rt>えり</rt></ruby>の<ruby>誕生日<rt>たんじょうび</rt></ruby>なんだけど、プレゼントは何がいいと思う？<br><br>'+
            'B：前にスカーフがほしいって言っていたから、スカーフを【{あげたら|!Iあげたら／あげれば／あげるなら|spacer:・}】どう？'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：来週、ピアノの発表会があるんです。<br><br>'+
            'B：【{うまくいくと|!Iうまくいくと／うまくいくなら|spacer:・}】いいですね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>期末<rt>きまつ</rt></ruby>試験が心配なんです。<br><br>'+
            'B：ちゃんと<ruby>復習<rt>ふくしゅう</rt></ruby>【{すれば|!Iすると／すれば|spacer:・}】、<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>ですよ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
