    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba"><ruby>区役所<rt>くやくしょ</rt></ruby>　city hall</span>'+
      '<span class="kotoba">～<ruby>方面<rt>ほうめん</rt></ruby>　direction</span>'+
      '<span class="kotoba"><ruby>改札<rt>かいさつ</rt></ruby>　ticket gate</span>'+
      '<span class="kotoba"><ruby>階段<rt>かいだん</rt></ruby>　stairs</span>'+
      '<span class="kotoba">いったん＝<ruby>一度<rt>いちど</rt></ruby></span><br>'+
      '<span class="kotoba">ホーム　station platform</span>'+
      '<span class="kotoba"><ruby>戻<rt>もど</rt></ruby>る　to return</span>'+
      '<span class="kotoba"><ruby>反対<rt>はんたい</rt></ruby>の<ruby>橋<rt>はし</rt></ruby>　opposite end</span>'+
      '<span class="kotoba">この<ruby>辺<rt>へん</rt></ruby>　around here</span><br>'+
      '<span class="kotoba"><ruby>貼<rt>は</rt></ruby>り<ruby>紙<rt>がみ</rt></ruby>　poster</span>'+
      '<span class="kotoba"><ruby>移転<rt>いてん</rt></ruby>する　to move</span>'+
      '<span class="kotoba"><ruby>交差点<rt>こうさてん</rt></ruby>　intersection</span>'+
      '<span class="kotoba">わたる　to cross at a traffic light</span><br>'+
      '<span class="kotoba"><ruby>道<rt>みち</rt></ruby>なりに<ruby>行<rt>い</rt></ruby>く　to go along the road</span>'+
      '<span class="kotoba">～の<ruby>先<rt>さき</rt></ruby>　ahead of ~</span>'+
      '<span class="kotoba"><ruby>曲<rt>ま</rt></ruby>がる　to turn</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|kaiwa_l5-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l5-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l5-2" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">フォーマルな会話</strong>'+
        '<div class="title reduced center">道を<ruby>尋<rt>たず</rt></ruby>ねる</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">回転ずしの店に行くため、ジョージ(ジ：)が駅で駅員(駅：)に<ruby>訪<rt>たず</rt></ruby>ねて<small>(ask)</small>いる</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">すみません。<ruby>区役所方面<rt>くやくしょほうめん</rt></ruby>に行きたいんですが、南口<ruby>改札<rt>かいさつ</rt></ruby>でいいですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">駅</div>'+
          '<div class="text">区役所方面なら、北口改札ですね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">あ、そうなんですか。北口改札はどう行けばいいですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">駅</div>'+
          '<div class="text">そちらの<ruby>階段<rt>かいだん</rt></ruby>を<ruby>下<rt>お</rt></ruby>りて、いったんホームに<ruby>戻<rt>もど</rt></ruby>ってください。ホームの<ruby>反対<rt>はんたい</rt></ruby>の<ruby>橋<rt>はし</rt></ruby>まで歩いて、エスカレーターを上がったところが北口です。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">ホームの反対のエスカレーターを上がったところですね？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">駅</div>'+
          '<div class="text">はい。北口の3番出口を出ると、右手にすぐ区役所が見えますよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">3番出口ですね。わかりました。ありがとうございました。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">駅</div>'+
          '<div class="text">いいえ。</div>'+
        '</div>'+
        '<div class="center">{!IMG|l5-kaiwa-2-2.png}</div>'+
        '<div class="center">＊　　　　＊　　　　＊</div>'+
        
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">駅を出たジョージ(ジ：)が<ruby>通行人<rt>つうこうにん</rt></ruby>(通：)に道を尋ねている。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">すみません。ちょっと道を<ruby>伺<rt>うかが</rt></ruby>いたいんですが。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">通</div>'+
          '<div class="text">はい。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">「<ruby>海<rt>うみ</rt></ruby>ずし」という回転ずしの店をご<ruby>存知<rt>ぞんじ</rt></ruby>ですか。地図だとこの<ruby>辺<rt>へん</rt></ruby>のはずなんですけど。<small>(スマホの地図を見せる)</small></div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">通</div>'+
          '<div class="text">ちょっと、見せてください。確かにこのビルのはずですね。変ですね……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">はい……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">通</div>'+
          '<div class="text">あっ、あそこに<ruby>貼<rt>は</rt></ruby>り<ruby>紙<rt>がみ</rt></ruby>が……。えーと……ああ、<ruby>移転<rt>いてん</rt></ruby>したみたいですね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">えっ、そうなんですか！</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">通</div>'+
          '<div class="text">えっと、貼り紙の地図によると、この先の<ruby>交差点<rt>こうさてん</rt></ruby>をわたって少し歩いたところにあるみたいですよ。道なりに行くと左手に「ヨルトン」というホテルがあるから、その先の交差点をわったら、すぐ左<ruby>曲<rt>ま</rt></ruby>がってください。右手に見えるはずですよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">ホテルの先の交差点をわって左ですね。どうもありがとうございました。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">通</div>'+
          '<div class="text">いいえ。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l5-2|21.4} <ruby>区役所方面<rt>くやくしょほうめん</rt></ruby>に行くためには何という<ruby>改札<rt>かいさつ</rt></ruby>を使いますか。<br>'+
          '{北口改札です|きたぐちかいさつです|' + Genki.getAlts('{北口}{改札}{です}', 'きたぐち|かいさつ|') + 'answer}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l5-2|46.7} 何番出口から出ればいいですか。<br>'+
          '{3番出口です|3ばんでぐちです|' + Genki.getAlts('3{番}{出口}{です}', 'ばん|でぐち|') + 'answer}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l5-2|90.2} ジョージはどうしてすし屋が見つけられませんでしたか。<br>'+
          '{すし屋が移転したからです|すしやがいてんしたからです|' + Genki.getAlts('{寿司}{屋}が{移転}したからです', 'すし|や|いてん') + 'answer}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l5-2|101.6} すし屋はどこですか。下の地図の<strong class="color-cerise">A</strong>～<strong class="color-cerise">G</strong>の中から選びなさい。<br>'+
          '({C|!IA／B／C／D／E／F／G|spacer:・})'+
        '</div>'+
      '</div>'+
        
      '<div class="center">{!IMG|l5-kaiwa-2-1.png}</div>'+
    '</div><br><br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>ジョージは<ruby>変更<rt>へんこう</rt></ruby>の<ruby>希望<rt>きぼう</rt></ruby><small>(request)</small>を言う時、何と言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l5-2|14.2} <strong class="main-color"><ruby>改札<rt>かいさつ</rt></ruby>を<ruby>確認<rt>かくにん</rt></ruby>する時</strong><br>'+
          '<div class="example">'+
            '<ruby>区役所<rt>くやくしょ</rt></ruby>{方面に行きたいんです|ほうめんにいきたいんです|' + Genki.getAlts('{方面}に{行}きたいんです', 'ほうめん|い') + 'answer}が、<br><br>'+
            '南口<ruby>改札<rt>かいさつ</rt></ruby>{でいいです}か。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l5-2|72.4} <strong class="main-color">すし屋の場所を聞く時</strong><br>'+
          '<div class="example">'+
            '「<ruby>海<rt>うみ</rt></ruby>ずし」という回転ずしの店を{ご存知です|ごぞんじです|answer}か。<br><br>'+
            '地図だと{この辺のはずなんです|このへんのはずなんです|answer}けど。'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('kaiwa_l5-2', [
      [7.6, 12.9],
      [14.2, 20.5],
      [21.4, 24.7],
      [25.5, 30.7],
      [31.4, 41.6],
      [42.6, 46.1],
      [46.7, 52.7],
      [53.4, 57.8],
      [58.5, 59.2],
      [61, 65.1], // 10
      [66.4, 70.1],
      [70.8, 71.2],
      [72.4, 79.8],
      [80.2, 88.1],
      [88.5, 89.3],
      [90.2, 99],
      [99.3, 101.1],
      [101.6, 122.3],
      [123.4, 128.8],
      [129.5, 131] // 20
    ]);
    
    // keeps the audio on-screen when the user scrolls out of view
    Genki.stickyAudio.init('static-audio');
    </script>
