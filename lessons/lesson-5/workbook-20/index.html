    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span>単語の意味に気を付けて、<span class="ul-problem-color">　　</span>に漢字を書きなさい。必要な時は送りがなも書きなさい。</p>'+
        
      '<div class="count-problems indent-block">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A. 手紙を送ったら、返事が{返って|かえって}きました。<br><br>'+
            'B. ルームメートは毎晩遅く{帰って|かえって}きます。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A. たくさん<ruby>練習<rt>れんしゅう</rt></ruby>して{自信|じしん}がつきました。<br><br>'+
            'B. 自分{自身|じしん}について考えてみた。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A. 最近{暖かく|あたたかく}なりました。もうすぐ春ですね。<br><br>'+
            'B. {温かい|あたたかい}飲み物を飲んだ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A. {寮|りょう}に住んでいます。<br><br>'+
            'B. {量|りょう}が多くて、全部食べられなかった。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A. 8月はとても{暑い|あつい}です。<br><br>'+
            'B. この<ruby>温泉<rt>おんせん</rt></ruby>はお<ruby>湯<rt>ゆ</rt></ruby>がとても{熱い|あつい}。'+
          '</div>'+
        '</div>'+
      '</div><br>'+
        
      '<p class="sectionDesc"><span class="sectionNumber">2.</span><span class="challenge"></span>正しいほうを選びなさい。</p>'+
        
      '<div class="count-problems indent-block">'+
        '<div class="problem">たくさん写真を{撮った|!I撮った／取った|spacer:alpha}。</div>'+
        '<div class="problem">教会で{聖歌|!I成果／聖歌|spacer:alpha}を歌う。</div>'+
        '<div class="problem">人の物を<ruby>盗<rt>ぬす</rt></ruby>むのは、やってはいけない{行為|!I行為／好意|spacer:alpha}だ。</div>'+
        '<div class="problem">{革|!I皮／革|spacer:alpha}のかばんを買うことにした。</div>'+
        '<div class="problem">鳥の{鳴き|!I泣き／鳴き|spacer:alpha}声が聞こえる。</div>'+
      '</div>'
    });
    </script>
