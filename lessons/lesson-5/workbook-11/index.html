    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ても|l5-p6}」を使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">もし{100回失敗し|100かいしっぱいし|' + Genki.getAlts('100{回}{失敗}し', 'かい|しっぱい') + Genki.getAlts('{百回}{失敗}し', 'ひゃっかい|しっぱい') + 'answer;hint:fail 100 times}ても、あきらめません。</div>'+
        
        '<div class="problem">たとえ{宝くじに当たっても|たからくじにあたっても|' + Genki.getAlts('{宝}くじに{当}たっても', 'たから|あ') + 'answer;hint:even if I win the lottery}、仕事をやめません。</div>'+
        
        '<div class="problem">{忙しくても|いそがしくても|answer;hint:Even if you\'re busy;width:150}、<ruby>約束<rt>やくそく</rt></ruby>を忘れるべきではない。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：レポート、もう終わった？明日の<ruby>締<rt>し</rt></ruby>め<ruby>切<rt>き</rt></ruby>りに間に合うかなあ……。<br><br>'+
            'B：私は無理。{寝ないで書いても|ねないでかいても|' + Genki.getAlts('{寝}ないで{書}いても', 'ね|か') + 'answer;hint:Even if I write without sleeping;width:230}、絶対間に合わない！'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '〈レストランで〉<br><br>'+
            '夫：今日はたくさん食べたね。お金、<ruby>足<rt>た</rt></ruby>りるかなあ……。<br><br>'+
            '<ruby>妻<rt>つま</rt></ruby>：でも、クレジットカードがあるでしょ？この店はカードが使えるから、もし{足りなくても|たりなくても|answer;hint:even if you don\'t have enough;width:220}、カードを使えば<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>だよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>嫌<rt>きら</rt></ruby>いなものって何？<br><br>'+
            'B：マラソンが嫌い。たとえ{10万円くれると言われても|10まんえんくれるといわれても|' + Genki.getAlts('{10}{万}{円}くれると{言}われても', '十|まん|えん|い') + 'answer;hint:even if you said that you would give me 100,000 yen;width:380}、絶対走りたくない！'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
