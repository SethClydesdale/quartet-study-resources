    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l5-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l5-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l5-1" class="chokai-script dialogue AB noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">回転ずし入門</div>'+
        '　<span class="line">以前、すしには高級なイメージしかなかった。</span>'+
        '<span class="line">そのイメージを変えたのが、回転ずしだ。</span>'+
        '<span class="line">回転ずしの店では、一皿100円から数百円という安い値段ですしが食べられる。</span>'+
        '<span class="line">安くてもネタが新鮮でおいしいので、人気店は<span class="ul-color">{!GRI|いつ|l5-p1}</span>行っ<span class="ul-color">{!GRI|ても|l5-p1}</span>込んでいる。</span>'+
        '<span class="line">「一皿100円」という看板を見たら、つい入ってします人もいるだろう。</span><br>'+
        
        '<div class="sub-title" style="margin-bottom:5px;"><strong class="line">回転ずしとは？</strong></div>'+
        '　<span class="line">回転ずしの店に入ると、テーブルのすぐ横を回る大きなベルトコンベアがまず目に入ってくる。</span>'+
        '<span class="line">そのベルトコンベアで次々と運ばれてくるおいしそうなすしの中から、客は食べたいものを自由に取って食べる。</span>'+
        '<span class="line">ネタの種類は豊富で、季節限定のネタや洋風の変わったネタもあるので、行く<span class="ul-color">{!GRI|たびに|l5-p2}</span>楽しめる<span class="ul-color">{!GRI|はずだ|l5-p3}</span>。</span>'+
        '<span class="line">また、すし以外にラーメンやデザートなどサイドメニューを出す店も増えてきている。</span><br>'+
        
        '　<span class="line">そして、回転ずしは通常、皿の色ごとに値段が決まっている。</span>'+
        '<span class="line">だから、メニューがなく値段がわからない高級なすし屋とは違って、回転ずしなら安心して好きなものを選ぶことができる。</span><br>'+
        
        '<div class="sub-title" style="margin-bottom:5px;"><strong class="line">回転ずしの店に行ったら</strong></div>'+
        '　<span class="line">昼ご飯や晩ご飯の時間帯に店に行くと、行列ができていることが多い。</span>'+
        '<span class="line">待つ時は、入口に置いてある髪に名前と人数を書い<span class="ul-color">{!GRI|ておく|l5-p4}</span>。</span>'+
        '<span class="line">紙ではなくタッチパネルに数を入力する場合もある。</span>'+
        '<span class="line">また、カウンター席かボックス席かを選ぶ店もある。</span>'+
        '<span class="line">席が空くと、順番に呼ばれて中に案内される。</span><br>'+
        
        '　<span class="line">席に着いたら、お茶を用意しよう。</span>'+
        '<span class="line"><span class="ul-color">{!GRI|まず|l5-p5}</span>、席の近くに置いてある湯のみを取り、テーブルにあるお茶の粉末やティーバグを入れる。</span>'+
        '<span class="line"><span class="ul-color">{!GRI|次に|l5-p5}</span>、テーブルに付いているノズルからお湯を注ぐ。</span>'+
        '<span class="line">ノズルの下の黒いボタンを湯のみで押すと、お湯が出るようになっている。</span>'+
        '<span class="line">しょうゆとわさびとお口直しのがり(<ruby>酢漬<rt>すづ</rt></ruby>けのしょうが)も準備し<span class="ul-color">{!GRI|ておく|l5-p4}</span>といい。</span><br>'+
        
        '<div class="sub-title" style="margin-bottom:5px;"><strong class="line">タッチパネルの使い方</strong></div>'+
        '　<span class="line">食べたい時に食べたいネタが回っているとは限らない。</span>'+
        '<span class="line">そんな時便利なのが、客席で注文できるタッチパネルだ。</span>'+
        '<span class="line">店によって違いはあるが、たいてい同じような手順で注文できる。</span><br>'+
        
        '　<span class="line"><span class="ul-color">{!GRI|まず|l5-p5}</span>はじめに、画面の「にぎり」「巻物」「おすすめ」などのカテゴリーの中から見たいものを選んでタッチする。</span>'+
        '<span class="line">すると、詳しいメニューが出てくるので、その中から注文したいものを決めよう。</span>'+
        '<span class="line">ネタの名前がわからなく<span class="ul-color">{!GRI|ても|l5-p6}</span>注文できる<span class="ul-color">{!GRI|ように|l5-p7}</span>、写真が表示されているから安心だ。</span><br>'+
        
        '　<span class="line">どれ<span class="ul-color">{!GRI|にする|l5-p8}</span>か決めたら、<span class="ul-color">{!GRI|次に|l5-p5}</span>、その写真をタッチして、何皿注文するか入力する。</span>'+
        '<span class="line">他にも注文したいものがあれば、同じように繰り返し入力していく。</span><br>'+
        
        '　<span class="line"><span class="ul-color">{!GRI|最後に|l5-p5}</span>、画面の「注文する」のボタンを押せば終わりだ。</span>'+
        '<span class="line">しばらくすると、「注文品」などと書かれた皿にのって、すしが流れてくる。</span><br>'+
        
        '　<span class="line">回転ずしの店は、今では世界中に広がっているが、他の国とは一味違う本場の回転ずしを日本で経験してみよう。</span>'+
      '</div>'+
    '</div>'+
    '<br>'+
     
    
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>本文の<ruby>内容<rt>ないよう</rt></ruby>と<ruby>合<rt>あ</rt></ruby>うものに〇/O、合わないものに×/Xをつけなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">{!PLAY|yomimono_l5-1|25} ({〇|O|answer}) 人気がある回転ずしの店は、いつもたくさん人がいる。</div>'+
      '<div class="problem">{!PLAY|yomimono_l5-1|60.9} ({×|X|answer}) 回転ずしのメニューは一年中同じだ。</div>'+
      '<div class="problem">{!PLAY|yomimono_l5-1|79.2} ({×|X|answer}) 回転ずしの店はメニューがないので、値段がわからない。</div>'+
      '<div class="problem">{!PLAY|yomimono_l5-1|130.7} ({×|X|answer}) 回転ずしのお茶もベルトコンベアで運ばれてくる。</div>'+
      '<div class="problem">{!PLAY|yomimono_l5-1|226} ({×|X|answer}) タッチパネルで注文したすしは、お店の人が持ってきてくれる。</div>'+
    '</div>'
    });
