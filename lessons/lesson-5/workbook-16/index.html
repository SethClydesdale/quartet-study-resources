    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet :
      '<p class="sectionDesc"><span class="sectionNumber">3.</span>文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">コンサートでアーティストがよく{見えるようにステージの近くに行った|みえるようにステージのちかくにいった|' + Genki.getAlts('{見}えるようにステージの{近}くに{行}{った}', 'み|ちか|い|きました') + 'answer;hint:got close to the stage so that I could see;width:290}。</div>'+
        
        '<div class="problem">先生は学生が{理解できるように簡単な言葉で説明してくれた|りかいできるようにかんたんなことばでせつめいしてくれた|' + Genki.getAlts('{理解}{出来}るように{簡単}な{言葉}で{説明}してくれ{た}', 'りかい|でき|かんたん|ことば|せつめい|ました') + 'answer;hint:explained in simple words for them so that they could understand;width:470}。</div>'+
        
        '<div class="problem">私は{病気にならないように野菜を食べる|びょうきにならないようにやさいをたべる|' + Genki.getAlts('{病気}にならないように{野菜}を{食}べる', 'びょうき|やさい|た') + 'answer;hint:eat vegetables so that I don\'t become ill;width:290}ようにしています。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：パーカーさんが日本語が話せるかどうか、知ってる？<br><br>'+
            'B：うん。{日本に留学していたから、話せるはず|にほんにりゅうがくしていたから、はなせるはず|' + Genki.getAlts('{日本}に{留学}していたから、{話}せるはず', 'にほん|りゅうがく|はな') + 'answer;hint:He should be able to speak it, since he studied abroad in Japan;width:450}だよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：コンビニでコンサートチケットが買えるらしいけど、どうやって買うんだろう？<br><br>'+
            'B：私もわからない……。でも、{店員さんに聞けば、教えてくれるはず|てんいんさんにきけば、おしえてくれるはず|' + Genki.getAlts('{店員}さんに{聞}けば、{教}えてくれるはず', 'てんいん|き|おし') + 'answer;hint:if you ask the clerk, he should tell you (how);width:320}だよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">「<ruby>花火<rt>はなび</rt></ruby>」というレストランは、{何を注文しても美味しい|なにをちゅうもんしてもおいしい|' + Genki.getAlts('{何}を{注文}しても{美味}しい{です}', 'なに|ちゅうもん|おい|') + 'answer;hint:no matter what you order, it\'s delicious;width:280}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>昨日<rt>きのう</rt></ruby>のデート、どうだった？<br><br>'+
            'B：実は{何時間待っても、彼女は来なかった|なんじかんまっても、かのじょはこなかった|' + Genki.getAlts('{何時間}{待}っても、{彼女}は{来}なかった', 'なんじかん|ま|かのじょ|こ') + 'answer;hint:she didn\'t come no matter how many hours I waited;width:380}んです……。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">もし{漢字テストがなくても|かんじテストがなくても|answer;hint:even if there isn\'t a kanji test;width:230}、自分で漢字を練習したほうがいい。</div>'+
        
        '<div class="problem">たとえ{お金持ちになっても|おかねもちになっても|answer;hint:even if I become rich}、友達がいなければ幸せにはなれないと思う。</div>'+
        
        '<div class="problem">{海外旅行に行くたびに|かいがいりょこうにいくたびに|' + Genki.getAlts('{海外}{旅行}に{行}くたびに', 'かいがい|りょこう|い') + 'answer;hint:Every time I go on a trip overseas;width:250}、新しい発見がある。</div>'+
        
        '<div class="problem">{あの曲を聞くたびに|あのきょくをきくたびに|' + Genki.getAlts('{あの}{曲}を{聞}くたびに', 'その|きょく|き') + Genki.getAlts('{あの}{歌}を{聞}くたびに', 'その|うた|き') + 'answer;hint:Whenever I hear that song;width:200}、高校の時のこと思い出す。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>秋葉原<rt>あきはばら</rt></ruby>はどうだった？<br><br>'+
            'B：秋葉原は、{オタクの町と言われるだけあって、アニメやアイドルの店がたくさんあって|オタクのまちといわれるだけあって、アニメやアイドルのみせがたくさんあって|' + Genki.getAlts('オタクの{町}と{言}われるだけあって、アニメ{や}アイドルの{店}がたくさんあって', 'まち|い|と|みせ') + 'answer;hint:called the town of <ruby>otaku<rt>オタク</rt></ruby>, and as expected, there are many <ruby>anime<rt>アニメ</rt></ruby> and <ruby>idol<rt>アイドル</rt></ruby> shops;width:600}おもしろかったよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem"><ruby>北村<rt>きたむら</rt></ruby>さんは{弁護士だけあって、話し方が上手|べんごしだけあって、はなしかたがじょうず|' + Genki.getAlts('{弁護士}だけあって、{話}し{方}が{上手}', 'べんごし|はな|かた|じょうず') + 'answer;hint:a lawyer, and as expected, his way of talking is good;width:380}だ。</div>'+
      '</div>'
    });
    </script>
