    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～はずだ|l5-p3}」を使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">フランス人のサラさんがよく行くらしいから、「オランジェ」というフレンチレストランは、{美味しい|おいしい|answer;hint:delicious}はずだ。</div>'+
        
        '<div class="problem"><ruby>優太<rt>ゆうた</rt></ruby>くんは高校の時テニス部だったらしいから{テニスができるはずだ|テニスが出来るはずだ|answer;hint:should be able to play tennis;width:210}。</div>'+
        
        '<div class="problem">この歌は人気があるから、{みんな知っているはずです|みんなしっているはずです|' + Genki.getAlts('{皆}{知}って{い}るはず{です}', 'みんな|し||だ') + 'answer;hint:everyone should know it}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>田中<rt>たなか</rt></ruby>さんは今日カラオケに来るかな？<br><br>'+
            'B：バイトがあるって言っていたから、{来ないはずだ|こないはずだ|' + Genki.getAlts('{来}ないはず{だ}', 'こ|') + 'answer;hint:shouldn\'t be coming;width:150}よ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '学生A：10時からの授業に間に合うかな？<br><br>'+
            '学生B：あと10分あるから、{走れば、間に合うはず|はしれば、まにあうはず|' + Genki.getAlts('{走}れば、{間}に{合}うはず{だ}', 'はし|ま|あ|') + 'answer;hint:we should make it in time if we run;width:260}！'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：どうしたの？元気ないね。<br><br>'+
            'B：実は、{バーベキューをするはずだった||width:280;hint:we were supposed to have a barbecue}んだけど、雨が降ってできなかったんだ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
