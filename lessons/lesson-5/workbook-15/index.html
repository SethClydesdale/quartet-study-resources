    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span><span class="sub-section inline nospacing">　　</span>の言葉をを使って、文や会話を完成させなさい。必要なら<ruby>形<rt>かたち</rt></ruby>を変えなさい。同じ言葉は一度しか使えません。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="sub-section inline">'+
          '　{!GRI|～ておく|l5-p4}　　{!GRI|～はず|l5-p3}　　{!GRI|～たびに|l5-p2}　　{!GRI|～にする|l5-p8}　　{!GRI|～ないでおく|l5-p4}　'+
        '</div><br><br>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　<ruby>森<rt>もり</rt></ruby>：<ruby>小川<rt>おがわ</rt></ruby>さん、<ruby>事故<rt>じこ</rt></ruby><small>(accident)</small>にあったそうですね。<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>ですか。<br><br>'+
            '小川：ええ。心配するといけないから、みんなには言{わないでおいて}ください。'+
          '</div>'+
        '</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '<ruby>娘<rt>むすめ</rt></ruby>：白いTシャツと黒いTシャツとどっちのほうがいいと思う？<br><br>'+
            '母：白のほうが夏らしくていいんじゃない？<br><br>'+
            '娘：じゃあ、白{にする}！'+
          '</div>'+
        '</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>冷蔵庫<rt>れいぞうこ</rt></ruby>の<ruby>牛乳<rt>ぎゅうにゅう</rt></ruby><small>(milk)</small>、全部飲んじゃったから、買{っておい}たよ。<br><br>'+
            'B：ありがとう。'+
          '</div>'+
        '</div>'+
                
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：もう10時か。この近くに今から入れるレストランはないよね？<br><br>'+
            'B：「リオン」はどう？ラストオーダーは10時半だから、まだ開{いているはず}だよ。'+
          '</div>'+
        '</div>'+
      '</div><br>'+
        
        
      '<p class="sectionDesc"><span class="sectionNumber">2.</span><ruby>炊飯器<rt>すいはんき</rt></ruby><small>(rice cooker)</small>の使い方を説明しています。下のa~eから正しいものを選んで(　　)に入れ、会話を完成させなさい。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="sub-section inline">'+
          '<ol class="alpha">'+
            '<li>20分ぐらい待つと、ご飯ができます。</li>'+
            '<li>それから、お<ruby>釜<rt>かま</rt></ruby><small>(iron pot)</small>を炊飯器に<ruby>戻<rt>もど</rt></ruby>して<small>(return)</small>、ふた<small>(lid)</small>を<ruby>閉<rt>し</rt></ruby>めます。</li>'+
            '<li>だから、<ruby>米<rt>こめ</rt></ruby><small>(rice)</small>をいためます。</li>'+
            '<li>まず、米を水で洗います。</li>'+
            '<li>最後に、炊飯器のボタンを押します。</li>'+
            '<li>次に、お釜に洗った米と米の量に合わせた水<small>(an appropriate amount of water)</small>を入れます。</li>'+
          '</ol>'+
        '</div><br><br>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>炊飯器<rt>すいはんき</rt></ruby>の使い方を教えてくれませんか。<br><br>'+
            'B：いいですよ。({d})。({f})。({b})。({e})。({a})。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
