    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|ために|l1-p5}」か「{!GRI|ように|l5-p7}」か、正しいほうを選びなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">いい成績が取れる【{ように|!Iために／ように|spacer:・}】、毎日<ruby>復習<rt>ふくしゅう</rt></ruby>している。</div>'+
        
        '<div class="problem">部屋の<ruby>雰囲気<rt>ふんいき</rt></ruby>が明るくなる【{ように|!Iために／ように|spacer:・}】、花を買った。</div>'+
        
        '<div class="problem">将来、<ruby>弁護士<rt>べんごし</rt></ruby>になる【{ために|!Iために／ように|spacer:・}】、大学で勉強しています。</div>'+
        
        '<div class="problem">日本文化を学ぶ【{ために|!Iために／ように|spacer:・}】、日本に来ました。</div>'+
        
        '<div class="problem">外から鳥の<ruby>鳴<rt>な</rt></ruby>き<ruby>声<rt>ごえ</rt></ruby>が聞こえたので、よく聞こえる【{ように|!Iために／ように|spacer:・}】、<ruby>窓<rt>まど</rt></ruby>を開けた。</div>'+
        
        '<div class="problem">授業に遅れない【{ように|!Iために／ように|spacer:・}】、母が毎朝7時に起こしてくれる。</div>'+
        
        '<div class="problem">朝、時間通りに起きられる【{ように|!Iために／ように|spacer:・}】、<ruby>目覚<rt>めざ</rt></ruby>まし<ruby>時計<rt>どけい</rt></ruby>をセットしておいた。</div>'+
        
        '<div class="problem">朝早く起きる【{ために|!Iために／ように|spacer:・}】、夜早く<ruby>寝<rt>ね</rt></ruby>るようにしています。</div>'+
      '</div>'
    });
