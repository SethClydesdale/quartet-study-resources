    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba"><ruby>空<rt>あ</rt></ruby>いて(い)る　to be free</span>'+
      '<span class="kotoba"><ruby>現地集合<rt>げんちしゅうごう</rt></ruby>　meet at the destination</span>'+
      '<span class="kotoba"><ruby>徒歩<rt>とほ</rt></ruby>　on foot</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|kaiwa_l5-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l5-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l5-1" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">カジュアルな会話</strong>'+
        '<div class="title reduced center">回転ずしに行こう</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">昼休みにジョージ(ジ：)が<ruby>絵理<rt>えり</rt></ruby>(絵：)に話しかける。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">ねえ、絵理ちゃん、今週の土曜日って<ruby>空<rt>あ</rt></ruby>いてる？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">今週の土曜日？特に予定はないけど……。どうして？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">日本語のクラスメートと回転ずしに行くんだけど、よかったら、一緒に行かない？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">へえ、楽しそうだね。でも、私が行ってもいいの？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">もちろん！絵理ちゃんが来てくれたら、みんなも<ruby>喜<rt>よろこ</rt></ruby>ぶと思うし。それに、日本語のクラス取ってないけど、<ruby>研<rt>けん</rt></ruby>も来るって言ってるし。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">あっ、そうなんだ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">予定がないなら、一緒に行こうよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">じゃあ、行こうかな。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">本当？よかった。じゃあ、12時半<ruby>現地集合<rt>げんちしゅうごう</rt></ruby>なんだけど、いい？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">いいけど、どこの回転ずし？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">「<ruby>海<rt>うみ</rt></ruby>ずし」。<ruby>北山<rt>きたやま</rt></ruby>駅から<ruby>徒歩<rt>とほ</rt></ruby>5分ぐらいのところなんだけど……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">ああ、そこなら、たぶんわかると思う。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">じゃあ、お店は僕の名前で予約しとくから。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">絵</div>'+
          '<div class="text">オッケー！じゃあ、土曜日に。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">うん。楽しみにしてるね。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l5-1|18} ジョージはどうして<ruby>絵理<rt>えり</rt></ruby>を誘いましたか。<br>'+
          '{日本語のクラスメートと回転ずしに行ったからです|にほんごのクラスメートとかいてんずしに行ったからです|' + Genki.getAlts('{日本語}のクラスメートと{回転}{寿司}に{行}ったから{です}', 'にほんご|かいてん|ずし|い|') + 'answer;width:500}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l5-1|55.2} ジョージと絵理は、いつ、どこで会いますか。<br>'+
          '{土曜日に12時半海ずしで会います|どようびに12じはんうみずしであいます|' + Genki.getAlts('{土曜日}に12{時}{半}{海}{寿司}で{会}います', 'どようび|じ|はん|うみ|ずし|あ') + 'answer;width:500}。'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>ジョージは<ruby>変更<rt>へんこう</rt></ruby>の<ruby>希望<rt>きぼう</rt></ruby><small>(request)</small>を言う時、何と言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l5-1|13.7} <strong class="main-color">話しかける時</strong><br>'+
          '<div class="example">'+
            'ねえ、絵理ちゃん、今週の{土曜日って空いてる|どようびってあいてる|' + Genki.getAlts('{土曜日}って{空}いてる', 'どようび|あ') + 'answer}？'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l5-1|23.9} <strong class="main-color">誘う時</strong><br>'+
          '<div class="example">'+
            '回転ずしに行くんだけど、{よかったら}、一緒に{行か|いか|answer}ない？'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l5-1|55.2} <strong class="main-color">時間と場所を伝える時</strong><br>'+
          '<div class="example">'+
            '本当？よかった。じゃあ、{12時半現地集合な|12じはんげんちしゅうごうな|' + Genki.getAlts('12{時}{半}{現地集合}な', 'じ|はん|げんちしゅうごう') + 'answer}んだけど、いい？'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<div class="box-color bg padded min-width">'+
      '<h4 class="sub-title-color" style="margin:5px 0;"><i class="fa">&#xf0eb;</i> <span class="en">Noteworthy Points</span><span class="ja">ここにも注目</span></h4>'+
      '<ul>'+
        '<li>{!GRI|～てる|l5-p0001}</li>'+
        '<li>{!GRI|～かな|l5-p0002}</li>'+
        '<li>{!GRI|～とく|l5-p0003}</li>'+
      '</ul>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('kaiwa_l5-1', [
      [9.3, 12.3],

    ]);
