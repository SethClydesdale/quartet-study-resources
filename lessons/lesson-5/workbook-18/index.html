    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">2.</span>(　　)の<ruby>動詞<rt>どうし</rt></ruby>と「{!GRI|たら|l5-p001-1}」「{!GRI|と|l5-p001-2}」「{!GRI|ば|l5-p001-3}」「{!GRI|なら|l5-p001-4}」の中の<ruby>適当<rt>てきとう</rt></ruby>なものを使って、文を作りなさい。(答えが2つ以上ある<ruby>場合<rt>ばあい</rt></ruby>もあります。)</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：何時に<ruby>迎<rt>むか</rt></ruby>えに行きましょうか。<br><br>'+
            'B：まだ何時着くかわからないので、空港に(着く <i class="fa">&#xf061;</i> {着いたら|ついたら|answer})電話します。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">毎日ゲームを(する <i class="fa">&#xf061;</i> {すると|したら|answer})目が悪くなりますよ。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>京都<rt>きょうと</rt></ruby>に行くバスは何時か知っていますか。<br><br>'+
            'B：さあ。でもインターネットで(調べる <i class="fa">&#xf061;</i> {%(調べれば/調べたら/調べると)|%(しらべれば/しらべたら/しらべると)|answer})<ruby>簡単<rt>かんたん</rt></ruby>にわかりますよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">〈料理で〉3分(たつ <i class="fa">&#xf061;</i> {たったら})火を止めてください。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>九州<rt>きゅうしゅう</rt></ruby>に行きたいんですが、どうやって行ったらいいでしょうか。<br><br>'+
            'B：九州へ(行く <i class="fa">&#xf061;</i> {行くなら|いくなら|answer})<ruby>新幹線<rt>しんかんせん</rt></ruby>がいいですよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">その本、<ruby>捨<rt>す</rt></ruby>てるんですか。(捨てる <i class="fa">&#xf061;</i> {捨てるなら|すてるなら|answer})私にください。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：もうすぐ春ですね<br><br>'+
            'B：ええ。暖かく(なる <i class="fa">&#xf061;</i> {なったら})ピクニックをしましょう。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：天気がいいですね。ご飯を食べ(終わる <i class="fa">&#xf061;</i> {終わったら|おわったら|answer})<ruby>散歩<rt>さんぽ</rt></ruby>に行きませんか。<br><br>'+
            'B：いいですね。じゃあ、急いで食べます。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'サラ：私、そろそろ帰るね。<br><br>'+
            '<ruby>絵理<rt>えり</rt></ruby>：サラが(帰る <i class="fa">&#xf061;</i> {帰るなら|かえるなら|answer})私も<ruby>一緒<rt>いっしょ</rt></ruby>に帰ろうかな。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem"><ruby>窓<rt>まど</rt></ruby>を(開ける <i class="fa">&#xf061;</i> {開けたら|あけたら|answer})雪が<ruby>降<rt>ふ</rt></ruby>っていた。</div>'+
      '</div>'
    });
