    <script>Genki.generateQuiz({

    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l5-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l5-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l5-2" class="chokai-script dialogue AB noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">肉じゃがの作り方</div>'+ 
        '　<span class="line">日本の「家庭料理の定番」と言われる<span class="ul-color">{!GRI|だけあって|l5-p9}</span>、だれからも愛される肉じゃが。</span>'+
        '<span class="line">今日はその肉じゃがを作ってみましょう。</span>'+
        '<span class="line">和食が好きな人なら、きっと気に入る<span class="ul-color">{!GRI|はずです|l5-p3}</span>。</span>'+
        '<span class="line">甘辛い味がご飯によく合います。</span><br><br>'+
        
        '<table class="table alt-cell-color" style="width:60%; margin:0 auto;">'+
          '<tr class="table-head">'+
            '<td colspan="2" class="center"><span class="line">〈材料(2人分)〉</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td style="width:50%;"><span class="line">じゃがいも</span></td>'+
            '<td style="width:50%;"><span class="line">3個</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td><span class="line">にんじん</span></td>'+
            '<td><span class="line">1/2本</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td><span class="line">玉ねぎ</span></td>'+
            '<td><span class="line">1/2個</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td><span class="line">牛肉の薄切り</span></td>'+
            '<td><span class="line">100g</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td><span class="line">サラダ油</span></td>'+
            '<td><span class="line">大さじ1</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td><span class="line">だし</span></td>'+
            '<td><span class="line">400ml</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td><span class="line">酒</span></td>'+
            '<td><span class="line">大さじ3</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td><span class="line">砂糖</span></td>'+
            '<td><span class="line">大さじ2</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td><span class="line">みりん</span></td>'+
            '<td><span class="line">大さじ2</span></td>'+
          '</tr>'+
          '<tr>'+
            '<td><span class="line">しょうゆ</span></td>'+
            '<td><span class="line">大さじ3</span></td>'+
          '</tr>'+
        '</table>'+
        
        '<ol>'+
          '<li>'+
            '<span class="line"><span class="ul-color">{!GRI|まず|l5-p5}</span>、材料を切ります。</span>'+
            '<span class="line">じゃがいもは皮をむいて食べやすい大きさに、にんじんは縦に半分に切ってから、5ミリ幅に、玉ねぎは薄くスライスし、牛肉も食べやすい大きさに切ります。</span>'+
          '</li>'+
          '<li>'+
            '<span class="line"><span class="ul-color">{!GRI|次に|l5-p5}</span>、なべにサラダ油を入れて熱し、牛肉をいためます。</span>'+
            '<span class="line">肉の色が変わったら、1で切っ<span class="ul-color">{!GRI|ておいた|l5-p4}</span>他の料理を加えて、軽くいためます。</span>'+
          '</li>'+
          '<li>'+
            '<span class="line"><span class="ul-color">{!GRI|それから|l5-p5}</span>、だし、酒、砂糖、みりんを加えて中火で煮ます。</span>'+
            '<span class="line">すると、表面にアクが出てくるので、それを取りながら10文ぐらい煮ます。</span>'+
          '</li>'+
          '<li>'+
            '<span class="line">その後、しょうゆを加え、弱火にして10分煮ます。</span>'+
            '<span class="line">こげない<span class="ul-color">{!GRI|ように|l5-p7}</span>様子を見ながら火を調整しましょう。</span>'+
          '</li>'+
          '<li>'+
            '<span class="line">じゃがいもがやわらかくなったら完成です。</span>'+
          '</li>'+
        '</ol>'+
        
        '<div class="example">'+
          '<div class="center"><strong class="line">〈料理メモ〉</strong></div>'+
        
          '<div class="sub-title" style="margin-bottom:5px;"><strong class="line">「だし」とは？</strong></div>'+
          '　<span class="line">かつお<ruby>節<rt>ぶし</rt></ruby>やこんぶなどをに煮出した汁を「だし(出汁)」と呼びます。</span>'+
          '<span class="line">だしは、いろいろな和食に使われている重要な「うまみ」です。</span>'+
          '<span class="line">お湯に溶かすだけの便利な粉末タイプも人気があります。</span><br>'+
        
          '<div class="sub-title" style="margin-bottom:5px;"><strong class="line">余ったら「和風カレー」に</strong></div>'+
          '　<span class="line">余った肉じゃがに水とカレールーを入れて煮込めば、和風カレーができます。</span>'+
          '<span class="line">肉じゃがの汁も一緒に入れるとおいしいので、汁は捨て<span class="ul-color">{!GRI|ないでおき|l5-p4}</span>ましょう。</span>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>{!PLAY|yomimono_l5-2|23.4} 「肉じゃが」はどんな味ですか。何と一緒に食べるとおいしいですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{甘辛い味|あまからいあじ|' + Genki.getAlts('{甘辛}い{味}', 'あまから|あじ') + 'answer}です。</div>'+
      '<div class="problem">{ご飯と一緒に食べるとおいしい|ごはんといっしょにたべるとおいしい|' + Genki.getAlts('ご{飯}と{一緒}に{食}べると{美味}しい', 'はん|いっしょ|た|おい') + 'answer}です。</div>'+
    '</div>'+
    
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|yomimono_l5-2|76.7} 「肉じゃが」はどんな料理ですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">「肉じゃが」は、牛肉、じゃがいも、にんじん、玉ねぎを{いため}てから、だし、酒、<ruby>砂糖<rt>さとう</rt></ruby>、みりん、しょうゆを入れた汁で{煮た|にた|answer}料理です。</div>'+
    '</div>'+
    
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|yomimono_l5-2|156.5} 「だし」とはどんなものですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">「だし」とは、{かつお節やこんぶなどを煮出した汁|かつおぶしやこんぶなどをにだしたしる|' + Genki.getAlts('{鰹}{節}や{昆布}などを{煮}{出}した{汁}', 'かつお|ぶし|こんぶ|に|だ|しる') + 'answer}です。</div>'+
    '</div>'+
    
    '<p class="sectionDesc"><span class="sectionNumber">4.</span>{!PLAY|yomimono_l5-2|168.8} 粉末タイプのだしはどうやって使いますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{お湯に溶かし|おゆにとかし|' + Genki.getAlts('{お}{湯}に{溶}かし', '|ゆ|と') + 'answer}て使います。</div>'+
    '</div>'+
    
    '<p class="sectionDesc"><span class="sectionNumber">5.</span>{!PLAY|yomimono_l5-2|179.1} 和風カレーはどうやって作りますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{余った肉じゃがに水とカレールーを入れて煮込んで|あまったにくじゃがにみずとカレールーをいれてにこんで|' + Genki.getAlts('{余}った{肉}じゃがに{水}とカレールーを{入}れて{煮}{込}んで', 'あま|にく|みず|い|に|こ') + 'answer}作ります。</div>'+
    '</div>'
    });
