    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ように|l5-p7}」を使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">目が悪いから、ホワイトボードに書いてある字がよく{見える|みえる|answer;hint:can see}ように、前の方の席に座った。</div>'+
        
        '<div class="problem">この本は、{子どもでもわかるように|こどもでもわかるように|' + Genki.getAlts('{子}{供}でも{分}るように', 'こ|ども|わか') + 'answer;hint:so that even children understand it;width:250}簡単な言葉で書いてあるから、読みやすい。</div>'+
        
        '<div class="problem">{授業の内容を忘れないように|じゅぎょうのないようをわすれないように|' + Genki.getAlts('{授業}の{内容}を{忘}れないように', 'じゅぎょう|ないよう|わす') + 'answer;hint:So that you don\'t forget the content of the lesson;width:350}、ノートを取ったほうがいい。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '先生：寒くなってきたから、{風邪をひかないように気を付けて|かぜをひかないようにきをつけて|' + Genki.getAlts('{風邪}をひかないように{気}を{付}けて', 'かぜ|き|つ') + 'answer;hint:take care so that you don\'t catch a cold;width:280}ください。<br><br>'+
            '学生：はい、ありがとうございます。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：明日はジョージの<ruby>誕生日<rt>たんじょうび</rt></ruby>だね。みんなでレストラン「カルチェ」に行かない？<br><br>'+
            'B：いいね！でも、あの店はいつも込んでいるから、{すぐ入るように予約して|すぐはいるようによやくして|' + Genki.getAlts('すぐ{入}るように{予約}して', 'はい|よやく') + 'answer;hint:make a reservation so that we can enter right away;width:440}おこう。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：大学生活で何か気を付けていることがありますか。<br><br>'+
            'B：{忘れ物をしないように|わすれものをしないように|' + Genki.getAlts('{忘}れ{物}をしないように', 'わす|もの') + 'answer;hint:So that I don\'t forget anything;width:220}、{前の日に準備するようにしています|まえのひにじゅんびするようにしています|' + Genki.getAlts('{前}の{日}に{準備}するようにして{い}{ます}', 'まえ|ひ|じゅんび||る') + 'answer;hint:I try to prepare the day before}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
