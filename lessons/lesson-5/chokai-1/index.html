    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd">'+
      '<span class="sectionNumber3rd fa">&#xf054;</span>留学生のソヨンが、寮のルームメートと今日の晩ご飯について話しています。会話を聞いて、2人が作るものに〇/Oをつけなさい。'+
    '</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba"><ruby>揚<rt>あ</rt></ruby>げ<ruby>物<rt>もの</rt></ruby>　deep-fried food</span>'+
      '<span class="kotoba"><ruby>冷凍庫<rt>れいとうこ</rt></ruby>　freezer</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|chokai_l5-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l5-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l5-1" class="chokai-script dialogue clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">今日の晩ご飯</div>'+
        '<div class="line">'+
          '<div class="name">ルームメート</div>'+
          '<div class="text">もう6時かあ。今日の晩ご飯どうする？何か作る？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ソヨン</div>'+
          '<div class="text">出かけるのは<ruby>嫌<rt>いや</rt></ruby>だから、今あるもので作ろうよ。<ruby>冷蔵庫<rt>れいぞうこ</rt></ruby>に何が残てたっけ？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ル</div>'+
          '<div class="text">確かとり肉と玉ねぎがあった<span class="ul-color">{!GRI|はず|l5-p3}</span>……。それで何が作れるかな？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ソ</div>'+
          '<div class="text">ネットで調べてみよ。……見て。いろんなレシピが出てきたよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ル</div>'+
          '<div class="text">見せて見せて。わあ、何これ、おいしそう！</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ソ</div>'+
          '<div class="text">ほんとだ！ああ、でも、トマト<ruby>缶<rt>かん</rt></ruby>もヨーグルトもないなあ……。じゃあ、これは？これなら、あるもので作れるよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ル</div>'+
          '<div class="text">そうだけど……。<ruby>揚<rt>あ</rt></ruby>げ<ruby>物<rt>もの</rt></ruby>は油の片づけが大変だからなあ……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ソ</div>'+
          '<div class="text">じゃあ、これは？簡単そうだよ。あ、でも三つ葉がないか……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ル</div>'+
          '<div class="text">ねえ、オムライスもよさそうじゃない？にんじんとグリーンピースが入ったミックスベジタブルが<ruby>冷凍庫<rt>れいとうこ</rt></ruby>にあるし、たまごもあるし。……ケチャップはあったっけ？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ソ</div>'+
          '<div class="text">冷蔵庫、見てみる。……あ、あと少ししかない！買っ<span class="ul-color">{!GRI|ておけば|l5-p4}</span>よかった……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ル</div>'+
          '<div class="text">じゃあ、やっぱりこれ<span class="ul-color">{!GRI|にしよう|l5-p8}</span>よ。とり肉も玉ねぎもたまごも調味料も全部あるし、簡単そうだし。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ソ</div>'+
          '<div class="text">そうだね！おなかすいたし、早く作ろう！</div>'+
        '</div>'+
      '</div>'+ // <span class="ul-color">{!GRI||l5-p}</span>
    '</div>'+
    '<br>'+
    
        
    '<ol class="alpha">'+
      '<li class="problem">{!PLAY|chokai_l5-1|67.1} ({||width:21}) とりのから<ruby>揚<rt>あ</rt></ruby>げ</li>'+
      '<li class="problem">{!PLAY|chokai_l5-1|56.1} ({||width:21}) トマトチキンカレー</li>'+
      '<li class="problem">{!PLAY|chokai_l5-1|81.3} ({||width:21}) オムライス</li>'+
      '<li class="problem">{!PLAY|chokai_l5-1|103.8} ({○|O|answer}) 親子<ruby>丼<rt>どん</rt></ruby></li>'+
    '</ol>'+
        
    '<div class="center" style="width:80%; margin:0 auto;">{!IMG|chokai-l5-1.png}</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('chokai_l5-1', [
      [21.7, 27.7],
      [28.3, 35.5],
      [36.4, 43.1],
      [43.9, 49.6],
      [50.5, 55.7],
      [56.1, 66.2], // 6
      [67.1, 72.6],
      [73.4, 80.8],
      [81.3, 94.5],
      [95.3, 102.7],
      [103.8, 112.6],
      [112.9, 118]
    ]);
    
    // keeps the audio on-screen when the user scrolls out of view
    Genki.stickyAudio.init('static-audio');
    </script>
