    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ても|l5-p1}」を使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">「<ruby>子守熊<rt>こもりぐま</rt></ruby>」という言葉の読み方が知りたいが、{だれに聞いても|だれにきいても|' + Genki.getAlts('{誰}に{聞}いても', 'だれ|き') + 'answer;hint:no matter who I ask;width:150}わからない。</div>'+
        
        '<div class="problem"><ruby>黒木<rt>くろき</rt></ruby>さんは、{どんなに食べても|どんなにたべても|answer;hint:no matter how much he eats;width:220}<ruby>太<rt>ふと</rt></ruby>らないそうだ。</div>'+
        
        '<div class="problem">{どこを探しても|どこをさがしても|answer;hint:No matter where I search;width:200}かぎが見つからない。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '社員A：<ruby>秋山<rt>あきやま</rt></ruby>部長と来週の予定について電話で話しましたか。<br><br>'+
            '社員B：それが、{いつ電話しても|いつでんわしても|answer;hint:no matter when I call;width:180}電話に出ないんです。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：あの宿題の答え、わかった？<br><br>'+
            'B：ううん。{いくら考えても|いくらかんがえても|answer;hint:No matter how much I think;width:210}わからなくて……。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：何かおすすめの映画がありますか。<br><br>'+
            'B：私のおすすめは、「もののけ<ruby>姫<rt>ひめ</rt></ruby>」という映画です。<br><br>'+
            '<span class="hidden">B：</span>{何度見ても|なんどみても|' + Genki.getAlts('{何度}{見}ても', 'なんど|み') + 'answer;hint:No matter how much I watch it;width:230}おもしろいですよ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
