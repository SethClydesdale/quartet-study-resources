    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">スピーチを聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span><ruby>韓国人<rt>かんこくじん</rt></ruby>留学生のソヨンが、クラスで「家に<ruby>遊<rt>あそ</rt></ruby>びに行く<ruby>約束<rt>やくそく</rt></ruby>」についてスピーチをしています。スピーチを聞いて質問に答えなさい。</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba">この<ruby>間<rt>あいだ</rt></ruby>　the other day</span>'+
      '<span class="kotoba"><ruby>通<rt>とお</rt></ruby>る　to pass</span>'+
      '<span class="kotoba"><ruby>前<rt>まえ</rt></ruby>もって　in advance</span>'+
      '<span class="kotoba"><ruby>面倒<rt>めんどう</rt></ruby>な　troublesome</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|chokai_l5-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l5-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l5-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+ // <span class="ul-color">{!GRI||l5-p}</span>
        '<div class="title reduced center">家に<ruby>遊<rt>あそ</rt></ruby>びに行く<ruby>約束<rt>やくそく</rt></ruby></div>'+
        '　<span class="line">日本に留学してる3カ月になり、仲がいい日本人の友達もできました。</span>'+
        '<span class="line">その友達は同じ授業を取っているので、授業の後に晩ご飯を食べに行ったりカラオケに行ったりします。</span><br>'+
        
        '　<span class="line">この間、その友達の家に近くを通ったので、<ruby>遊<rt>あそ</rt></ruby>びに行ってみることにしました。</span>'+
        '<span class="line">ところが友達は、「今はちょっと無理。遊びに来る時は、前もって<ruby>連絡<rt>れんらく</rt></ruby>してもらえないかな？」と言って、中に入れてくれませんでした。</span><br>'+
        
        '　<span class="line">授業の後で遊ぶ時は前もって<ruby>約束<rt>やくそく</rt></ruby>しなくてもいいのに、どうして家に遊びに行く時は約束が必要なのかわかりませんでした。</span>'+
        '<span class="line">それで、他の日本人の友達に聞いてみたら、「その時忙しかっただけかもしれないけど、人の家に行く時は、約束し<span class="ul-color">{!GRI|ておいた|l5-p4}</span>ほうがいいよ。お客さんが来る前に<ruby>掃除<rt>そうじ</rt></ruby>したい人もいるし」と言われました。</span><br>'+
        
        '　<span class="line">約束をし<span class="ul-color">{!GRI|ておかない|l5-p4}</span>と家に遊びに行けないのは<ruby>面倒<rt>めんどう</rt></ruby>だと思うのですが、日本では約束をし<span class="ul-color">{!GRI|ておいた|l5-p4}</span>ほうがいいのでしょうか。</span>'+
        '<span class="line">みなさんの国ではどうですか。</span>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>スピーチの<ruby>内容<rt>ないよう</rt></ruby>に<ruby>合<rt>あ</rt></ruby>うものに〇/O、合わないものに×/Xをつけなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">{!PLAY|chokai_l5-2|27.6} ({〇|O|answer}) 授業の後に、ソロンと友達は一緒に出かけることがある。</div>'+
      '<div class="problem">{!PLAY|chokai_l5-2|37.8} ({〇|O|answer}) ソヨンは<ruby>約束<rt>やくそく</rt></ruby>をしないで、友達の家に<ruby>遊<rt>あそ</rt></ruby>びに行った。</div>'+
      '<div class="problem">{!PLAY|chokai_l5-2|59.3} ({×|X|answer}) ソヨンの友達は、授業の後で遊ぶ時も約束をしてほしいと思っている。</div>'+
      '<div class="problem">{!PLAY|chokai_l5-2|71.6} ({×|X|answer}) 他の日本人の友達は、約束をしないで人の家に行ってもいいと考えている。</div>'+
      '<div class="problem">{!PLAY|chokai_l5-2|59.3} ({〇|O|answer}) ソヨンは、友達の家に遊びに行く時には、約束しなくてもいいと思っている。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|chokai_l5-2|71.6} ソヨンが相談した日本人の友達は、どうして約束をしたほうがいいと言っていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{お客さんが来る前に掃除したい人もいる|おきゃくさんがくるまえにそうじしたいひともいる|' + Genki.getAlts('お{客}さんが{来}る{前}に{掃除}したい{人}もいる', 'きゃく|く|まえ|そうじ|ひと') + 'answer;width:400}からです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|chokai_l5-2|90.7} ソヨンは、何が<ruby>面倒<rt>めんどう</rt></ruby>だと思っていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{約束しておかないと家に遊びに行けない|やくそくしておかないといえにあそびにいけない|' + Genki.getAlts('{約束}しておかないと{家}に{遊}びに{行}けない', 'やくそく|いえ|あそ|い') + 'answer;width:400}ことです。</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('chokai_l5-2', [
      [20.6, 26.8],

    ]);
