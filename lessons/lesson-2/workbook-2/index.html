    <script>Genki.generateQuiz({
      type : 'fill',

        '<table class="table alt-cell-color">'+

              '<div class="line" style="margin:5px 0;">　<ruby>件名<rt>けんめい</rt></ruby>：　<span class="pseudo-input" style="width:75%;"><ruby>推薦状<rt>すいせんじょう</rt></ruby>のお願い</span></div>'+
            '</td>'+
          '</tr>'+
          '<tr>'+
            '<td style="padding:20px;">'+
              '<span class="line">鈴木先生</span><br><br>'+
        
              '<span class="line">日本は冷たい風が<span class="ul-color">{!GRI|吹き|l2-p1}</span>、毎日寒いです。</span>'+
              '<span class="line">そちらは、雪の降る日が続いていると思いますが、お元気でいらっしゃいますか。</span>'+
              '<span class="line">私はやっと日本の生活に慣れ<span class="ul-color">{!GRI|てきて|l2-p2}</span>、毎日楽しんでいます。</span>'+
              '<span class="line">お正月には初めておせち料理を食べました。</span>'+
              '<span class="line">ホストファミリーに一つ一つの料理の意味や作り方を<span class="ul-color">{!GRI|教えてもらい|l2-p1}</span>、和食についてもっと知りたくなりました。</span><br><br>'+
        
              '<span class="line">さて、実は今日はお願いしたいことが<span class="ul-color">{!GRI|あり|l2-p1}</span>、メールしました。</span>'+

              '<span class="line">イベントでは、料理や言葉など、自分の国の文化を町の人に教えるそうです。</span>'+

        '<div class="inner-problem">'+
          '{!PLAY|yomimono_l2-1|60} このメールの本題の部分は、何行目から何行目までですか。<br><br>'+

        '</div>'+
      '</div>'+

        '<div class="inner-problem">'+
          '{!PLAY|yomimono_l2-1|18} このメールの書き手の目的は何ですか。<br><br>'+

        '</div>'+
      '</div>'+
    '</div>'+

    '<h4 class="sub-title-color"><span class="num">4</span> お願いやお礼の<ruby>表現<rt>ひょうげん</rt></ruby> <small>(Expressing requests and gratitude)</small> {!GRI|<button class="button"><i class="fa">&#xf02d;</i><span class="en">View in Grammar Index</span><span class="ja">文法索引で見る</span></button>|l2-p02}</h4>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|yomimono_l2-1|105.7} 「書いていただけないでしょうか」<small>(行17～18)</small>とありますが、<br><br>'+
          '　　　だれが書きますか。【{鈴木先生|!I鈴木先生／ジョージ|spacer:alpha}】 '+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|yomimono_l2-1|114.9} 「2月<ruby>上旬<rt>じょうじゅん</rt></ruby>までに送っていただければ<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>です」<small>(行18～19)</small>とありますが、<br><br>'+
          '　1.　だれが送りますか。　【{鈴木先生|!I鈴木先生／ジョージ|spacer:alpha}】<br><br> '+
          '　2.　だれが大丈夫ですか。【{ジョージ|!I鈴木先生／ジョージ|spacer:alpha}】 '+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+

          '　1.　だれが返事がほしいですか。【{ジョージ|!I鈴木先生／ジョージ|spacer:alpha}】<br><br> '+
          '　2.　だれがうれしいですか。　　【{ジョージ|!I鈴木先生／ジョージ|spacer:alpha}】 '+
        '</div>'+
      '</div>'+
