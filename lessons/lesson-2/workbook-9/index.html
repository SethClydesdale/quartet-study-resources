    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ことにする|l2-p4}」か「{!GRI|～ことにしている|l2-p4}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">来学期、{経済のクラスを取る|けいざいのクラスをとる|' + Genki.getAlts('{経済}のクラスを{取}る', 'けいざい|と') + 'answer;hint:take economics class}ことにしました。</div>'+
        
        '<div class="problem">日本語の勉強のために{毎日日本のニュースを見る|まいにちにほんのニュースをみる|' + Genki.getAlts('{毎日}{日本}のニュースを{見}る', 'まいにち|にほん|み') + 'answer;hint:watch Japan\'s news every day}ことにしています。</div>'+
        
        '<div class="problem">旅行に行った時は、必ず{お土産を買って帰ることにしています|おみやげをかってかえることにしています|' + Genki.getAlts('お{土産}を{買}って{帰}ることにしています', 'みやげ|か|かえ') + Genki.getAlts('お{土産}を{買}って{帰}ることにして{い}る', 'みやげ|か|かえ|') + 'answer;hint:make it a rule to buy a souvenir to bring back (return) home;width:420}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：来学期もアルバイトするの？<br><br>'+
            'B：ううん。今学期はアルバイトをしすぎて勉強する時間がなくなってしまったから、来学期はアルバイトを{しないことにした|しないことにしました|answer;hint:decided not to}よ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '先生：ルームメートとよく日本語で話しますか。<br><br>'+
            '学生：はい。{日本語だけで話すことにしています|にほんごだけではなすことにしています|' + Genki.getAlts('{日本語}だけで{話}すことにしています', 'にほんご|はな') + 'answer;hint:(I) make it a rule to speak only in Japanese;width:310}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>健康<rt>けんこう</rt></ruby>のために、何か気を<ruby>付<rt>つ</rt></ruby>けていますか。<br><br>'+
            'B：ええ、{毎日1時間、運動することにしています|まいにち1じかん、うんどうすることにしています|' + Genki.getAlts('{毎日}1{時間}、{運動}することにしています', 'まいにち|じかん|うんどう') + Genki.getAlts('{毎日}{一}{時間}、{運動}することにしています', 'まいにち|いち|じかん|うんどう') + 'answer;hint:(I) make it a rule to exercise for 1 hour every day;width:350}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
