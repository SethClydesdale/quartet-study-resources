    <script>Genki.generateQuiz({

        "誘惑|ゆうわく": "temptation|彼は同僚の女性を<strong class='main-color'><ruby>誘惑<rt>ゆうわく</rt></ruby></strong>しています。", // 誘
        "誘う|さそう": "to invite (someone) to|私は、デートの<strong class='main-color'><ruby>誘<rt>さそ</rt></ruby>い</strong>を断った。",
        "機会|きかい": "chance; opportunity|ハイキングは自然に親しむ良い<strong class='main-color'><ruby>機会<rt>きかい</rt></ruby></strong>ですよ。", // 機
        "敬具|けいぐ": "sincerely yours <small>[a closing greeting in letters]</small>", // 具
        "家具|かぐ": "furniture|私は木の<strong class='main-color'><ruby>家具<rt>かぐ</rt></ruby></strong>が好きです。",
        "具体的(な)|ぐたいてき(な)": "conrete|彼は<strong class='main-color'><ruby>具体的<rt>ぐたいてき</rt></ruby>な</strong>例を挙げた。",
        "二倍|にばい": "twice; double|二の<strong class='main-color'><ruby>二倍<rt>にばい</rt></ruby></strong>は四だ。", // 倍
        "伺う|うかがう": "to visit; to ask (a superior)|明日、お宅へ<strong class='main-color'><ruby>伺<rt>うかが</rt></ruby>います</strong>。", // 伺
        "一億|いちおく": "one hundred million|その銀行は、<strong class='main-color'><ruby>一億<rt>いちおく</rt></ruby></strong>ドルの損失を出した。", // 憶
        "バス停|ばすてい": "bus stop|次の<strong class='main-color'>バス<ruby>停<rt>てい</rt></ruby></strong>で降ります。", // 停
        "停まる|とまる": "to stop|あそこに人力車が何台か<strong class='main-color'><ruby>停<rt>と</rt></ruby>まっている</strong>のが見える？",
        "健康|けんこう": "health|<strong class='main-color'><ruby>健康<rt>けんこう</rt></ruby></strong>のためには運動が一番です。", // 健
        "健やか(な)|すこやか(な)": "healthy|お子さんが<strong class='main-color'><ruby>健<rt>すこ</rt></ruby>やかに</strong>育ちますように。",
        "植林|しょくりん": "tree planting|切り出しが終わった後は夕方まで<strong class='main-color'><ruby>植林<rt>しょくりん</rt></ruby></strong>の作業かな。", // 林
        "林|はやし": "wood; forest|その<strong class='main-color'><ruby>林<rt>はやし</rt></ruby></strong>には<ruby>鹿<rt>しか</rt></ruby>がいます。",
        "森林|しんりん": "forest; woods|わが国の国土は70%が<strong class='main-color'>森林</strong>です。", // 森
        "森|もり": "forest|その<strong class='main-color'><ruby>森<rt>もり</rt></ruby></strong>にはクマが住んでいます。",
        "三杯|さんぱい": "three cups|お茶を<strong class='main-color'><ruby>三杯<rt>さんぱい</rt></ruby></strong>ください。", // 杯
        "柔道|じゅうどう": "judo|彼の<strong class='main-color'><ruby>柔道<rt>じゅうどう</rt></ruby></strong>の技は日本一です。", // 柔
        "柔らかい|やわらかい": "soft; gentle|この犬は毛が<strong class='main-color'><ruby>柔<rt>やわ</rt></ruby>らかい</strong>。",
        "植物|しょくぶつ": "plant|雨不足で<strong class='main-color'><ruby>植物<rt>しょくぶつ</rt></ruby></strong>が<ruby>枯<rt>か</rt></ruby>れた。", // 植
        "植える|うえる": "to plant|庭にバラを<strong class='main-color'><ruby>植<rt>う</rt></ruby>えました</strong>。"
