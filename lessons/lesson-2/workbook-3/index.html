    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l2-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l2-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l2-1" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">留学生からのメール</div>'+
        
        '<p class="line">ジョージがアメリカの大学の<ruby>鈴木<rt>すずき</rt></ruby>先生にメールを書く。</p>'+
        
        '<table class="table alt-cell-color">'+
          '<tr class="table-head">'+
            '<td>'+
              '<div class="line" style="margin:5px 0;">　<ruby>宛先<rt>あてさき</rt></ruby>：　<span class="pseudo-input" style="width:75%;">鈴木<ruby>玲子<rt>れいこ</rt></ruby>先生 &lt;r.suzuki@nau.edu&gt;</span></div>'+
              '<div class="line" style="margin:5px 0;">　<ruby>件名<rt>けんめい</rt></ruby>：　<span class="pseudo-input" style="width:75%;"><ruby>推薦状<rt>すいせんじょう</rt></ruby>のお願い</span></div>'+
            '</td>'+
          '</tr>'+
          '<tr>'+
            '<td style="padding:20px;">'+
              '<span class="line">鈴木先生</span><br><br>'+
        
              '<span class="line">日本は冷たい風が<span class="ul-color">{!GRI|吹き|l2-p1}</span>、毎日寒いです。</span>'+
              '<span class="line">そちらは、雪の降る日が続いていると思いますが、お元気でいらっしゃいますか。</span>'+
              '<span class="line">私はやっと日本の生活に慣れ<span class="ul-color">{!GRI|てきて|l2-p2}</span>、毎日楽しんでいます。</span>'+
              '<span class="line">お正月には初めておせち料理を食べました。</span>'+
              '<span class="line">ホストファミリーに一つ一つの料理の意味や作り方を<span class="ul-color">{!GRI|教えてもらい|l2-p1}</span>、和食についてもっと知りたくなりました。</span><br><br>'+
        
              '<span class="line">さて、実は今日はお願いしたいことが<span class="ul-color">{!GRI|あり|l2-p1}</span>、メールしました。</span>'+
              '<span class="line">大学がある<ruby>南山<rt>みなみやま</rt></ruby>市では、毎年春に留学生のインターンシッププログラムがあります。</span>'+
              '<span class="line">これは、市の国際交流課に仕事を手伝いながら、小・中学校やコミュニティーセンターで異文化交流イベントを毎週行うものです。</span>'+
              '<span class="line">イベントでは、料理や言葉など、自分の国の文化を町の人に教えるそうです。</span>'+
              '<span class="line">このようなプログラムは日本にいる時<span class="ul-color">{!GRI|しか|l2-p3}</span>経験でき<span class="ul-color">{!GRI|ない|l2-p3}</span>し、将来就職する時にもきっと役に立つだろうと思ったので、申し込む<span class="ul-color">{!GRI|ことにしました|l2-p4}</span>。</span><br><br>'+
              
              '<span class="line">それで、お忙しいところ急なお願いなのですが、推薦状が必要なので書いていただけないでしょうか。</span>'+
              '<span class="line">申し込みの<ruby>締<rt>し</rt></ruby>め<ruby>切<rt>き</rt></ruby>りは1か月後なので、2月<ruby>上旬<rt>じょうじゅん</rt></ruby>までに送っていただければ<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>です。</span>'+
              '<span class="line">突然のメールで申し訳ありませんが、お返事をいただけるとうれしいです。</span>'+
              '<span class="line">よろしくお願いいたします。</span><br><br>'+
        
              '<span class="line"><ruby>風邪<rt>かぜ</rt></ruby>をひきやすい季節ですので、どうぞお体<span class="ul-color inline">{!GRI|にお気を<ruby>付<rt>つ</rt></ruby>け|l2-p5}</span>ください。</span><br><br>'+
        
              '<span class="line">ジョージ・テイラー</span><br><br>'+
        
              'georgetaylor@abcde.com'+
            '</td>'+
          '</tr>'+
        '</table>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>{!PLAY|yomimono_l2-1|26} このメールはどの季節に書かれたものですか。はじめのあいさつの<ruby>段落<rt>だんらく</rt></ruby><small>(行5～9)</small>を読んで答えなさい。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{冬%(です/)|ふゆ%(です/)|冬だ|ふゆだ|answer}。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|yomimono_l2-1|30.7} 「そちら」<small>(行5)</small>とは、どこを<ruby>指<rt>さ</rt></ruby>しますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{鈴木先生がいるアメリカの町|すずきせんせいがいるアメリカのまち|' + Genki.getAlts('{鈴木}{先生}がいるアメリカの{町}', 'すずき|せんせい|まち') + 'answer}を指します。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|yomimono_l2-1|44.8} ジョージはどうしてもっと和食について知りたくなりましたか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{ホストファミリーにおせち料理の一つ一つの意味や作り方を教えてもらった|ホストファミリーにおせちりょうりのひとつひとつのいみやつくりかたをおしえてもらった|' + Genki.getAlts('ホストファミリーにお{節}{料理}の{一}つ{一}つの{意味}や{作}り{方}を{教}えてもらった', 'せち|りょうり|ひと|ひと|いみ|つく|かた|おし') + 'answer}からです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">4.</span>{!PLAY|yomimono_l2-1|105.7} ジョージはどうして<ruby>鈴木<rt>すずき</rt></ruby>先生にメールをしましたか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{推薦状を書いてほしい|すいせんじょうをかいてほしい|' + Genki.getAlts('{推薦状}を{書}いて{欲}しい', 'すいせんじょう|か|ほ') + 'answer}からです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">5.</span>{!PLAY|yomimono_l2-1|66.5} 「留学生のインターンシッププログラムがあります」<small>(行11)</small>とありますが、それはどのようなプログラムですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{市の国際交流課の仕事を手伝い|しのこくさいこうりゅうかのしごとをてつだい|' + Genki.getAlts('{市}の{国際}{交流}{課}の{仕事}を{手伝}い', 'し|こくさい|こうりゅう|か|しごと|てつだ') + 'answer}ながら、{小・中学校やコミュニティーセンターで異文化交流イベントを毎週行う|しょう・ちゅうがっこうやコミュニティーセンターでいぶんかこうりゅうイベントをまいしゅうおこなう|' + Genki.getAlts('{小}・{中}{学校}やコミュニティーセンターで{異文化}{交流}イベントを{毎週}{行}う', 'しょう|ちゅう|がっこう|いぶんか|こうりゅう|まいしゅう|おこな') + 'answer}プログラムです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">6.</span>{!PLAY|yomimono_l2-1|94} ジョージはどうしてこのインターンシップに申し込むことにしたのですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{日本にいる時しか経験できない|にほんにいるときしかけいけんできない|' + Genki.getAlts('{日本}にいる{時}しか{経験}{出来}ない', 'にほん|とき|けいけん|でき') + 'answer}し、{将来就職する時にもきっと役に立つだろうと思った|しょうらいしゅうしょくするときにもきっとやくにたつだろうとおもった|' + Genki.getAlts('{将来}{就職}する{時}にもきっと{役}に{立}つだろうと{思}った', 'しょうらい|しゅうしょく|とき|やく|た|おも') + 'answer}からです。</div>'+
    '</div>'+
    
    '<p class="sectionDesc"><span class="sectionNumber">7.</span>「突然のメールで申し訳ありませんが」<small>(行19～20)</small>とありますが、1.だれが申し訳ないと思っていますか。<br>2.どうしてそう思っているのですか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">{!PLAY|yomimono_l2-1|123} {ジョージ}が申し訳ないと思っています。</div>'+
      '<div class="problem">{!PLAY|yomimono_l2-1|105.7} {突然、推薦状のお願いのメールをした|とつぜん、すいせんじょうのおねがいのメールをした|' + Genki.getAlts('{突然}、{推薦状}のお{願}いのメールをした', 'とつぜん|すいせんじょう|ねが') + 'answer}からです。</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('yomimono_l2-1', [
      [7.6, 12.6],
      [14, 17.2],
      [18, 21],

      [26, 29.9],
      [30.7, 36.7],
      [38, 43.4],

      [132.4, 137],
      [138.4, 140]
    ]);

    Genki.stickyAudio.init('static-audio');
