    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span><ruby>下線<rt>かせん</rt></ruby>の部分を{!GRI|<ruby>敬語<rt>けいご</rt></ruby>|l2-p001}に<ruby>直<rt>なお</rt></ruby>しなさい。</p>'+
      
      '<div class="count-problems indent-block">'+
        '<div class="columns-2 small-margin clear">'+
          '<div class="problem">先生からコンサートのチケットを<span class="ul-color">もらった</span>。</div>'+
          '<div>({いただいた})</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div class="problem">学生：先生はどんな音楽を<span class="ul-color">聞きますか</span>。</div>'+
          '<div>({お聞きになりますか|おききになりますか|answer})</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div class="problem">学生：先生、作文の宿題をメールで<span class="ul-color">送って</span>もいいですか。</div>'+
          '<div>({お送りして|おおくりして|answer})</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div class="problem">先生は、明日試験があると<span class="ul-color">言って</span>いました。</div>'+
          '<div>({仰って|おっしゃって|answer})</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div class="problem">学生：先生、心配<span class="ul-color">しないで</span>ください。</div>'+
          '<div>({なさらないで})</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div class="problem">部長にいつどこでゴルフ大会があるか<span class="ul-color">聞いた</span>。</div>'+
          '<div>({お聞きした|伺った|おききした|うかがった|answer})</div>'+
        '</div>'+
      '</div>'+
        
        
      '<p class="sectionDesc"><span class="sectionNumber">2.</span>下線の部分を{!GRI|敬語|l2-p001}に直しなさい。</p>'+
      
      '<div class="count-problems indent-block">'+
        '<div class="columns-2 clear">'+
          '<div class="problem">'+
            '<div class="inner-problem">'+
              '〈お<ruby>客<rt>きゃく</rt></ruby>さんが家に<ruby>遊<rt>あそ</rt></ruby>びに来ている〉<br><br>'+
              '　　客：これ、おみやげです。<span class="ul-color">食べて</span>ください。<br><br>'+
              'あなた：ありがとうございます。みんなで<span class="ul-color">食べます</span>。'+
            '</div>'+
          '</div>'+
        
          '<div>'+
            '<br><br>'+
            '({召し上がって|めしあがって|' + Genki.getAlts('{召}し{上}がって', 'め|あ') + 'answer})<br><br>'+
            '({いただきます|頂きます|answer})'+
          '</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div class="problem">'+
            '<div class="inner-problem">'+
              '学生：今朝、ニュースを<span class="ul-color">見ましたか</span>。<br><br>'+
              '先生：ええ、見ましたよ。台風が来るそうですね。'+
            '</div>'+
          '</div>'+
        
          '<div>'+
            '({ご覧になりましたか|ごらんになりましたか|answer})'+
          '</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div class="problem">'+
            '<div class="inner-problem">'+
              '部下：A社の<ruby>山本<rt>やまもと</rt></ruby>部長を<span class="ul-color">知っていますか</span>。<br><br>'+
              '部長：ええ。一度、<span class="ul-color">会った</span>ことがありますよ。'+
            '</div>'+
          '</div>'+
        
          '<div>'+
            '({ご存知ですか|ごぞんじですか|' + Genki.getAlts('ご{存}{知}ですか', 'ぞん|じ') + 'answer})<br><br>'+
            '({お会いした|お目にかかった|おあいした|おめにかかった|answer})'+
          '</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div class="problem">'+
            '<div class="inner-problem">'+
              '〈ウェルカムパーティーで先生が<ruby>紹介<rt>しょうかい</rt></ruby>された後〉<br><br>'+
              'スミス：あの、<ruby>中級<rt>ちゅうきゅう</rt></ruby>クラスの先生<span class="ul-color">ですか</span>。<br><br>'+
              '先生：。はい、そうですが。<br><br>'+
              'スミス：今度中級クラスに入るスミスと<span class="ul-color">言います</span>。<br><br>'+
              '　　　　イギリスから<span class="ul-color">来ました</span>。<br><br>'+
              '　　　　ロンドン大学で勉強<span class="ul-color">しています</span>。'+
            '</div>'+
          '</div>'+
        
          '<div>'+
            '<br><br>'+
            '({でいらっしゃいますか})<br><br>'+
            '<br><br>'+
            '({申します|もうします|answer})<br><br>'+
            '({参りました|まいりました|answer})<br><br>'+
            '({しております})'+
          '</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div class="problem">'+
            '<div class="inner-problem">'+
              '〈お別れパーティーで〉<br><br>'+
              'スミス：先生、お世話になりました。<br><br>'+
              '　　　　いつかロンドンに<span class="ul-color">来て</span>ください。<br><br>'+
              '　　　　私が<span class="ul-color">案内します</span>。'+
            '</div>'+
          '</div>'+
        
          '<div>'+
            '<br><br>'+
            '<br><br>'+
            '({いらっしゃって})<br><br>'+
            '({ご案内します|ご案内いたします|' + Genki.getAlts('ご{案内}{いた}します', 'あんない|') + 'answer})'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
