    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|しか～ない|l2-p3}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">私は{マンガ|漫画|まんが|answer;hint:manga}を3({冊|さつ|answer;hint:counter;width:60})しか持っていません。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '先生：プリントは全部で3枚です。みなさん、3枚ありますか。<br><br>'+
            '学生：すみません。{2枚しかありません|2まいしかありません|' + Genki.getAlts('{二}{枚}しかありません', 'に|まい') + 'answer;hint:only have 2}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem"><ruby>昨日<rt>きのう</rt></ruby>{30分しか勉強しなかった|30ぷんしかべんきょうしなかった|' + Genki.getAlts('30{分}しか{勉強}しなかった', 'ぷん|べんきょう') + Genki.getAlts('{三十分}しか{勉強}しなかった', 'さんじゅっぷん|べんきょう') + 'answer;hint:studied for only 30 minutes}ので、今日の試験はあまりできなかった。</div>'+
        
        '<div class="problem">「お子様メニュー」は{子どもしか注文できない|こどもしかちゅうもんできない|' + Genki.getAlts('{子}{供}しか{注文}{出来}{ない}', 'こ|ども|ちゅうもん|でき|ません') + 'answer;hint:only kids can order}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　先生：ゴミスさん、もう日本でいろいろなところに行きましたか。<br><br>'+
            'ゴミス：いいえ、まだ東京({に|particle})しか{行ったことがない|いったことがない|answer;hint:have gone to}ので、今度の休みはもっといろいろなところに行きたいです。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：あれ、この店<ruby>閉<rt>し</rt></ruby>まってる。朝は開いていたのに……。<br><br>'+
            'B：夜はやっていなくて、3時{までしか開いていない|までしかあいていない|answer;hint:only open until}みたいだよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：家族に日本のものを送りたいんだけど、何がいいと思う？<br><br>'+
            'B：このお菓子はどう？日本{でしか買えない|でしかかえない|answer;hint:can only be bought in;width:160}からいいと思うよ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
