    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba">ほんのお<ruby>礼<rt>れい</rt></ruby>の<ruby>気持<rt>きも</rt></ruby>ちです　This is only a token of my gratitude.</span>'+
      '<span class="kotoba"><ruby>遠慮<rt>えんりょ</rt></ruby>なく　without hesitation</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|kaiwa_l2-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l2-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l2-2" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">フォーマルな会話</strong>'+
        '<div class="title reduced center">インターンシップの後で</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">日本語の授業の後、ワン・メイリン（メ：）が<ruby>中村<rt>なかむら</rt></ruby>先生（中：）に話しかける。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">'+
            '<ruby>中村<rt>なかむら</rt></ruby>先生、<ruby>先日<rt>せんじつ</rt></ruby>は<ruby>推薦状<rt>すいせんじょう</rt></ruby>を書いてくださって、ありがとうございました。<br>'+
            '先週の金曜日にインターンシップがすべて終わりました。'+
          '</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text"><ruby>無事<rt>ぶじ</rt></ruby>に終わってよかったですね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">はい。あの、これ、ほんのお礼の気持ちです。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">そんな必要なかったのに……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">いえいえ。少しですが、<ruby>召<rt>め</rt></ruby>し<ruby>上<rt>あ</rt></ruby>がって下さい。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">'+
            'そうですか。すみません。じゃあ、<ruby>遠慮<rt>えんりょ</rt></ruby>なく。<br>'+
            'ところで、インターンシップはどうでしたか。'+
          '</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">町の人と交流することができたし、自分の国について知ってもらえたし、とてもおもしろかったです。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">どんなことをしたんですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">国の料理とか、言葉とかを教えたんです。大変でしたが、いい経験になりました。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">それはよかったですね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">はい。こんなすばらしい経験ができたのは、先生のおかげです。本当にありがとうございました。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l2-2|15} メイリンはだれに何をしてもらいましたか。<br>'+
          '{中村先生に推薦状を書いてもらいました|なかむらせんせいにすいせんじょうをかいてもらいました|' + Genki.getAlts('{中村}{先生}に{推薦状}を{書}いてもらいました', 'なかむら|せんせい|すいせんじょう|か') + 'answer;width:350}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          'インターンシップはどうでしたか。メイリンは、どうしてそう思いましたか。理由を2つ答えなさい。<br>'+
          '{!PLAY|kaiwa_l2-2|49.5} {とても面白かったです|とてもおもしろかったです|answer;width:350}。<br><br>'+
          '{!PLAY|kaiwa_l2-2|60} {国の料理とか、言葉とかを教えたんです|くにのりょうりとか、ことばとかをおしえたんです|' + Genki.getAlts('{国}の{料理}とか、{言葉}とかを{教}えたんです', 'くに|りょうり|ことば|おし') + 'answer;width:350}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l2-2|49.5} メイリンはインターンシップで何をしましたか。<br>'+
          '{町の人と交流することができたし、自分の国について知ってもらえたし|まちのひととこうりゅうすることができたし、じぶんのくにについてしってもらえたし|' + Genki.getAlts('{町}の{人}と{交流}することが{でき}たし、{自分}の{国}について{知}ってもらえたし', 'まち|ひと|こうりゅう|出来|じぶん|くに|し') + 'answer}。'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>メイリンはお礼を言う時、何と言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l2-2|15} <strong class="main-color">会話のはじめ</strong><br>'+
          '<div class="example">'+
            '<ruby>先日<rt>せんじつ</rt></ruby>は{推薦状を書いてくださって|すいせんじょうをかいてくださって|' + Genki.getAlts('{推薦状}を{書}いてくださって', 'すいせんじょう|か') + 'answer}、<br>'+
            'ありがとうございました。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l2-2|70.4} <strong class="main-color">会話の最後</strong><br>'+
          '<div class="example">'+
            'こんなすばらしい{経験ができた|けいけんができた|' + Genki.getAlts('{経験}が{出来}た', 'けいけん|でき') + 'answer}のは、<br>'+
            '{先生のおかげです|せんせいのおかげです|' + Genki.getAlts('{先生}のお{陰}です', 'せんせい|かげ') + 'answer}。{本当に|ほんとうに|answer}ありがとうございました。'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<div class="box-color bg padded min-width">'+
      '<h4 class="sub-title-color" style="margin:5px 0;"><i class="fa">&#xf0eb;</i> <span class="en">Noteworthy Points</span><span class="ja">ここにも注目</span></h4>'+
      '<ul>'+
        '<li>{!GRI|AとかBとか|l2-p0003}</li>'+
      '</ul>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('kaiwa_l2-2', [
