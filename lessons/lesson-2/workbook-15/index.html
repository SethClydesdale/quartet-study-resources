    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">3.</span>文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      
      '<div class="count-problems indent-block">'+
        '<div class="problem">最近{あまり運動していない|あまりうんどうしていない|' + Genki.getAlts('あまり{運動}して{い}ない', 'うんどう|') + 'answer;hint:haven\'t been exercising much;width:220}ので、だんだん{太ってきた|ふとってきた|太ってきました|ふとってきました|answer;hint:started putting on weight;width:190}。</div>'+
        
        '<div class="problem">前はできませんでしたが、最近{日本の新聞が読めるようになってきました|にほんのしんぶんがよめるようになってきました|' + Genki.getAlts('{日本}の{新聞}が{読}めるようになってき{まし}た', 'にほん|しんぶん|よ|') + 'answer;hint:I\'m starting to be able to read Japanese newspapers;width:380}。</div>'+
        
        '<div class="problem">世界の<ruby>経済<rt>けいざい</rt></ruby>は、これから少しずつ{よくなっていく|良くなっていく|answer;hint:going to get better;width:140}でしょう。</div>'+
        
        '<div class="problem">{外国に行けば行くほど|がいこくにいけばいくほど|' + Genki.getAlts('{外国}に{行}けば{行}く{ほど}', 'がいこく|い|い|程') + 'answer;hint:The more you go abroad the more...;width:260}、自分の国とは違う文化について理解できるようになる。</div>'+
        
        '<div class="problem">レストランの料理は{種類が多ければ多いほど、いい|しゅるいがおおければおおいほど、いい|' + Genki.getAlts('{種類}が{多}ければ{多}い{ほど}、いい', 'しゅるい|おお|おお|程') + 'answer;hint:the more variety, the better}です。</div>'+
        
        '<div class="problem">{ホストファミリーが英語を使わないようにしてくれたおかげで|ホストファミリーがえいごをつかわないようにしてくれたおかげで|' + Genki.getAlts('ホストファミリーが{英語}を{使}わないようにしてくれたお{陰}で', 'えいご|つか|かげ') + 'answer;hint:Thanks to my host family making an effort to not use English for me;width:480}、日本語が上手になりました。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：お金貸してくれない？<br><br>'+
            'B：ごめん、今{100円しか持っていない|100えんしかもっていない|' + Genki.getAlts('100{円}しか{持}って{い}ない', 'えん|も|') + Genki.getAlts('{百}{円}しか{持}って{い}ない', 'ひゃく|えん|も|') + 'answer;hint:I only have 100 yen}から、貸せないんだ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">{日本でしか見られないもの|にほんでしかみられないもの|' + Genki.getAlts('{日本}でしか{見}られない{物}', 'にほん|み|もの') + 'answer;hint:Things that you can only seen in Japan;width:280}は、<ruby>温泉<rt>おんせん</rt></ruby>に入っている<ruby>猿<rt>さる</rt></ruby>です。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '〈て-formをフォーマルな<ruby>表現<rt>ひょうげん</rt></ruby>にしなさい〉<br><br>'+
            '図書館に行って、少し勉強して、本を3<ruby>冊<rt>さつ</rt></ruby>借りて、家に帰った。<br><br>'+
            '<i class="fa">&#xf061;</i> 図書館に{行き|行き|answer}、少し{勉強し|べんきょうし|answer}、本を3冊{借り|かり|answer}、家に帰った。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
