    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～てくる|l2-p2}」か「{!GRI|～ていく|l2-p2}」を使って、文を<ruby>完成<rt>かんせい</rt></ruby>させなさい。1.と2.は絵を見て答えなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="columns-2 clear">'+
          '<div>'+
            '<div class="problem">'+
              '<div class="inner-problem">'+
                '今、5月です。最近{暑くなってき|あつくなってき|answer;hint:starting to get hot;spoiler;width:140}ました。<br><br>'+
                'これからもっと{暑くなっていく|あつくなっていく|answer;hint:going to get (even) hotter;spoiler;width:200}でしょう。<br><br>'+
                '海に行くのが楽しみです。'+
              '</div>'+
            '</div>'+
          '</div>'+
        
          '<div>{!IMG|l2-workbook-7-1.png}</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+
          '<div>'+
            '<div class="problem">'+
              '<div class="inner-problem">'+
                'ストレスで最近あまり食べられないので、<br><br>このごろ{やせてきました|痩せてきました|' + Genki.getAlts('{瘦}せてき{ました}', 'や|た') + Genki.getAlts('{痩}せてき{ました}', 'や|た') + 'answer;hint:began to lose weight;spoiler;width:160}。'+
              '</div>'+
            '</div>'+
          '</div>'+
        
          '<div>{!IMG|l2-workbook-7-2.png}</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'テクノロジーのおかげで、これから私たちの生活はもっと{便利になっていく|べんりになっていく|answer;hint:going to get (more) convenient;spoiler;width:230}でしょう。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '日本では結婚しない人が<ruby>増<rt>ふ</rt></ruby>えているので、将来子どもの<ruby>数<rt>かず</rt></ruby>が{減っていく|へっていく|answer;hint:going to decrease;spoiler;width:140}と思います。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '前は敬語が話せませんでしたが、アルバイトを始めてから敬語が{話せるようになってきました|はなせるようになってきました|answer;hint:have become able to speak;spoiler}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
