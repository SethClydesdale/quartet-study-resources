    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd">'+
      '<span class="sectionNumber3rd fa">&#xf054;</span>留学生のサラと日本人学生の<ruby>美希<rt>みき</rt></ruby>が「お花見旅行」について話しています。<br>'+
      '会話を聞いて、2人がお花見旅行に行く町に〇/Oをつけなさい。'+
    '</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba"><ruby>満開<rt>まんかい</rt></ruby>　full bloom</span>'+
    '</div>'+

    '{!AUDIO|chokai_l2-1}'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l2-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l2-1" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">お花見旅行の<ruby>相談<rt>そうだん</rt></ruby></div>'+
        '<div class="line">'+
          '<div class="name"><ruby>美希<rt>みき</rt></ruby></div>'+
          '<div class="text">サラ、おはよう。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サラ</div>'+
          '<div class="text">おはよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">美</div>'+
          '<div class="text">このごろ少し<ruby>暖<rt>あたた</rt></ruby>かくなっ<span class="ul-color">{!GRI|てきた|l2-p2}</span>ね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">うん、ずいぶん暮らしくなっ<span class="ul-color">{!GRI|てきた|l2-p2}</span>ね。春に日本にいるんだから、どこかに<ruby>桜<rt>さくら</rt></ruby>を見に行きたいな。ねえ、春休みに<ruby>一緒<rt>いっしょ</rt></ruby>にお花見旅行に行かない？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">美</div>'+
          '<div class="text">いいね。楽しそう！あ、そうだ。これ知ってる？「桜の<ruby>開花<rt>かいか</rt></ruby><ruby>予想<rt>よそう</rt></ruby>」。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">開花予想？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">美</div>'+
          '<div class="text">桜がいつ咲き始めるか、2月ぐらいから予想が発表されるんだよ。ネットでも見られるの。……ほら、これ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">へえ。これは……どういうふうに見るの？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">美</div>'+
          '<div class="text">例えば、3月25日のラインだったら、このラインより南は25日までに咲くんだよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">へえ。北に<span class="ul-color">{!GRI|行けば行くほど|l2-p7}</span>咲くのが遅くなるんだね。<ruby>大阪<rt>おおさか</rt></ruby>は3月25日。大阪でお花見をするなら3月25日ごろがいいってこと？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">美</div>'+
          '<div class="text">ううん、これは「開花予想」だから、3月25日に咲き始めるっていうこと。<ruby>満開<rt>まんかい</rt></ruby>になるまで1週間ぐらいかかるから、一番きれいなのは……4月1日ごろかな？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">なるほど。じゃあ、これを見て、いつ、どこに行くか決めればいいんだね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">美</div>'+
          '<div class="text">うん。サラはどこか行きたいところある？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text"><ruby>仙台<rt>せんだい</rt></ruby>か、<ruby>福岡<rt>ふくおか</rt></ruby>に行ってみたいな。行ったことがないから。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">美</div>'+
          '<div class="text">日にちはいつごろがいい？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">春休みが4月2日まででしょう？新学期の準備があるし、3月28日から30日はどう？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">美</div>'+
          '<div class="text">じゃあ、満開の桜が見たかったら、ここ<span class="ul-color">{!GRI|しかない|l2-p3}</span>ね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">サ</div>'+
          '<div class="text">そうだね！ここで決まりだね！</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<ol class="alpha">'+
      '<li class="problem">{!PLAY|chokai_l2-1|116.2} ({||width:21}) <ruby>仙台<rt>せんだい</rt></ruby></li>'+
      '<li class="problem">{!PLAY|chokai_l2-1|116.2} ({||width:21}) <ruby>名古屋<rt>なごや</rt></ruby></li>'+
      '<li class="problem">{!PLAY|chokai_l2-1|116.2} ({||width:21}) <ruby>大阪<rt>おおさか</rt></ruby></li>'+
      '<li class="problem">{!PLAY|chokai_l2-1|116.2} ({〇|O|answer}) <ruby>福岡<rt>ふくおか</rt></ruby></li>'+
    '</ol>'+
        
    '<div class="center">{!IMG|chokai-l2-1.png}</div>'
    });
