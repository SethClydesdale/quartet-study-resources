    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba"><ruby>大使館<rt>たいしかん</rt></ruby>　embassy</span>'+
      '<span class="kotoba"><ruby>用事<rt>ようじ</rt></ruby>　business; things to do</span>'+
      '<span class="kotoba">しかたがないですね　It cannot be helped.</span><br>'+
      '<span class="kotoba">よろしくお<ruby>願<rt>ねが</rt></ruby>いします　Thank you for your help in advance.</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|kaiwa_l2-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l2-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l2-1" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">フォーマルな会話</strong>'+
        '<div class="title reduced center"><ruby>推薦状<rt>すいせんじょう</rt></ruby>のお願い</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">授業の後、ワン・メイリン（メ：）が<ruby>中村<rt>なかむら</rt></ruby>先生（中：）に話しかける。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text"><ruby>中村<rt>なかむら</rt></ruby>先生、今、少しよろしいでしょうか。お願いがあるんですが……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">はい、何ですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">実は、<ruby>南山市<rt>みなみやまし</rt></ruby>の国際交流課のインターンシップに申し込みたいんですが、<ruby>推薦状<rt>すいせんじょう</rt></ruby>を書いていただけないでしょうか。ぜひやってみたいんです。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">インターンシップですか。おもしろそうですね。いいですよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">ありがとうございます。お忙しいところ、申し訳ありません。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">それで、<ruby>締<rt>し</rt></ruby>め<ruby>切<rt>き</rt></ruby>りはいつですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">2月14日です。後で推薦状のフォームをメールでお送りします。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">わかりました。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">あの、もう一つお願いがあるんですが……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">何ですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">3月10日に<ruby>大使館<rt>たいしかん</rt></ruby>に行かなければいけない<ruby>用事<rt>ようじ</rt></ruby>があるので、その日の授業を休ませていただけませんか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">中</div>'+
          '<div class="text">そうですか。しかたがないですね。わかりました。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">メ</div>'+
          '<div class="text">ありがとうございます。よろしくお願いいたします。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l2-1|16} メイリンはだれにお願いをしましたか。<br>'+
          '{中村先生%(です/)|なかむらせんせい%(です/)|' + Genki.getAlts('{中村}{先生}{です}', 'なかむら|せんせい|だ') + 'answer;width:350}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          'メイリンはどんなお願いをしましたか。何をしてもらいたいか／したいかを2つ答えなさい。<br>'+
          '{!PLAY|kaiwa_l2-1|16} {推薦状を書いてもらいたいです|すいせんじょうをかいてもらいたいです|' + Genki.getAlts('{推薦状}{を}{書}いてもらいたい{です}', 'すいせんじょう|が|か|') + 'answer;width:350}。<br><br>'+
          '{!PLAY|kaiwa_l2-1|57.5} {授業を休みたいです|じゅぎょうをやすみたいです|' + Genki.getAlts('{授業}{を}{休}みたい{です}', 'じゅぎょう|が|やす|') + 'answer;width:350}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l2-1|63} メイリンはいつ<ruby>大使館<rt>たいしかん</rt></ruby><small>(embassy)</small>に行きますか。<br>'+
          '{3月10日%(です/)|3がつ10にち%(です/)|' + Genki.getAlts('3{月}10{日}{です}', 'がつ|にち|だ') + 'answer;width:350}。'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>メイリンは、2つお願いしました。それぞれ、何と言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l2-1|24.5} <strong class="main-color">お願い1</strong><br>'+
          '<div class="example">'+
            '<ruby>実<rt>じつ</rt></ruby>は、<ruby>南山市<rt>みなみやまし</rt></ruby>の<ruby>国際交流課<rt>こくさいこうりゅうか</rt></ruby>のインターンシップに{申し込みたい|もうしこみたい|' + Genki.getAlts('{申}し{込}みたい', 'もう|こ') + 'answer}んですが、<br>'+
            '{推薦状を書いていただけ|すいせんじょうをかいていただけ|' + Genki.getAlts('{推薦状}を{書}いていただけ', 'すいせんじょう|か') + 'answer}ないでしょうか。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l2-1|63} <strong class="main-color">お願い2</strong><br>'+
          '<div class="example">'+
            '<ruby>大使館<rt>たいしかん</rt></ruby>に行かなければいけない<ruby>用事<rt>ようじ</rt></ruby>があるので、<br>'+
            'その日の{授業を休ませていただけ|じゅぎょうをやすませていただけ|' + Genki.getAlts('{授業}を{休}ませていただけ', 'じゅぎょう|やす') + 'answer}ませんか。'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<div class="box-color bg padded min-width">'+
      '<h4 class="sub-title-color" style="margin:5px 0;"><i class="fa">&#xf0eb;</i> <span class="en">Noteworthy Points</span><span class="ja">ここにも注目</span></h4>'+
      '<ul>'+
        '<li>{!GRI|～ていただけないでしょうか|l2-p0001}</li>'+
        '<li>{!GRI|お願いする時によく使う表現|l2-p0002}</li>'+
      '</ul>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('kaiwa_l2-1', [
      [10, 14.5],
      [16, 21.5],
      [21.8, 23.5],
      [24.5, 34.5],
      [35.5, 40.2],
      [40.6, 45.5],
      [45.9, 48.8],
      [49.5, 55.5],
      [56, 56.9],
      [57.5, 61],
      [61.5, 62.8],
      [63, 70.5],
      [71, 75.9],
      [76.5, 80]
    ]);
      
    // keeps the audio on-screen when the user scrolls out of view
    Genki.stickyAudio.init('static-audio');  
    </script>
