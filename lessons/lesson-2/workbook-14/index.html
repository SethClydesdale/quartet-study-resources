    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span><span class="sub-section inline nospacing">　　</span>の言葉をを使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。必要なら<ruby>形<rt>かたち</rt></ruby>を変えなさい。同じ言葉は一度しか使えません。</p>'+
      
      '<div class="count-problems indent-block">'+
        '<div class="sub-section inline">'+
          '　{!GRI|～ようだ|l2-p8}　　{!GRI|～ほど|l2-p7}　　{!GRI|気が付く|l2-p5}　　{!GRI|気を付ける|l2-p5}　　{!GRI|気に入る|l2-p5}　'+
        '</div><br><br>'+
        
        '<div class="problem">いろいろな国を留学生がいるのが{気に入って|きにいって|' + Genki.getAlts('{気}に{入}って', 'き|') + 'answer}、この大学に入った。</div>'+
        
        '<div class="problem"><ruby>絵理<rt>えり</rt></ruby>さんは歌が上手で、まるで歌手{のようだ|のようです|answer}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　先生：宿題の作文を返します。Ａさん、<ruby>助詞<rt>じょし</rt></ruby>の間違いがいくつかありましたよ。<br><br>'+
            '学生Ａ：すみません。書いている時は、なかなか間違いに{気が付かない|きがつかない|' + Genki.getAlts('{気}が{付}かない', 'き|つ') + 'answer}んです。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">私が<ruby>目上<rt>めうえ</rt></ruby>の人と話す時に{気を付けて|きをつけて|' + Genki.getAlts('{気}を{付}けて', 'き|つ') + 'answer}いることは、<ruby>丁寧<rt>ていねい</rt></ruby>に話すことです。</div>'+
      '</div>'+
        
      '<p class="sectionDesc"><span class="sectionNumber">2.</span><span class="sub-section inline nospacing">　　</span>から一番いい言葉を<ruby>選<rt>えら</rt></ruby>んで、<span class="ul-color inline">正しい<ruby>形<rt>かたち</rt></ruby>にして</span>書きなさい。</p>'+
      
      '<div class="count-problems indent-block">'+
        '<div class="sub-section inline">'+
          '　{!GRI|～ことにする|l2-p4}　　{!GRI|～ことになる|l2-p9}　　{!GRI|～ようにする|l1-p8}　　{!GRI|～ようになる|l1-p7}　'+
        '</div><br><br>'+
        
        '<div class="problem">私は日本語を勉強するために留学する{ことにした|ことにしました|answer}。</div>'+
        
        '<div class="problem">前は興味がなかったが、最近、よく日本の音楽を聞く{ようになった|ようになりました|answer}。</div>'+
        
        '<div class="problem">新しい文法を<ruby>練習<rt>れんしゅう</rt></ruby>するために、これからは作文を使う{ようにし}たい。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：うれしそうですね。何かいいことがあったんですか。<br><br>'+
            'B：実は、さっき<ruby>面接<rt>めんせつ</rt></ruby>の結果が来て、<ruby>奨学金<rt>しょうがくきん</rt></ruby>がもらえる{ことになった}んです。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '日本人：日本語のクラスでは、英語を話してはいけないの？<br><br>'+
            'あなた：うん、クラスでは日本語で話す{ことになって}いるよ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
