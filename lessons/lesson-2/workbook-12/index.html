    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ことになる|l2-p9}」か「{!GRI|～ことになっている|l2-p9}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">アメリカでは、車は道の<ruby>右側<rt>みぎがわ</rt></ruby><small>(right side)</small>を走る{ことになっている|ことになっています|ことになってる|ことになってます|answer;hint:it\'s expected that}。</div>'+
        
        '<div class="problem">日本では家に入る時、{靴を脱ぐことになっている|くつをぬぐことになっている|' + Genki.getAlts('{靴}を{脱}ぐことになって{い}{る}', 'くつ|ぬ||ます') + 'answer;hint:you\'re expected to take your shoes off;width:280}。</div>'+
        
        '<div class="problem">教室では、{食べ物を食べてはいけないことになっています|たべものをたべてはいけないことになっています|' + Genki.getAlts('{食}べ{物}を{食}べてはいけないことになって{い}{ます}', 'た|もの|た||る') + 'answer;hint:it\'s a rule that you must not eat food}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　　　　<ruby>客<rt>きゃく</rt></ruby>：すみません。写真を<ruby>撮<rt>と</rt></ruby>ってもいいですか。<br><br>'+
            '美術館の人：申し訳ございません。{写真を撮ってはいけないことになっています|しゃしんをとってはいけないことになっています|' + Genki.getAlts('{写真}を{撮}ってはいけないことになっています', 'しゃしん|と') + 'answer;hint:It is a rule that you must not take photographs;width:340}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '会社の人：金曜日の4時に<ruby>面接<rt>めんせつ</rt></ruby>に来られますか。<br><br>'+
            '　　学生：すみません。その時間は大学の先生に{会うことになっている|あうことになっている|answer;hint:supposed to meet}ので、別の日にしていただけませんか。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '学生：先生のおかげで、{JETプログラムで日本に行けることになりました|JETプログラムでにほんにいけることになりました|' + Genki.getAlts('JETプログラムで{日本}に{行}けることになりました', 'にほん|い') + 'answer;hint:it has been decided that I can go to Japan under the JET program;width:460}。<br><br>'+
            '先生：それはよかったですね。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
