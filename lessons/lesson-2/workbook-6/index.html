    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l2-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l2-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l2-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section vertical-text-box" style="width:auto;">'+
        '<div class="title reduced center">先生への手紙</div>'+
        
        '<div class="line">　ジョージが<ruby>鈴木<rt>すずき</rt></ruby>先生にお礼の手紙を書く。</div>'+
        
        '<p class="text-passage vertical-text paragraph">'+
          '<span class="line">拝啓</span><br><br>'+
        
          '　<span class="line">日本は桜が<span class="ul-color">{!GRI|終わり|l2-p1}</span>、<ruby>緑<rt>みどり</rt></ruby>が美しい季節になりました。</span>'+
          '<span class="line">そちらは、そろそろ暑くな<span class="ul-color">{!GRI|てきた|l2-p2}</span>頃だと思いますが、いかがお過ごしですか。</span>'+
          '<span class="line">もうすぐ夏休みですね。</span>'+
          '<span class="line">今年の夏もサマーコースを教えられるのでしょうか。</span><br>'+
        
          '　<span class="line">さて、先日、無事に二カ月のインターンシッププログラムがすべて終わりました。</span>'+
          '<span class="line">その節は、お忙しいところ<ruby>推薦状<rt>すいせんじょう</rt></ruby>を書いてくださって、ありがとうございました。</span>'+
          '<span class="line">短い期間でしたが、<span class="ul-color">{!GRI|おかげさまで|l2-p6}</span>、教科書では学べないすばらしい経験ができました。</span>'+
          '<span class="line">英語を教えるのは<span class="ul-color">{!GRI|難しく|l2-p1}</span>、準備が大変でしたが、<span class="ul-color">{!GRI|やればやるほど|l2-p7}</span>楽しめるようになりました。</span>'+
          '<span class="line">また、異なる年代の人と知り合うことが<span class="ul-color">{!GRI|でき|l2-p1}</span>、日本についての理解が深まりました。</span><br><br>'+
        
          '　<span class="line">それに、日本の文化について新しい発見もできました。</span>'+
          '<span class="line">例えば、国際交流課のイベントで公園にお花見に行った時のことです。</span>'+
          '<span class="line">お花見は桜を見るだけだと思っていましたが、そうではないこと<span class="ul-color">{!GRI|に気がつきました|l2-p5}</span>。</span>'+
          '<span class="line">桜の木の下に多くの人が集まって、お<ruby>弁当<rt>べんとう</rt></ruby>を食べたり、お酒を飲んだりしていて、そこは<span class="ul-color">{!GRI|まるで|l2-p8}</span>居酒屋<span class="ul-color">{!GRI|のようでした|l2-p8}</span>。</span>'+
          '<span class="line">アメリカでは決して見られないものなので、とてもおもしろかったです。</span>'+
        '</p>'+
        '<hr class="dashed">'+
        '<p class="text-passage vertical-text paragraph">'+
          '　<span class="line">このインターンシップは終わってしまいましたが、実は来月からボランティアで、別の国際交流活動を始める<span class="ul-color">{!GRI|ことになりました|l2-p9}</span>。</span>'+
          '<span class="line">今回のプログラムで友達になった人に誘われて、週に一度、小学生にアメリカの文化や習慣を教えます。</span>'+
          '<span class="line">このような機会ができたのも先生の<span class="ul-color">{!GRI|おかげです|l2-p6}</span>。</span>'+
          '<span class="line">本当にありがとうございました。</span><br>'+
        
          '　<span class="line">つまらないものですが、こちらの大学のペンを<ruby>一緒<rt>いっしょ</rt></ruby>にお送りします。</span>'+
          '<span class="line"><span class="ul-color">{!GRI|気に入って|l2-p5}</span>いただけたらうれしいです。</span><br><br>'+
        
          '　<span class="line">では、夏休みにそちらに帰った時に先生にまたお会いして、いろいろなお話ができるのを楽しみにしています。</span><br><br>'+
        
          '　<span class="line">お忙しいと思いますが、どうぞお体を大切になさってください。</span>'+
          '<span class="line"><ruby>佐藤<rt>さとう</rt></ruby>先生にもよろしくお伝えください。</span><br><br>'+
        
          '<span class="line" style="display:block;text-align:right;">敬具</span><br>'+
        
          '　　<span class="line">五月二十五日</span><br><br>'+
        
          '<span class="line" style="display:block;text-align:right;">ジョージ・テイラー</span><br>'+
        
          '<span class="line">鈴木<ruby>玲子<rt>れいこ</rt></ruby>先生</span>'+
        '</p>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    
    '<p class="sectionDesc"><span class="sectionNumber">1.</span> インターンシップは{!PLAY|yomimono_l2-2|37.7}何月から{!PLAY|yomimono_l2-2|178.15}何月まででしたか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">【{3月中旬～5月中旬|!I1月下旬～3月下旬／3月中旬～5月中旬／4月上旬～6月上旬|spacer:alpha}】</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|yomimono_l2-2|52.7} 「すばらしい経験」<small>(行7)</small>を<ruby>修飾<rt>しゅうしょく</rt></ruby>するのはどこからどこまでですか。次の文の言葉をクリックして<ruby>下線<rt>かせん</rt></ruby>を<ruby>引<rt>ひ</rt></ruby>きなさい。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">'+
        '<span class="underline-field">'+
          '<i class="underline-field-answer" style="display:none">{1}</i>'+
          '<span onclick="Genki.underline(this, 0);">おかげさまで、</span>'+
          '<span onclick="Genki.underline(this, 1);" data-correct>教科書では</span>'+
          '<span onclick="Genki.underline(this, 0);" data-correct>学べない</span>'+
        '</span>'+
        '<span class="box-color bg inline">すばらしい経験</span>ができました。'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|yomimono_l2-2|79.5} 「日本の文化について新しい発見もできました」<small>(行10)</small>とありますが、ジョージはどんなことを発見しましたか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{お花見は桜を見るだけではない|おはなみはさくらをみるだけではない|' + Genki.getAlts('お{花見}は{桜}を{見}るだけではない', 'はなみ|さくら|み') + 'answer}ということを発見しました。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">4.</span>{!PLAY|yomimono_l2-2|100} 「そこ」<small>(行12)</small>はどこを<ruby>指<rt>さ</rt></ruby>しますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{桜の木の下|さくらのきのした|' + Genki.getAlts('{桜}の{木}の{下}', 'さくら|き|した') + 'answer}を指します。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">5.</span>{!PLAY|yomimono_l2-2|129.5} どうしてジョージは別の国際交流活動を始めることになったのですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{インターンシッププログラムで友達になった人に誘われた|インターンシッププログラムでともだちになったひとにさそわれた|' + Genki.getAlts('インターンシッププログラムで{友達}になった{人}に{誘}われた', 'ともだち|ひと|さそ') + 'answer}からです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">6.</span>{!PLAY|yomimono_l2-2|147.2} 「気に入っていただけたらうれしいです」<small>(行17-18)</small>とありますが、1.だれが何を気に入るのですか。<br>2.「うれしい」の主語はだれですか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">{鈴木先生|すずきせんせい|' + Genki.getAlts('{鈴木}{先生}', 'すずき|せんせい') + 'answer}が{%(ジョージが送った/)日本の大学のペン|%(ジョージがおくった/)にほんのだいがくのペン|' + Genki.getAlts('ジョージが{送}った{日本}の{大学}のペン', 'おく|にほん|だいがく') + Genki.getAlts('{日本}の{大学}のペン', 'にほん|だいがく') + 'answer}を気に入ります。</div>'+
      '<div class="problem">【{ジョージ|!I鈴木先生／ジョージ|spacer:alpha}】</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">7.</span>{!PLAY|yomimono_l2-2|156.8} 「楽しみにしています」<small>(行19-20)</small>とありますが、だれが何を楽しみにしていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{ジョージ}が{鈴木先生に会っていろいろな話ができるの|すずきせんせいにあっていろいろなはなしができるの|' + Genki.getAlts('{鈴木}{先生}に{会}って{色々}な{話}が{出来}るの', 'すずき|せんせい|あ|いろいろ|はなし|でき') + 'answer}を楽しみにしています。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">8.</span>{!PLAY|yomimono_l2-2|172.3} 「<ruby>佐藤<rt>さとう</rt></ruby>先生にもよろしくお伝えください」<small>(行21)</small>とありますが、1.だれが、2.だれに、「よろしく」と伝えますか。3.この「よろしく」はだれからのあいさつですか。</p>'+
    '<div class="indent-block count-problems">'+
      '<span class="problem">{鈴木先生|すずきせんせい|' + Genki.getAlts('{鈴木}{先生}', 'すずき|せんせい') + 'answer}</span>が<span class="problem">{佐藤先生|さとうせんせい|' + Genki.getAlts('{佐藤}{先生}', 'さとう|せんせい') + 'answer}</span>に「よろしく」と伝えます。<br><br>'+
      '<div class="problem">{ジョージ}からのあいさつです。</div>'+
    '</div>'
    });
