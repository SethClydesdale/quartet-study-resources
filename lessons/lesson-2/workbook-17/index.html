    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!GRI|<ruby>敬語<rt>けいご</rt></ruby>|l2-p001}を使うところに<ruby>適当<rt>てきとう</rt></ruby>な<ruby>表現<rt>ひょうげん</rt></ruby>に<ruby>直<rt>なお</rt></ruby>しなさい。</p>'+
      
      '<div class="count-problems indent-block">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '学生：先生、冬休みに何を{なさいますか|しますか}。<br><br>'+
            '先生：両親に会いに行くつもりです。スミスさんは？<br><br>'+
            '学生：私は<ruby>京都<rt>きょうと</rt></ruby>に行くつもりです。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　<ruby>客<rt>きゃく</rt></ruby>：すみません。<ruby>昨日<rt>きのう</rt></ruby>買ったシャツのボタンが一つなかったんですが……。<br><br>'+
            '店員：<ruby>申<rt>もう</rt></ruby>し<ruby>訳<rt>わけ</rt></ruby>{ございません|ありません}。そのシャツを{拝見しても|はいけんしても|answer;hint:見ても}{よろしい|宜しい|answer;hint:いい}ですか。<br><br>'+
            '　　　あ、{こちら|ここ}のボタン{でございますね|ですね}。大変申し訳{ございません|ありません}。<br><br>'+
            '　客：あの、新しいのと<ruby>交換<rt>こうかん</rt></ruby>してもらえますか。<br><br>'+
            '店員：はい、{こちら|ここ}で{少々|しょうしょう|answer;hint:少し}{お待ちください|おまちください|answer;hint:待ってください}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '店員：{お待たせしました|おまたせしました|answer;hint:待たせました}。次の{方|かた|answer;hint:人}、{こちら|こっち}のレジへどうぞ。<br><br>'+
            '〈<ruby>客<rt>きゃく</rt></ruby>がレジの前に来る〉<br><br>'+
            '店員：いらっしゃいませ。ポイントカードは{お持ちですか|持っていらっしゃいますか|おもちですか|もっていらっしゃいますか|answer;hint:持っていますか}。<br><br>'+
            '　客：はい。<br><br>'+
            '店員：ありがとうございます。カードを{お返しします|お返しいたします|おかえしします|おかえしいたします|answer;hint:返します}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '〈同じ会社の人たちの会話〉<br><br>'+
            '部下：部長。来週の<ruby>出張<rt>しゅっちょう</rt></ruby>は、{どちら|どこ}に{いらっしゃいますか|行きますか}。<br><br>'+
            '部長：<ruby>京都<rt>きょうと</rt></ruby>に行く<ruby>予定<rt>よてい</rt></ruby>だよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '〈違う会社の人たちの会話〉※<ruby>田中<rt>たなか</rt></ruby>部長はB社の部長<br><br>'+
            'A社の人：田中部長は{いらっしゃいますか|いますか}。<br><br>'+
            'B社の人：{申し訳%(ありません/ございません)|もうしわけ%(ありません/ございません)|' + Genki.getAlts('{申}し{訳}{ありません}', 'もう|わけ|ございません') + 'answer;hint:すみません}。田中は、<ruby>会議<rt>かいぎ</rt></ruby>に{出ております|でております|answer;hint:出ています}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
