    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">スピーチを聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>フランス人留学生のサラが、クラスで「目上の人をほめること」についてスピーチをしています。スピーチを聞いて質問に答えなさい。</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba"><ruby>担当<rt>たんとう</rt></ruby>の　in charge</span>'+   
      '<span class="kotoba"><ruby>内容<rt>ないよう</rt></ruby>　content</span>'+   
      '<span class="kotoba"><ruby>評価<rt>ひょうか</rt></ruby>する　to evaluate</span><br>'+   
      '<span class="kotoba">その<ruby>代<rt>か</rt></ruby>わりに　instead</span>'+   
      '<span class="kotoba"><ruby>華<rt>はな</rt></ruby>やか　brilliant</span>'+   
    '</div>'+

    '<div id="static-audio">{!AUDIO|chokai_l2-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l2-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l2-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">目上の人をほめること</div>'+
        '　<span class="line">先月、大学で、ある会社のインターンシッププログラムの説明会がありました。</span>'+
        '<span class="line">説明会では<ruby>担当<rt>たんとう</rt></ruby>の<ruby>佐藤<rt>さとう</rt></ruby>さんという方が、仕事の<ruby>内容<rt>ないよう</rt></ruby>やインターンシップの申し込み方法についてわかりやすく説明してくださいました。</span>'+
        '<span class="line">最後に質問の時間があったのですが、私は質問する前に「とても上手に教えてくださってありがとうございました」とお礼を言いました。</span>'+
        '<span class="line">すると、後で大学のキャリアセンターのスタッフに「『上手』は人を<ruby>評価<rt>ひょうか</rt></ruby>する言葉だから、目上の人には使わない方がいいです。」上手だったことを伝えたい時は『佐藤さんの説明の<span class="ul-color">{!GRI|おかげで|l2-p6}</span>、とてもよくわかりました』と言いましょう」と言われてしまいました。</span><br>'+
        
        '　<span class="line">そう思ってテレビを見てみると、たとえば、料理<ruby>番組<rt>ばんぐみ</rt></ruby>で料理の先生をほめる時など、「上手」という言葉は使われていません。</span>'+
        '<span class="line">その代わりに「色がきれいで<ruby>華<rt>はな</rt></ruby>やかですね」とか「とてもおいしいです」などと言っています。</span><br>'+
        
        '　<span class="line">目上の人と話す時は敬語だけではなく言い方にも<span class="ul-color inline">{!GRI|気を<ruby>付<rt>つ</rt></ruby>け|l2-p5}</span>なければいけないので、日本語は難しいと思いました。</span>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>スピーチの<ruby>内容<rt>ないよう</rt></ruby>に<ruby>合<rt>あ</rt></ruby>うものに〇/O、合わないものに×/Xをつけなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">{!PLAY|chokai_l2-2|19} ({×|X|answer}) サラは留学説明会に行った。</div>'+
      '<div class="problem">{!PLAY|chokai_l2-2|37.5} ({〇|O|answer}) サラはお礼を言ってから質問をした。</div>'+
      '<div class="problem">{!PLAY|chokai_l2-2|51.4} ({〇|O|answer}) 「上手」を目上の人に使うのはよくない。</div>'+
      '<div class="problem">{!PLAY|chokai_l2-2|77.6} ({×|X|answer}) テレビ番組では、目上の人をほめる時に「上手」が使われる。</div>'+
      '<div class="problem">{!PLAY|chokai_l2-2|98.7} ({〇|O|answer}) 目上の人と話す時は、敬語も言い方も大切だ。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|chokai_l2-2|51.4} サラはお礼を言う時に、何と言ったほうがよかったのでしょうか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{「佐藤さんの説明のおかげで、とてもよくわかりました」と言ったほうがよかったです|「さとうさんのせつめいのおかげで、とてもよくわかりました」と言ったほうがよかったです|' + Genki.getAlts('{「}{佐藤}さんの{説明}のお{陰}で、とてもよく{分}かりました{」}と言った{方}が{良}かったです', '|さとう|せつめい|かげ|わか||ほう|よ') + 'answer;width:602}。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|chokai_l2-2|98.7} サラは日本語について、どう思っていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{日本語は難しいと思っています|にほんごはむずかしいとおもっています|' + Genki.getAlts('{日本語}は{難}しいと{思}っています', 'にほんご|むずか|おも') + 'answer;width:602}。</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('chokai_l2-2', [
      [19, 25.5],
      [26.5, 36.5],
      [37.5, 50.4],
      [51.4, 76.7],
      [77.6, 88.5],
      [89.5, 97.2],
      [98.7, 109]
    ]);
      
    // keeps the audio on-screen when the user scrolls out of view
    Genki.stickyAudio.init('static-audio');
