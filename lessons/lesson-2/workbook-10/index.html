    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|おかげ|l2-p6}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">ホストマザーが{駅まで車で送ってくれた|えきまでくるまでおくってくれた|' + Genki.getAlts('{駅}まで{車}で{送}ってくれた', 'えき|くるま|おく') + 'answer;hint:took me to the station by car}おかげで、<ruby>遅刻<rt>ちこく</rt></ruby>しなかった。</div>'+
        
        '<div class="problem">この大学に入れたおかげで、{iPS細胞の研究ができた|iPSさいぼうのけんきゅうができた|' + Genki.getAlts('iPS{細胞}の{研究}が{でき}{た}', 'さいぼう|けんきゅう|出来|ました') + 'answer;hint:I was able to do iPS cell research}。</div>'+
        
        '<div class="problem">友達が{教えてくれたおかげ|おしえてくれたおかげ|' + Genki.getAlts('{教}えてくれたお{陰}', 'おし|かげ') + 'answer;hint:thanks to (my friend) tutoring me}で、{試験でいい点を取る|しけんでいいてんをとる|' + Genki.getAlts('{試験}でいい{点}を{取}る', 'しけん|てん|と') + 'answer;hint:(I was able) to get a good score on the exam;width:320}ことができた。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '店長：<ruby>小川<rt>おがわ</rt></ruby>さん、もうけがは<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>ですか。<br><br>'+
            '小川：ええ、{おおかげさまで|thankfully|spoiler}、歩けるようになりました。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'ホストファーザー：<ruby>昨日<rt>きのう</rt></ruby>のスピーチの発表、うまくいきましたか。<br><br>'+
            '　　　　　留学生：{お父さんが手伝ってくれたおかげで|おとうさんがてつだってくれたおかげで|' + Genki.getAlts('お{父}さんが{手伝}ってくれたお{陰}で', 'とう|てつだ|かげ') + 'answer;hint:thanks to (you；father) helping me}、{賞がもらえました|しょうがもらえました|answer;hint:I received an award}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
