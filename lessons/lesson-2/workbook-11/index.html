    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ば～ほど|l2-p7}」を使って、文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">住む家は{広けれ|ひろけれ|answer;hint:spacious}ば{広い|ひろい|answer;hint:spacious}ほどいいです。</div>'+
        
        '<div class="problem">パーティーは{人が多けれ|ひとがおおけれ|' + Genki.getAlts('{人}が{多}けれ', 'ひと|おお') + 'answer;hint:more people}ば{多い|おおい|answer;hint:more}ほど楽しいです。</div>'+
        
        '<div class="problem">日本語は{話せば話すほど上手になる|はなせばはなすほどじょうずになる|' + Genki.getAlts('{話}せば{話}す{程}{上手}にな{る}', 'はな|はな|ほど|じょうず|ります') + 'answer;hint:the more you speak, the better you will become;width:340}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '店長：こちらの旅行かばんはいかがですか。<br><br>'+
            '　<ruby>客<rt>きゃく</rt></ruby>：これはちょっと……。{軽ければ軽いほどいい|かるければかるいほどいい|' + Genki.getAlts('{軽}ければ{軽}い{ほど}いい', 'かる|かる|程') + 'answer;hint:The lighter the better}んですが。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：日本の<ruby>歴史<rt>れきし</rt></ruby>はおもしろいですね。<br><br>'+
            'B：ええ。{勉強すれば%(勉強/)するほど面白くなります|べんきょうすれば%(べんきょう/)するほどおもしろくなります|' + Genki.getAlts('{勉強}すれば{勉強}する{程}{面白}くなります', 'べんきょう|べんきょう|ひど|おもしろ') + Genki.getAlts('{勉強}すればする{程}{面白}くなります', 'べんきょう|ひど|おもしろ') + 'answer;hint:The more you study, the more interesting it becomes}ね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：どうすればピアノが上手になりますか。<br><br>'+
            'B：{練習すれば%(練習/)するほど上手になります|れんしゅうすれば%(れんしゅう/ほど)するほどじょうずになります|' + Genki.getAlts('{練習}すれば{練習}する{程}{上手}になります', 'れんしゅう|れんしゅう|ほど|じょうず') + Genki.getAlts('{練習}すればする{程}{上手}になります', 'れんしゅう|ほど|じょうず') + 'answer;hint:The more you practice, the better you will become}よ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
