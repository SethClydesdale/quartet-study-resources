    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet :
      '<p class="sectionDesc"><span class="sectionNumber">3.</span>文や会話を<ruby>完成<rt>かんせい</rt></ruby>させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">病院に行ったら、医者に{けがをした手を使わないように注意された|けがをしたてをつかわないようにちゅういされた|' + Genki.getAlts('{怪我}をした{手}を{使}わないように{注意}され{た}', 'けが|て|つか|ちゅうい|ました') + 'answer;hint:advised me not to use my injured hand}。</div>'+
        
        '<div class="problem">日本に来る時、両親に{お土産を買ってくるように頼まれた|おみやげをかってくるように頼まれた|' + Genki.getAlts('お{土産}を{買}って{来}るように{頼}まれ{た}', 'みやげ|か|く|ました') + 'answer;hint:asked to go and buy a souvenir}。</div>'+
        
        '<div class="problem">{友達に宿題を手伝ってくれるようにお願いした|ともだちにしゅくだいをてつだってくれるようにおねがいした|' + Genki.getAlts('{友達}に{宿題}を{手伝}ってくれるようにお{願}いした', 'ともだち|しゅくだい|てつだ|ねが') + 'answer;hint:I asked a friend to help me with my homework}が、「<ruby>嫌<rt>いや</rt></ruby>だ」と言われてしまった。</div>'+
        
        '<div class="problem">日本人だからといって、{みんなが寿司が好き%(な/だという)わけではない|みんながすしがすき%(な/だという)わけではない|' + Genki.getAlts('みんなが{寿司}が{好}き{な}わけ{ではない}', 'すし|す|だという|じゃない') + 'answer;hint:it doesn\'t mean that everyone likes sushi;width:300}。</div>'+
        
        '<div class="problem">これから{ずっと日本に住む%(という/)わけではない|ずっとにほんにすむ%(という/)わけではない|' + Genki.getAlts('ずっと{日本}に{住}む{という}わけ{ではない}', 'にほん|す||じゃない') + 'answer;hint:it\'s not like I\'ll live in Japan forever}ので、車は買わないほうがいいんじゃないかと思う。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：どうしたんですか。今日は全然お酒を飲んでいませんね。<br><br>'+
            'B：ええ。{飲みたくない%(という/)わけではない|のみたくない%(という/)わけではない|' + Genki.getAlts('{飲}みたくない{という}わけ{ではない}', 'の||じゃない') + 'answer;hint:It\'s not that I don\'t want to drink;width:240}んですが、今日はちょっと……。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：今朝の授業、30分ぐらい<ruby>遅刻<rt>ちこく</rt></ruby>してきたよね。どうしたの。<br><br>'+
            'B：実は{出かけようとした|でかけようとした|answer;hint:just about to leave;width:140}時に、母から電話がかかってきて……。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">ルームメートは歌が苦手なので、{カラオケに行こうとしない|カラオケにいこうとしない|answer;hint:doesn\'t even bother going to karaoke;width:270}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：今度の休みに旅行したいんだけど、<ruby>北海道<rt>ほっかいどう</rt></ruby>と<ruby>沖縄<rt>おきなわ</rt></ruby>とどっちがいいと思う？<br><br>'+
            'B：雪まつりがあるから、{北海道がいいんじゃない|ほっかいどうがいいんじゃない|answer;hint:don\'t you think that Hokkaido is better;width:280}？'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">日本語を上達させるために大切なことは、{毎日、日本語を使うことなんじゃないでしょうか|まいにち、にほんごをつかうことなんじゃないでしょうか|' + Genki.getAlts('{毎日}、{日本語}を{使}うことな{んじゃない}{でしょう}か', 'まいにち|にほんご|つか|のではない|だろう') + 'answer;hint:I think that you should use Japanese every day}。</div>'+
        
        '<div class="problem"><ruby>昨日<rt>きのう</rt></ruby>、{窓を開けたまま寝た|まどをあけたままねた|' + Genki.getAlts('{窓}を{開}けたまま{寝}た', 'まど|あ|ね') + 'answer;hint:fell asleep while the window was still open;width:300}ので、<ruby>風邪<rt>かぜ</rt></ruby>をひいてしまった。</div>'+
        
        '<div class="problem">{ヒーターをつけたまま出かける|ヒーターをつけたままでかける|' + Genki.getAlts('ヒーターを{付}けたまま{出}かける', 'つ|で') + 'answer;hint:Leaving while the heater is still on;width:250}のは、<ruby>危<rt>あぶ</rt></ruby>ない。</div>'+
        
        '<div class="problem">昨日は帰って{すぐ寝てしまうほど疲れていました|すぐねてしまうほどつかれていました|' + Genki.getAlts('すぐ{寝}てしまうほど{疲}れて{い}{ました}', 'ね|つか||た') + 'answer;hint:I was so tired that I fell asleep right away;width:300}。</div>'+
        
        '<div class="problem">{漢字を練習しすぎて夢に出てくるほど|かんじをれんしゅうしすぎてゆめにでてくるほど|' + Genki.getAlts('{漢字}を{練習}し{過}ぎて{夢}に{出}て{来}るほど', 'かんじ|れんしゅう|す|ゆめ|で|く') + 'answer;hint:I practiced kanji so much that it even appeared in my dreams;width:440}です。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>田中<rt>たなか</rt></ruby>さんは<ruby>山田<rt>やまだ</rt></ruby>部長が苦手なんだって。<br><br>'+
            'B：{そんなに嫌がらない|そんなにいやがらない|answer;hint:He doesn\'t seem to dislike him that much;width:300}と思うんだけどなあ。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
