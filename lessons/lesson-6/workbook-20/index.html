    <script>Genki.generateQuiz({

      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span>下の「となりのトトロ」のストーリーを読んで、(　　)に「{!GRI|は|l6-p001}」か「{!GRI|が|l6-p001-3}」の<ruby>適当<rt>てきとう</rt></ruby>なほうを入れなさい。</p>'+
      '<div class="sub-section text-passage">'+
        '<div class="title reduced center">「となりのトトロ」</div>'+
        '　「となりのトトロ」という映画{は}小学生のサツキと4歳のメイという<ruby>姉妹<rt>しまい</rt></ruby>と<ruby>森<rt>もり</rt></ruby>のおばけ、トトロの<ruby>物語<rt>ものがたり</rt></ruby>だ。'+
        'その映画{は}サツキとメイ{が}お父さんと<ruby>都会<rt>とかい</rt></ruby>から<ruby>田舎<rt>いなか</rt></ruby>に<ruby>引<rt>ひ</rt></ruby>っ<ruby>越<rt>こ</rt></ruby>すシーンから始まる。'+
        '二人には病気のお母さんがいて、お母さんのために空気{が}きれいな田舎に住むことになったのだ。<br>'+
        
        '　引っ越してから<ruby>数日後<rt>すうじつご</rt></ruby>、メイは<ruby>庭<rt>にわ</rt></ruby>で小さいトトロ{が}歩いているのを見つける。'+
        'あれ{は}何だろうと思ったメイは小さいトトロの後ろを歩いて行く。'+
        'そこには大きな木{が}あって、大きいトトロ{が}<ruby>寝<rt>ね</rt></ruby>ていた。'+
        'メイの話を聞いてサツキもトトロに会いたがる。<br>'+
        
        '　ある日の夕方、雨{が}急に<ruby>降<rt>ふ</rt></ruby>り始めたので、二人はかさを持っていないお父さんのために、バス<ruby>停<rt>てい</rt></ruby>までかさを持って<ruby>迎<rt>むか</rt></ruby>えに行く。'+
        '二人{が}バス停で待っていると、トトロ{が}来て、<ruby>一緒<rt>いっしょ</rt></ruby>にバスを待ち始める。'+
        'お父さん{が}乗っているバス{が}来る前に、トトロ{は}ねこのバスに乗って、どこかに行ってしまう……。<br><br>'+
        
        '<div class="center">〈続きは映画で見てね！〉</div>'+
      '</div>'
    });
