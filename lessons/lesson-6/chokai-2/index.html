    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">スピーチを聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span><ruby>中国人<rt>ちゅうごくじん</rt></ruby>留学生のメイリンが、クラスで「注意する時の言い方」についてスピーチをしています。スピーチを聞いて質問に答えなさい。</p>'+
        
    '<div class="tango">'+
      '<span class="kotoba">嫌な<ruby>思<rt>おも</rt></ruby>いをする　to get offended</span>'+
      '<span class="kotoba">はっきり　clearly</span>'+
      '<span class="kotoba"><ruby>誤解<rt>ごかい</rt></ruby>　misunderstanding</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|chokai_l6-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'chokai_l6-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-chokai_l6-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section text-passage">'+ // <span class="ul-color">{!GRI||l6-p}</span>
        '<div class="title reduced center">注意する時の言い方</div>'+
        '　<span class="line">この間、日本人のルームメートに言いたいことがわからなくて、少し嫌な思いをしました。</span>'+
        '<span class="line">その日は暑かったので、私は<ruby>窓<rt>まど</rt></ruby>を開けて出かけました。</span>'+
        '<span class="line">部屋に帰った時、ルームメートに「出かける時は窓を<ruby>閉<rt>し</rt></ruby>めたほうがいい<span class="ul-color">{!GRI|んじゃない|l6-p3}</span>？」と言われたのですが、私はただのアドバイスだと思い、あまり気にしていませんでした。</span>'+
        '<span class="line">そして、次の日も暑かったので、窓を開けた<span class="ul-color">{!GRI|まま|l6-p6}</span>出かけました。</span>'+
        '<span class="line">その晩ルームメートは少し怒って「<ruby>昨日<rt>きのう</rt></ruby>、窓を閉めてから出かける<span class="ul-color">{!GRI|ように頼んだ|l6-p7}</span>のに、なんで窓を開けた<span class="ul-color">{!GRI|まま|l6-p6}</span>出かけたの？」と言いました。</span>'+
        '<span class="line">ルームメートの「閉めたほうがいい<span class="ul-color">{!GRI|んじゃない|l6-p3}</span>？」というのは「閉めて」という注意の意味だったのです。</span><br>'+
        
        '　<span class="line">考えてみると、家に帰ってきたらルームメートに「また窓が開いていたよ」と言われたことが前に何度かありました。</span>'+
        '<span class="line">これも「閉めて」という意味だったのでしょうか。</span><br>'+
        
        '　<span class="line">注意する時は少し言いにくくても、はっきり言ってくれたほうが<ruby>誤解<rt>ごかい</rt></ruby>がなくて、お<ruby>互<rt>たが</rt></ruby>いに気持ちよく過ごせると思います。</span>'+
        '<span class="line">みなさんだったら、ルームメートにどのように注意しますか。</span>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>スピーチの<ruby>内容<rt>ないよう</rt></ruby>に<ruby>合<rt>あ</rt></ruby>うものに〇/O、合わないものに×/Xをつけなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">{!PLAY|chokai_l6-2|28.2} ({×|X|answer}) メイリンは、暑い日に<ruby>窓<rt>まど</rt></ruby>を<ruby>閉<rt>し</rt></ruby>めるのを忘れて出かけてしまった。</div>'+
      '<div class="problem">{!PLAY|chokai_l6-2|34} ({〇|O|answer}) ルームメートはメイリンに、「窓を閉めたほうがいいんじゃない？」と言った。</div>'+
      '<div class="problem">{!PLAY|chokai_l6-2|34} ({×|X|answer}) ルームメートは、窓を開けたまま出かけてもいいと思っていた。</div>'+
      '<div class="problem">{!PLAY|chokai_l6-2|80} ({〇|O|answer}) ルームメートは、何回も「窓が開いていたよ」と言った。</div>'+
      '<div class="problem">{!PLAY|chokai_l6-2|96.1} ({〇|O|answer}) メイリンは、はっきり注意したほうが<ruby>誤解<rt>ごかい</rt></ruby>がなくていいと考えている。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|chokai_l6-2|80} メイリンは、ルームメートの「窓が開いていたよ」にはどんな意味があったと考えていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{「閉めて」という注意の意味があった|「しめて」というちゅういのいみがあった|' + Genki.getAlts('「{閉}めて」という{注意}の{意味}があった', 'し|ちゅうい|いみ') + 'answer}と考えています。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|chokai_l6-2|96.1} メイリンは、どうしてはっきり言ってほしいと思ていますか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{はっきり言ったほうが誤解がなくて、お互いに気持ちよく過ごせる|はっきりいったほうがごかいがなくて、おたがいにきもちよくすごせる|' + Genki.getAlts('はっきり{言}った{方}が{誤解}がなくて、お{互}いに{気持}ちよく{過}ごせる', 'い|ほう|ごかい|たが|きも|す') + 'answer}からです。</div>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('chokai_l6-2', [
      [20.9, 27.6],
      [28.2, 32.8],
      [34, 48.3],
      [50.1, 55.1],
      [56.3, 67.6],
      [69.4, 79],
      [80, 89.6],
      [91.1, 94.7],
      [96.1, 104.4],
      [105.8, 110]
    ]);

    Genki.stickyAudio.init('static-audio');
