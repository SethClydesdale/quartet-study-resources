    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">1.</span>(　　)に「{!GRI|は|l6-p001}」か「{!GRI|が|l6-p001-3}」の<ruby>適当<rt>てきとう</rt></ruby>なほうを入れなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：キムさん{は}どこにいますか。<br><br>'+
            'B：キムさん{は}あそこにいます。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：週末、ご飯を食べに行きませんか。どこ{が}いいですか。<br><br>'+
            'B：そうですね。先月行ったレストラン{が}いいです。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：駅の前に新しいレストラン{が}できましたね。<br><br>'+
            'B：そうですね。あのレストラン{は}何料理のレストランですか。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '田中：<ruby>山本<rt>やまもと</rt></ruby>さん{は}テニス{が}好きだそうですね。<br>'+
            '<span class="hidden">田中：</span>テニス部に入っているんですか。<br><br>'+
            '山本：いえ。入っていないんです。テニスを見るの{は}好きなんですが、するの{は}苦手で……。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>青山<rt>あおやま</rt></ruby>さん{が}作ったケーキはおいしいですね。<br><br>'+
            'B：えっ！このケーキ、青山さん{が}作ったんですか。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">文法について質問{が}あったので、先生のオフィスアワーに聞きに行った。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：あ、あそこに子犬{が}いますよ。<br><br>'+
            'B：本当だ。子犬{は}かわいいですね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">英語{は}少しできますが、フランス語{は}<ruby>全然<rt>ぜんぜん</rt></ruby>わかりません。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：来週、試験{が}あるのを知っていますか。<br><br>'+
            'B：えっ！知りませんでした。その試験{は}何の試験ですか。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：さっき、山本さんから電話{が}ありましたよ。<br><br>'+
            'B：そうですか。山本さん{は}何と言っていましたか。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">私の妹{は}目{が}大きくて、とてもかわいいんです。</div>'+
        
        '<div class="problem">私{が}最近、気に入っているもの{は}このペンです。</div>'+
        
        '<div class="problem">母{は}私{が}病気になると、いつもスープを作ってくれます。</div>'+
        
        '<div class="problem">明日、<ruby>友達<rt>ともだち</rt></ruby>{が}家に<ruby>遊<rt>あそ</rt></ruby>びに来るので、友達{が}好きなお<ruby>菓子<rt>かし</rt></ruby>を買っておこうと思います。</div>'+
        
        '<div class="problem">私{が}初めて<ruby>飛行機<rt>ひこうき</rt></ruby>に乗ったの{は}小学生の時です。</div>'+
      '</div>'
    });
