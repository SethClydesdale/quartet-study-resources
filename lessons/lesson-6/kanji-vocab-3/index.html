    <script>Genki.generateQuiz({

      quizlet : {
        "抵抗感|ていこうかん": "reluctance; resistance|若者は変化や新しいものに<strong class='main-color'><ruby>抵抗感<rt>ていこうかん</rt></ruby></strong>がない。", // 抵、抗
        "羞恥心|しゅうちしん": "sense of shame", // 恥
        "恥ずかしい|はずかしい": "to be shy; to feel embarrassed|<strong class='main-color'><ruby>恥<rt>はず</rt></ruby>ずかしい</strong>時、私の顔は赤くなる。",
        "周囲|しゅうい": "circumference; environment; surroundings|その家は<strong class='main-color'><ruby>周囲<rt>しゅうい</rt></ruby></strong>を森に囲まれていた。", // 周
        "周り|まわり": "surroundings; surrounding people|<ruby>祖母<rt>そぼ</rt></ruby>が住んでいる家の<strong class='main-color'><ruby>周<rt>まわ</rt></ruby>り</strong>には何もない。",
        "失敗|しっぱい": "failure|<strong class='main-color'><ruby>失敗<rt>しっぱい</rt></ruby>して</strong>も、<ruby>諦<rt>あきら</rt></ruby>めないで続けるつもりだ。", // 失
        "失う|うしなう": "to lose|彼は家族を<strong class='main-color'><ruby>失<rt>うしな</rt></ruby></strong>う苦しみを味わった。",
        "敗れる|やぶれる": "to be defeated| 私のチームは1回戦で<strong class='main-color'><ruby>敗<rt>やぶ</rt></ruby>れた</strong>。", // 敗
        "恐怖|きょうふ": "fear|暗闇に取り残され彼女は<strong class='main-color'><ruby>恐怖<rt>きょうふ</rt></ruby></strong>に襲われた。", // 恐
        "恐れる|おそれる": "to be afraid of; to fear|間違えることを<strong class='main-color'><ruby>恐<rt>おそ</rt></ruby>れて</strong>はいけない。",
        "活躍|かつやく": "playing an active part|この会社では65歳以上の人も<strong class='main-color'><ruby>活躍<rt>かつやく</rt></ruby>して</strong>いる。", // 躍
        "躍る|おどる": "to leap; to hop",
        "可能性|かのうせい": "possibility|今度の台風は日本に来る<strong class='main-color'><ruby>可能性<rt>かのうせい</rt></ruby></strong>が高い。", // 可
        "許可|きょか": "permission|大学の<ruby>国際交流課<rt>こくさいこうりゅうか</rt></ruby>から<strong class='main-color'><ruby>許可<rt>きょか</rt></ruby></strong>がもらえます。",
        "能力|のうりょく": "ability|驚異的な身体<strong class='main-color'><ruby>能力<rt>のうりょく</rt></ruby></strong>を持つ少女、フィー・クラウゼル。", // 能
        "述語|じゅつご": "predicate|意味を強調するため<ruby>主語<rt>しゅご</rt></ruby>と<strong class='main-color'><ruby>述語<rt>じゅつご</rt></ruby></strong>を倒置した。", // 述
        "述べる|のべる": "to state; to express|スーパーの24時間<ruby>営業<rt>えいぎょう</rt></ruby>について、意見を<strong class='main-color'><ruby>述<rt>の</rt></ruby>べて</strong>ください。",
        "影響|えいきょう": "influence|私<span class='ul-color'>に</span>最も<strong class='main-color'><ruby>影響<rt>えいきょう</rt></ruby></strong>を<ruby>与<rt>あた</rt></ruby>えたのは、中学の時の先生です。", // 影
        "影|かげ": "shadow|三人の<strong class='main-color'><ruby>影<rt>かげ</rt></ruby></strong>が見えた。",
        "響く|ひびく": "to sound; to be echoed|そんな絶叫が、紅く染まった空にいつまでも、いつまでも<strong class='main-color'><ruby>響<rt>ひび</rt></ruby>く</strong>のだった。",  // 響
        "混乱|こんらん": "confusion|<ruby>頭<rt>あたま</rt></ruby>が<strong class='main-color'><ruby>混乱<rt>こんらん</rt></ruby>して</strong>いて、何も考えられません。", // 混
        "混じる|まじる": "to become mixed|電話の声に雑音が<strong class='main-color'><ruby>混<rt>ま</rt></ruby>じって</strong>いた。",
        "内乱|ないらん": "civil war" // 乱
