    <script>Genki.generateQuiz({

            '<td class="problem"><span style="font-size:30px;">調</span></td>'+
            '<td>'+
              '<div class="split-problem">'+

            '</td>'+
            '<td>'+
              '<div class="split-problem">'+
                '{調査|investigation}<hr class="dashed">'+
                '({ちょうさ})'+
              '</div>'+
            '</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem"><span style="font-size:30px;">話</span></td>'+
            '<td>'+
              '<div class="split-problem">'+

            '</td>'+
            '<td>'+
              '<div class="split-problem">'+
                '{会話|conversation}<hr class="dashed">'+
                '({かいわ})'+

            '</td>'+
          '</tr>'+

            '<td class="problem"><span style="font-size:30px;">談</span></td>'+
            '<td>'+
              '<div class="split-problem">'+

              '</div>'+

            '<td>'+
              '<div class="split-problem">'+
                '{座談会|round-table discussion}<hr class="dashed">'+
                '({ざだんかい})'+
              '</div>'+
            '</td>'+
          '</tr>'+

          '<tr>'+
            '<td class="problem"><span style="font-size:30px;">訳</span></td>'+
            '<td>'+

            '<div class="problem">({かし||width:100})</div>'+
            '<div class="problem">({ごかい||width:100})</div>'+
          '</div>'+
        '</div>'+
        
        '<div class="columns-2 clear">'+

        '</div>'+

          '<div>'+
            '<div class="problem">({けいさつ||width:100})</div>'+
