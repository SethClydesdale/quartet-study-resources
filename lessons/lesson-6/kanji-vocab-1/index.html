        "投書|とうしょ": "writing to a newspaper|いつか日本の新聞に<strong class='main-color'><ruby>投書<rt>とうしょ</rt></ruby>したい</strong>。", // 投
        "投げる|なげる": "to throw|彼はボールを<strong class='main-color'><ruby>投<rt>な</rt></ruby>げた</strong>。",
        "包装|ほうそう": "packaging; wrapping|友達からのプレゼントはいつもきれいに<strong class='main-color'><ruby>包装<rt>ほうそう</rt></ruby>されて</strong>いる。", // 包
        "包装紙|ほうそうし": "wrapping paper|その<strong class='main-color'><ruby>包装紙<rt>ほうそうし</rt></ruby></strong>、一枚余ってない。",
        "包む|つつむ": "to wrap|肉をレタスで<strong class='main-color'><ruby>包<rt>つつ</rt></ruby>んで</strong>食べるとおいしい。",
        "雑誌|ざっし": "magazine|本屋で<strong class='main-color'><ruby>雑誌<rt>ざっし</rt></ruby></strong>を買いました。", // 雑、誌
        "資源|しげん": "resource|紙は大切な<strong class='main-color'><ruby>資源<rt>しげん</rt></ruby></strong>だから、リサイクルしましょう。", // 資
        "資源ゴミ|しげんごみ": "recyclable waste",
        "資料|しりょう": "materials; data; document|これは会議の<strong class='main-color'><ruby>資料<rt>しりょう</rt></ruby></strong>です。",
        "源|みなもと": "source|イチゴはすばらしいビタミンＣの<strong class='main-color'><ruby>源<rt>みなもと</rt></ruby></strong>です。", // 源

        "燃える|もえる": "to burn|山火事で近所の家<span class='ul-color'>が</span><strong class='main-color'><ruby>燃<rt>も</rt></ruby>えて</strong>しまった。",
        "燃えるゴミ|もえるごみ": "burnable waste",
        "結局|けっきょく": "after all; eventually|スーパーに行ったが、<strong class='main-color'><ruby>結局<rt>けっきょく</rt></ruby></strong>何も買わなかった。", // 局
        "郵便局|ゆうびんきょく": "post office|<strong class='main-color'><ruby>郵便局<rt>ゆうびんきょく</rt></ruby></strong>で荷物を送ります。",
        "商品|しょうひん": "merchandise; product|今は様々な<strong class='main-color'><ruby>商品<rt>しょうひん</rt></ruby></strong>がインターネットで買える時代だ。", // 商
        "商業|しょうぎょう": "commerce|この地方は<strong class='main-color'><ruby>商業<rt>しょうぎょう</rt></ruby></strong>の町だ。",
        "袋|ふくろ": "bag|この<strong class='main-color'><ruby>袋<rt>ふくろ</rt></ruby></strong>は小さすぎて、買った本が全部は入らない。", // 袋
        "紙袋|かみぶくろ": "paper bag|レジ係はあなたが買ったものをビニール袋に入れています。「すみません、<strong class='main-color'><ruby>紙袋<rt>かみぶくろ</rt></ruby></strong>はありますか？」ってあなたは聞きました。。",
        "疑問|ぎもん": "doubt; question|自分で考えて<strong class='main-color'><ruby>疑問<rt>ぎもん</rt></ruby></strong>を持つことはとても大切だ。", // 疑
