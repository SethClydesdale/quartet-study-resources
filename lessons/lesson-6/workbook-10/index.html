    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～(よ)うとする|l6-p5}」を使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">{家に帰ろ|いえにかえろ|' + Genki.getAlts('{家}に{帰}ろ', 'いえ|かえ') + 'answer;hint:Return home}うとした時、スマホがないことに気がついた。</div>'+
        
        '<div class="problem">いつも<ruby>遅刻<rt>ちこく</rt></ruby>するので、今朝は{早く家を出ようとした|はやくいえをでようとした|' + Genki.getAlts('{早}く{家}を{出}ようとした', 'はや|いえ|で') + 'answer;hint:tried to leave home early}が、出られなかった。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ジョージって、ご両親と仲が悪いの？<br><br>'+
            'B：仲が悪いわけじゃないと思うけど……。でも、彼、{日本で就職しようとしている|にほんでしゅうしょくしようとしている|' + Genki.getAlts('{日本}で{就}職しようとして{い}る', 'にほん|しゅうしょく|') + 'answer;hint:trying to get a job in Japan}けど、ご両親に反対されているそうだよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：しようとしても、なかなかできないことはありますか。<br><br>'+
            'B：はい。{漢字を毎日少しずつ覚えようとしても|かんじをまいにち少しずつおぼえようとしても|' + Genki.getAlts('{漢字}を{毎日}{少}しずつ{覚}えようとしても', 'かんじ|まいにち|すこ|おぼ') + 'answer;hint:Even though I try to memorize kanji little by little every day;width:420}、なかなか覚えられません。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
