    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l6-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l6-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l6-2" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section vertical-text-box" style="width:auto;">'+
        '<div class="title reduced center">大学生の声</div>'+
        
        '<p class="text-passage vertical-text paragraph">'+
          '<strong class="line" style="font-size:24px;">早期英語教育に賛成？反対？</strong><br><br>'+
        
          '　<span class="line">英語でコミュニケーションができる日本人を育てようと、日本の英語教育制度が大きく変わり始めている。</span>'+
          '<span class="line">小学校での英語の授業はすでに全国的に始まっているが、今後も早期化が進むと考えられ、早期英語教育について人々の関心がますます高くなっている。</span>'+
          '<span class="line">今の大学生はこの現状をどのように考えているのだろうか。</span><br><br>'+
        '</p>'+
        '<hr class="dashed">'+ // <span class="ul-color">{!GRI||l6-p}</span>
        
        '<p class="text-passage vertical-text paragraph">'+
          '<span class="sub-title" style="margin-bottom:5px;"><strong class="line">英語は子どものうちに</strong></span><br>'+
          '　　　　<strong class="line"><ruby>北東<rt>ほくとう</rt></ruby>大学　<ruby>青山<rt>あおやま</rt></ruby>　<ruby>絵理<rt>えり</rt></ruby>　<span class="sideways">(</span><span class="horizontal">21</span><span class="sideways">)</span></strong><br>'+
        
          '　<span class="line">私は、早期英語教育に賛成だ。</span>'+
          '<span class="line">理由は三つある。</span>'+
          '<span class="line">第一に、言語の習得はある年齢を超えると難しくなるからだ。</span>'+
          '<span class="line">言語を学ぶ年齢と習得には深い関係があるとよく言われる。</span>'+
          '<span class="line">スポンジのように何でも吸収できる子どものうちに言語を学び始めれば、楽に習得できる。</span>'+
          '<span class="line">特に発音の習得に効果的だ。</span>'+
          '<span class="line">例えば、多くに日本人が苦手な英語の「L」と「R」の発音も、小さい時から学べば、よくなる<span class="ul-color">{!GRI|のではないだろうか|l6-p3}</span>。</span><br>'+
        
          '　<span class="line">第二に、子どもは英語に対する抵抗感を持たないからだ。</span>'+
          '<span class="line">小学校でゲームや歌を通して学べば、子どもは恥ずかし<span class="ul-color">{!GRI|がらず|l6-p4}</span>に英語を話すことができる。</span>'+
          '<span class="line">それに、新しく覚えた言葉をすぐに使お<span class="ul-color">{!GRI|うとする|l6-p5}</span>ので、早く慣れることもできる。</span>'+
          '<span class="line">一般的に、人は大人になればなるほど周りの目を意識し、失敗を恐れる気持ちが強くなる。</span>'+
          '<span class="line">だから、その気持ちが生まれる前に英語学習を始めることが重要だと思う。</span><br>'+
        
          '　<span class="line">第三に、国際感覚を早く身につけることができるからだ。</span>'+
          '<span class="line">子どもの時に外国語を学び、自国とは違う文化があることに気づくことで、異なる価値観を受け入れやすくなると言われている。</span>'+
          '<span class="line">小学生のうちに英語を通して外国の文化や習慣に触れ、視野を広げておけば、将来、国際的に活躍できる可能性が広がる<span class="ul-color">{!GRI|のではないか|l6-p3}</span>と思う。</span><br>'+
        
          '　<span class="line">このように、早期英語教育はメリットが多いので、積極的に進めていくべきだ。</span>'+
        '</p>'+
        '<hr class="dashed">'+ // <span class="ul-color">{!GRI||l6-p}</span>
        '<p class="text-passage vertical-text paragraph">'+
          '<span class="sub-title" style="margin-bottom:5px;"><strong class="line">子どもに英語は必要か</strong></span><br>'+
          '　　　　<strong class="line"><ruby>西川<rt>にしかわ</rt></ruby>大学　<ruby>木村<rt>きむら</rt></ruby>　<ruby>準<rt>じゅん</rt></ruby>　<span class="sideways">(</span><span class="horizontal">19</span><span class="sideways">)</span></strong><br>'+
        
          '　<span class="line">私は早期英語教育には反対だ。</span>'+
          '<span class="line">その理由を三つ述べる。</span><br>'+
        
          '　<span class="line">まず、母語である日本語の発達に悪い影響がある。</span>'+
          '<span class="line">日本語が不十分な<span class="ul-color">{!GRI|まま|l6-p6}</span>英語の勉強を始めると、どちらも正しく使えなくなってしまう可能性がある。</span>'+
          '<span class="line">自分の考えを一つの言語でうまく表現できず、混乱してしまうこともあるだろう。</span>'+
          '<span class="line">だから、英語を学ぶのは自分の考えや感情が日本語で論理的に伝えられるようになるまで待つべきな<span class="ul-color">{!GRI|のではないだろうか|l6-p3}</span>。</span><br>'+
        
          '　<span class="line">また、自分の意思で英語を学んでいる子どもは少ない。</span>'+
          '<span class="line">私の場合も子どもの時、親に英語に<ruby>塾<rt>じゅく</rt></ruby>に行く<span class="ul-color">{!GRI|ように言われ|l6-p7}</span>、いやいや勉強させられた。</span>'+
          '<span class="line">その経験<span class="ul-color">{!GRI|からいうと|l6-p2}</span>、英語を習いた<span class="ul-color">{!GRI|がって|l6-p4}</span>いない子どもに無理にやらせても、意味がない。</span>'+
          '<span class="line">英語嫌いな子どもが増えるだけだ。</span>'+
          '<span class="line">子どもが英語に興味を持ち始めるまで待ったほうがいいと思う。</span><br>'+
        
          '　<span class="line">さらに、日本では日常生活で英語が必要だ<span class="ul-color">{!GRI|というわけではない|l6-p1}</span>。</span>'+
          '<span class="line">子どもの時に英語を学んでも、ふだん使わなければ、すぐに忘れてしまうだろう。</span>'+
          '<span class="line">勉強を始めるのは、英語が本当に必要になった時でも遅くはないと思う。</span>'+
          '<span class="line">私の先輩に英語が全然話せなかった人がいたが、仕事でカナダに行くことになってから本気で勉強し始め、驚く<span class="ul-color">{!GRI|ほど|l6-p8}</span>上達した。</span>'+
          '<span class="line">この例からも、<span class="ul-color">{!GRI|わざわざ|l6-p9}</span>子どものうちに英語を学ばなくてもいいと言えるだろう。</span><br>'+
        
          '　<span class="line">以上のような理由から、私は早期英語教育は必ずしも必要ないと主張したい。</span>'+
        '</p>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    
    '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>読みのストラテジー<span class="num">10</span>(p.177)を使って答えなさい。</p>'+
     
    '<h4 class="sub-title-color"><span class="num">10</span> <ruby>列挙<rt>れっきょ</rt></ruby>の表現 <small>(Expressions for enumeration)</small> {!GRI|<button class="button"><i class="fa">&#xf02d;</i><span class="en">View in Grammar Index</span><span class="ja">文法索引で見る</span></button>|l6-p02}</h4>'+
    '<p class="sectionDesc3rd">早期英語教育について、<ruby>青山<rt>あおやま</rt></ruby>さんと<ruby>木村<rt>きむら</rt></ruby>さんはそれぞれどのような主張をしていますか。【賛成・反対】のどちらかを選びなさい。また、その理由(1)～(6)に<ruby>適当<rt>てきとう</rt></ruby>な言葉を入れなさい。</p>'+
        
    '&bull; {!PLAY|yomimono_l6-2|54.3} 青山さん……早期英語教育に【{賛成|!I賛成／反対|spacer:・}】だ。<br><br>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">{!PLAY|yomimono_l6-2|61.1} {言語の習得|げんごのしゅうとく|' + Genki.getAlts('{言語}の{習得}', 'げんご|しゅうとく') + 'answer}はある{年齢|ねんれい|answer}を超えると難しくなる。</div>'+
      '<div class="problem">{!PLAY|yomimono_l6-2|99.4} 子どもは英語に対する{抵抗感|ていこうかん|answer}を持たない。</div>'+
      '<div class="problem">{!PLAY|yomimono_l6-2|141.6} {国際感覚|こくさいかんかく|answer}を早く身につけることができる。</div>'+
    '</div>'+
        
    '&bull; {!PLAY|yomimono_l6-2|191.8} 木村さん……早期英語教育に【{反対|!I賛成／反対|spacer:・}】だ。<br><br>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">{!PLAY|yomimono_l6-2|199} 日本語の{発達|はったつ|answer}に悪い影響がある。</div>'+
      '<div class="problem">{!PLAY|yomimono_l6-2|232.5} 自分の{意思|いし|answer}で英語を学んでいる子どもは少ない。</div>'+
      '<div class="problem">{!PLAY|yomimono_l6-2|263.7} 日本では{日常生活|にちじょうせいかつ|answer}で英語が{必要だ|ひつようだ|answer}というわけではない。</div>'+
    '</div>'
    });
