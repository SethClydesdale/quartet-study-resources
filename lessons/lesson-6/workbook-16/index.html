    <script>Genki.generateQuiz({

      '<p class="sectionDesc"><span class="sectionNumber">1.</span><span class="sub-section inline nospacing">　　</span>の言葉をを使って、文や会話を完成させなさい。必要なら<ruby>形<rt>かたち</rt></ruby>を変えなさい。同じ言葉は一度しか使えません。</p>'+
      '<div class="count-problems indent-block">'+
        '<div class="sub-section inline">'+
          '　{!GRI|わざわざ|l6-p9}　　{!GRI|～からすると|l6-p2}　　{!GRI|～まま|l6-p6}　　{!GRI|～がる|l6-p4}　　{!GRI|～ほど|l6-p8}　'+
        '</div><br><br>'+
                
        '<div class="problem">目上の人に、いすに座{ったまま}あいさつするのは、失礼だ。</div>'+
        
        '<div class="problem">期末試験のことを考えると、心配で夜も<ruby>寝<rt>ね</rt></ruby>られない{ほど}だ。</div>'+
        
        '<div class="problem">授業を休んだら、友達が今日の宿題を{わざわざ}家まで待ってきてくれた。</div>'+
        
        '<div class="problem"><ruby>誕生日<rt>たんじょうび</rt></ruby>プレゼントとして、彼が読みた{がっていた}本をあげました。</div>'+
        
        '<div class="problem">この<ruby>授業<rt>じょうぎょう</rt></ruby>{からすると}、今日も帰りが遅くなりそうだ。</div>'+
      '</div>'
