    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba">もしかして　by any chance</span>'+
      '<span class="kotoba">フライパン　frying pan</span>'+
      '<span class="kotoba">シンク　kitchen sink</span><br>'+
      '<span class="kotoba"><ruby>人<rt>ひと</rt></ruby>のことは<ruby>言<rt>い</rt></ruby>えない　I am in no position to criticize</span>'+
      '<span class="kotoba"><ruby>床<rt>ゆか</rt></ruby>　floor</span><br>'+
      '<span class="kotoba">びしょびしょになる　to get water-soaked</span>'+
      '<span class="kotoba">コンビ　pair</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|kaiwa_l6-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l6-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l6-1" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">カジュアルな会話</strong>'+
        '<div class="title reduced center">寮のキッチンの使い方</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">寮でジョージ(ジ：)が<ruby>研<rt>けん</rt></ruby>(研：)に話しかける。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">ねえ、研、もしかして、今日キッチン使った？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">うん。お昼に和風パスタを作った時に使ったよ。どうして？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">実は、僕も使いたかったんだけど、汚れたお皿やフライパンがあって……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">あ、ごめん。<ruby>洗<rt>あら</rt></ruby>うの忘れてた。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">こんなこと言いたくないんだけど、研は使ったものをそのままシンクに置きっぱなしにすることが多くない？</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">あ、そうかも……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">僕も洗い物は好きじゃないから研の気持ちはわかるけど、キッチンは寮のみんなが使うところだから……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">ごめん。ジョージの言うとおりだよ。これからは気を付けるよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">うん。よろしくね。でも、僕も<ruby>窓<rt>まど</rt></ruby>をよく開けっぱなしで出かけちゃうことがあるから、人のことは言えないんだけどね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">あっ、あれってジョージだったの？この間、急に雨が降った時、<ruby>床<rt>ゆか</rt></ruby>がびしょびしょになって大変だったんだよ。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">ジ</div>'+
          '<div class="text">わあ、ごめん。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">研</div>'+
          '<div class="text">ううん。僕たち、いいコンビかもしれないね。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l6-1|15.4} <ruby>研<rt>けん</rt></ruby>は今日キッチンを使いましたか。どうして使いましたか。<br>'+
          '{はい、使いました|はい、つかいました|はい|answer;width:260}。<br><br>'+
          '{お昼に和風パスタを作りました|おひるにわふうパスタをつくりました|' + Genki.getAlts('お{昼}に{和風}パスタを{作}りました', 'ひる|わふう|つく') + 'answer;width:260}から。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l6-1|49.9} ジョージは研に、何をしてほしがっていますか。<br>'+
          '{洗い物をしてほしがっています|あらいものをしてほしがっています|answer;width:260}。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          '{!PLAY|kaiwa_l6-1|64.3} ジョージは出かける時、何を忘れますか。<br>'+
          '{窓を閉めることを忘れます|まどをしめることをわすれます|' + Genki.getAlts('{窓}を{閉}めることを{忘}れます', 'まど|し|わす') + 'answer;width:260}。'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>ジョージは<ruby>研<rt>けん</rt></ruby>に<ruby>苦情<rt>くじょう</rt></ruby>を言う時、何と言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l6-1|38.3} <strong class="main-color">苦情を言い始める時</strong><br>'+
          '<div class="example">'+
            'こんなこと{言いたくない|いいたくない|answer}んだけど、研は使ったものをそのままシンクに置きっぱなしにする{ことが多くない|ことがおおくない|answer}？'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l6-1|49.9} <strong class="main-color"><ruby>迷惑<rt>めいわく</rt></ruby>な理由を言う時</strong><br>'+
          '<div class="example">'+
            '僕も<ruby>洗<rt>あら</rt></ruby>い<ruby>物<rt>もの</rt></ruby>は好きじゃないから研の{気持ちはわかるけど|きもちはわかるけど|answer}、キッチンは寮のみんなが使うところだから……。'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<div class="box-color bg padded min-width">'+
      '<h4 class="sub-title-color" style="margin:5px 0;"><i class="fa">&#xf0eb;</i> <span class="en">Noteworthy Points</span><span class="ja">ここにも注目</span></h4>'+
      '<ul>'+
        '<li>{!GRI|～っぱなし|l6-p0001}</li>'+
      '</ul>'+
    '</div>'
    });

    Genki.chokai.highlight('kaiwa_l6-1', [

    ]);
