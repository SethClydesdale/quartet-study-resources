    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～まま|l6-p6}」を使って、文や会話を完成させなさい。1.～4.は絵を見て答えなさい。</p>'+
        
      '<div class="center" style="width:80%;margin:0 auto;">{!IMG|l6-workbook-12.png}</div><br>'+
        
      '<div class="count-problems">'+
        '<div class="problem">急いでいたので、{窓を開けた|まどをあけた|' + Genki.getAlts('{窓}を{開}けた', 'まど|あ') + 'answer;hint:(left) the window open;spoiler;width:180}まま、出かけてしまいました。</div>'+
        
        '<div class="problem">ポケットの中に{ティッシュを入れたまま|ティッシュをいれたまま|answer;hint:left <ruby>tissues<rt>ティッシュ</rt></ruby> in;spoiler}、<ruby>洗濯<rt>せんたく</rt></ruby>してしまいました。</div>'+
        
        '<div class="problem"><ruby>酔<rt>よ</rt></ruby>っぱらっていたので、{服を着たまま|ふくをきたまま|' + Genki.getAlts('{服}を{着}たまま', 'ふく|き') + 'answer;hint:while still wearing clothes;spoiler;width:200}、お<ruby>風呂<rt>ふろ</rt></ruby>に入ってしまった。</div>'+
        
        '<div class="problem">席がなかったので、{立ったまま、話を聞きました|たったまま、はなしをききました|' + Genki.getAlts('{立}ったまま、{話}を{聞}{きました}', 'た|はなし|き|いた') + Genki.getAlts('{立}ったまま、スピーチを{聞}{きました}', 'た|き|いた') + 'answer;hint:listened to the speech while standing;spoiler;width:280}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>昨日<rt>きのう</rt></ruby>は疲れていたので、{電気をつけたまま|でんきをつけたまま|answer;hint:left the light on}寝てしまったんです。<br><br>'+
            'B：それ、私もよくやります。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：20年ぶりに<ruby>田中<rt>たなか</rt></ruby>さんに会ったそうですね。田中さんは元気でしたか。<br><br>'+
            'B：はい。{20年前のまま|20ねんまえのまま|answer;hint:(You\'re) the same as 20 years ago;width:250}で驚きました。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：このままではだめだと思うことは何ですか。<br><br>'+
            'B：日本の包装のサービスは、{このままではよくない|このままでは良くない|answer;hint:not good (if it\'s) left as it is;width:200}と思います。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
