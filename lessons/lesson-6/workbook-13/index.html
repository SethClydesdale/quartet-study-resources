    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>会話を読んで、その内容を説明する文を完成させなさい。(　　)に<ruby>助詞<rt>じょし</rt></ruby>を入れなさい。{!GRI|<button class="button small-button"><i class="fa">&#xf02d;</i><span class="en">View「～ように言う」in Grammar Index</span><span class="ja">文法索引で「～ように言う」を見る</span></button>|l6-p7}</p>'+
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　私：<ruby>迎<rt>むか</rt></ruby>えに行くから、駅に着いたら、電話してね。<br><br>'+
            'サラ：うん。ありがとう。<br><br>'+
            '<i class="fa">&#xf061;</i> 私はサラ({に})駅に着いたら{電話する|でんわする|answer}ように言{った}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '　私：先生、作文を直してくださいませんか。<br><br>'+
            '先生：いいですよ。<br><br>'+
            '<i class="fa">&#xf061;</i> 私は先生({に})作文を{直してくれる|なおしてくれる|answer}ようにお願い{した}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '先生：宿題を忘れないでください。<br><br>'+
            '　私：すみません。<br><br>'+
            '<i class="fa">&#xf061;</i> 私は先生({に})宿題を{忘れない|わすれない|answer}ように注意{された}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '田中：ちょっと英語を教えてくれない。<br><br>'+
            '　私：いいよ。<br><br>'+
            '<i class="fa">&#xf061;</i> 私は田中さん({に})英語を{教える|おしえる|answer}ように頼{まれた}。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
    </script>
