    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Read the section below and then answer the questions.</span><span class="ja">次の読み物を読んで質問に答えなさい。</span>',
      
    quizlet : 
    '<div id="static-audio">{!AUDIO|yomimono_l6-1}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'yomimono_l6-1\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-yomimono_l6-1" class="chokai-script noclear" style="display:none;">'+
      '<div class="sub-section vertical-text-box" style="width:auto;">'+
        '<div class="title reduced center">投書文を読む</div>'+
        
        '<p class="text-passage vertical-text paragraph">'+
          '<span class="sub-title" style="margin-bottom:5px;"><strong class="line">あの包装は本当に必要ですか</strong></span><br>'+
          '<strong class="line">留学生ジョージ・テイラー<span class="sideways">(</span>愛知県<span class="horizontal">21</span><span class="sideways">)</span></strong><br><br>'+
        
          '　<span class="line">来日してまず感じたことは、環境のことを考えている日本人が多いということです。</span>'+
          '<span class="line">例えば、駅のゴミ箱はペットボトルや新聞・雑誌などのリサイクルできる「資源ゴミ」と「燃えるゴミ」に分かれていて、きちんと分別しなければいけません。</span><br>'+
        
          '　<span class="line">しかし、最近気になることがあります。</span>'+
          '<span class="line">それは、<ruby>過剰<rt>かじょう</rt></ruby>な包装です。</span>'+
          '<span class="line">例えば、箱に入ったクッキーを買ったら、その箱が紙で包まれていただけではなく、中のクッキーも一枚ずつビニールで包装されていました。</span>'+
          '<span class="line">確かに一つ一つ袋に入っていれば箱から取る時に手が汚れないし、すぐに全部食べなくてもいいので便利です。</span>'+
          '<span class="line">しかし、ゴミは確実に増えます。</span>'+
          '<span class="line">それに、箱の包装紙も、後で使えない<span class="ul-color">{!GRI|わけではない|l6-p1}</span>ですが、結局捨てる人が多いので、資源の無駄です。</span><br>'+
        
          '　<span class="line">また、商品の包装だけではなく、お店の袋についても疑問を感じます。</span>'+
          '<span class="line">先日、雨の日にデパートで買い物をした時、雨に濡れないようにいつもの紙袋の上にビニールを丁寧にかけてくれたのには驚きました。</span>'+
          '<span class="line">客に対するこのような気遣いはとても日本らしいと思いますが、私のような外国人の目<span class="ul-color">{!GRI|からみると|l6-p2}</span>ちょっとやりすぎ<span class="ul-color">{!GRI|ではないか|l6-p3}</span>と感じてしまいます。</span><br>'+
        
          '　<span class="line">本当に環境のことを考えるなら、日本人は過剰包装について考え直すべきな<span class="ul-color">{!GRI|のではないでしょうか|l6-p3}</span>。</span>'+
        '</p>'+
        /*'<hr class="dashed">'+ // <span class="ul-color">{!GRI||l6-p}</span>
        '<p class="text-passage vertical-text paragraph">'+

        '</p>'+*/
      '</div>'+
    '</div>'+
    '<br>'+
        
    
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>{!PLAY|yomimono_l6-1|19.4} 「来日してまず感じたことは」<small>(行3)</small>とありますが、「感じた」の主語はだれですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{筆者|!I一般的な日本人／一般的な外国人／筆者|spacer:alpha}</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>{!PLAY|yomimono_l6-1|27.6} 「きちんと分別しなければいけません」<small>(行8～9)</small>とありますが、1.何を、2.どのように分別するのですか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">{ゴミ|ごみ|answer}を</div>'+
      '<div class="problem">{資源ゴミ|しげんゴミ|' + Genki.getAlts('{資源}{ゴミ}', 'しげん|ごみ') + 'answer}と{燃えるゴミ|もえるゴミ|' + Genki.getAlts('{燃}える{ゴミ}', 'も|ごみ') + 'answer}に分別する。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">3.</span>{!PLAY|yomimono_l6-1|49.1} 「中のクッキーも」<small>(行14)</small>とありますが、「中」とは何の中のことですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{箱|はこ|answer}の中のことです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">4.</span>{!PLAY|yomimono_l6-1|62.9} 本文によると、クッキーの包装のいい点は何ですか。2つ書きなさい。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">箱から{取る時に手が汚れない|とるときにてがよごれない|' + Genki.getAlts('{取}る{時}に{手}が{汚}れない', 'と|とき|て|よご') + 'answer}ことです。</div>'+
      '<div class="problem">すぐに{全部食べなくてもいい|ぜんぶたべなくてもいい|' + Genki.getAlts('{全部}{食}べなくてもいい', 'ぜんぶ|た') + 'answer}ことです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">5.</span>{!PLAY|yomimono_l6-1|93.5} ジョージはお店の袋のどんな点について疑問に思いましたか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{雨に濡れないようにいつもの紙袋の上にビニールを丁寧にかけてくれた|あめにぬれないようにいつものかみぶくろのうえにビニールをていねいにかけてくれた|' + Genki.getAlts('{雨}に{濡}れないようにいつもの{紙袋}の{上}にビニールを{丁寧}にかけてくれた', 'あめ|ぬ|かみぶくろ|うえ|ていねい') + 'answer}ことです。</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">6.</span>{!PLAY|yomimono_l6-1|117.5} ジョージがこの投書文で最も伝えたいことは何ですか。</p>'+
    '<div class="indent-block">'+
      '<div class="problem">{日本人は過剰包装について考え直すべきだ|にほんじんはかじょうほうそうについてかんがえなおすべきだ|' + Genki.getAlts('{日本人}は{過剰}{包装}について{考}え{直}すべきだ', 'にほんじん|かじょう|ほうそう|かんが|なお') + 'answer}ということです</div>'+
    '</div>'
    });

    Genki.chokai.highlight('yomimono_l6-1', [

    ]);

    Genki.stickyAudio.init('static-audio');
