    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ほど|l6-p8}」を使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">昨日、好きなバンドのコンサートに行きましたが、人がたくさん来ていて、{ステージが見えない|ステージがみえない|answer;hint:couldn\'t see the stage;width:170}ほどでした。</div>'+
        
        '<div class="problem">{100円ショップでも買い物できないほどお金がない|100えんショップでもかいものできないほどおかねがない|' + Genki.getAlts('{100}{円}ショップでも{買}い{物}{出来}ないほどお{金}が{ない}', '百|えん|か|もの|でき|かね|ありません') + 'answer;hint:I\'m so <ruby>poor<rt>お金がない</rt></ruby> that I can\'t even go shopping at a 100 yen shop;width:460}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ああ、おいしかった。たくさん食べちゃった。<br><br>'+
            'B：私も。{食べすぎて、動けないほど|たべすぎて、うごけないほど|' + Genki.getAlts('{食}べ{過}ぎて、{動}けないほど', 'た|す|うご') + 'answer;hint:Ate so much that I can\'t move;width:220}だよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>富士<rt>ふじ</rt></ruby>登山はどうでしたか。<br><br>'+
            'B：{歩けなくなるほど、疲れました|あるけなくなるほど、疲れました|' + Genki.getAlts('{歩}けな{くなる}ほど、{疲}れました', 'ある|い|つか') + 'answer;hint:It was so tiring that I can\'t walk;width:240}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：<ruby>涙<rt>なみだ</rt></ruby>が出るほど<ruby>嬉<rt>うれ</rt></ruby>しかったことは何ですか。<br><br>'+
            'B：{試験に合格した時は、涙が出るほど嬉しかった|しけんにごうかくしたときは、なみだがでるほどうれしかった|' + Genki.getAlts('{試験}に{合格}した{時}は、{涙}が{出}るほど{嬉}しかった', 'しけん|ごうかく|とき|なみだ|で|うれ') + 'answer;hint:When I passed the exam, I was so happy that I could cry}です。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
