    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～ように言う|l6-p7}」などを使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">高校生の頃、よく家族に{もっと勉強するように言われました|もっとべんきょうするようにいわれました|' + Genki.getAlts('もっと{勉強}するように{言}われ{ました}', 'べんきょう|い|た') + 'answer;hint:told (me) to study more}。</div>'+
        
        '<div class="problem">先生によく{遅刻しないように注意されます|ちこくしないようにちゅういされます|' + Genki.getAlts('{遅刻}しないように{注意}され{ます}', 'ちこく|ちゅうい|る') + 'answer;hint:warns (me) not to be late}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：来学期日本に留学する友達に何かアドバイスがありますか。<br><br>'+
            'B：{ホストファミリーにお土産を持っていくのを忘れないように言いたい|ホストファミリーにおみやげをもっていくのをわすれないようにいいたい|' + Genki.getAlts('ホストファミリーにお{土産}を{持}って{行}くのを{忘}れないように{言}いたい', 'みやげ|も|い|わす|い') + 'answer;hint:I want to tell them not to forget to bring their host family a souvenir;width:500}ですね。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：病気の時、家族にどんなことを頼みますか。<br><br>'+
            'B：{家族に薬を買ってきてくれるように頼みます|かぞくにくすりをかってきてくれるようにたのみます|' + Genki.getAlts('{家族}に{薬}を{買}って{来}てくれるように{頼}みます', 'かぞく|くすり|か|き|たの') + 'answer;hint:I ask my family to go and buy medicine for me}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：先生にどんなお願いをしたいですか。<br><br>'+
            'B：{宿題を少なくしてくれるようにお願いしたい|しゅくだいをすくなくしてくれるようにおおねがい|いしたい|' + Genki.getAlts('{宿題}を{少}なくしてくれるようにお{願}い{を}したい', 'しゅくだい|すく|おねがい|') + 'answer;hint:I would like to ask (our teacher) to give us less homework;width:420}です。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
