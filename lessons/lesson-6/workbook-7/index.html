    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～(という)わけではない|l6-p1}」を使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">最近、親と話していませんが、{けんかしている|ケンカしている|喧嘩している|answer;hint:fighting}わけではありません。</div>'+
        
        '<div class="problem"><ruby>昨日<rt>きのう</rt></ruby>の試験は時間がかかりましたが、{難しかった%(という/)わけではありません|むずかしかった%(という/)わけではありません|' + Genki.getAlts('{難}しかった{という}わけ{ではありません}', 'むずか||じゃないです') + 'answer;hint:it\'s not that it was difficult}。</div>'+
        
        '<div class="problem">私はあまりゲームをしませんが、{嫌い%(な/だという)わけではありません|きらい%(な/だという)わけではありません|' + Genki.getAlts('{嫌}い{な}わけ{ではありません}', 'きら|だという|じゃないです') + 'answer;hint:it doesn\'t mean that I dislike it}。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：元気がないですね。気分が悪かったら、早く帰ったほうがいいですよ。<br><br>'+
            'B：{気分が悪い%(という/)わけではない|きぶんがわるい%(という/)わけではない|' + Genki.getAlts('{気分}が{悪}い{という}わけ{ではない}', 'きぶん|わる||じゃない') + 'answer;hint:It\'s not that I feel bad}んですが、ちょっと疲れていて……。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：今日は単語テストがないから、授業をサボろうかな。<br><br>'+
            'B：テストがないからといって、{サボってもいい%(という/)わけではない|さぼってもいい%(という/)わけではない|' + Genki.getAlts('{サボ}ってもいい{という}わけ{ではない}', 'さぼ||じゃない') + 'answer;hint:doesn\'t mean that you should skip class;width:300}よ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：よく車を運転しますか。<br><br>'+
            'B：あまりしません。{できない%(という/)わけではない|できない%(という/)わけじゃない|' + Genki.getAlts('{出来}ない{という}わけ{ではない}', 'でき||じゃない') + 'answer;hint:It\'s not that I can\'t}んですが……。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
