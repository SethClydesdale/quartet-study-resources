    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc3rd"><span class="sectionNumber3rd fa">&#xf054;</span>「{!GRI|～(の)ではない(だろう)か|l6-p3}」を使って、文や会話を完成させなさい。</p>'+
      '<div class="count-problems">'+
        '<div class="problem">人間にとって一番必要なものは{愛な|あいな|answer;hint:love}んじゃないでしょうか。</div>'+
        
        '<div class="problem">高校生は{もっと本を読む|もっとほんをよむ|' + Genki.getAlts('もっと{本}を{読}む', 'ほん|よ') + 'answer;hint:read more books}【{べきな|!Iべきな／べき|spacer:・}】のではないでしょうか。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：友達の両親の家に遊びに行く時、何か持っていったほうがいいかな？<br><br>'+
            'B：{何か食べ物を持っていったほうがいいんじゃない|なにかたべものをもっていったほうがいいんじゃない|' + Genki.getAlts('{何}か{食}べ{物}を{持}って{行}った{方}がいいんじゃない', 'なに|た|もの|も|い|ほう') + 'answer;hint:Don\'t you think that you should bring something to eat;width:400}？'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：大学生に宿題は必要だと思いますか。<br><br>'+
            'B：はい。宿題がなかったら勉強しないから、{必要%(なの/)ではないでしょうか|ひつよう%(なの/)ではないでしょうか|answer;hint:I think that it\'s necessary}。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：留学生も敬語を勉強すべきだと思いますか。<br><br>'+
            'B：はい。敬語は店や駅で使われるから、{留学生も勉強すべき%(なの/)ではないか|りゅうがくせいもべんきょうすべき%(なの/)ではないか|' + Genki.getAlts('{留学生}も{勉強}す{る}べき{なの}ではないか', 'りゅうがくせい|べんきょう||') + 'answer;hint:I think that exchange students should study (keigo), too;width:400}と思います。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：将来、コンピューターでとてもいい<ruby>翻訳<rt>ほんやく</rt></ruby>ができるようになっても、外国語を勉強すべきだと思います。<br><br>'+
            'B：いいえ。コンピューターさえあれば意味がわかるから、{勉強しなくてもいいのではないか|べんきょうしなくてもいいのではないか|answer;hint:I think that it doesn\'t matter if you study;width:300}と思います。'+
          '</div>'+
        '</div>'+
      '</div>'
    });
