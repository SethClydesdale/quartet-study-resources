    <script>Genki.generateQuiz({
      type : 'fill',
      info : Genki.lang.std_written,
      
    quizlet : 
      '<p class="sectionDesc"><span class="sectionNumber">2.</span>「{!GRI|わざわざ|l6-p9}」か「{!GRI|せっかく|l4-p3}」のどちらかを入れ、文や会話を完成させなさい。</p>'+

        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：今日は楽しかったです。ありがとうございました。<br><br>'+
            'B：こちらこそ、{わざわざ}来てくださってありがとうございました。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            '山田：このお<ruby>菓子<rt>かし</rt></ruby>、おいしいんですよ。どうぞ<ruby>遠慮<rt>えんりょ</rt></ruby>なさらないで、<ruby>召<rt>め</rt></ruby>し<ruby>上<rt>あ</rt></ruby>がってください。<br><br>'+
            '　客：それでは、{せっかく}なので、一ついただきます。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">田中さんはお<ruby>好<rt>この</rt></ruby>み<ruby>焼<rt>や</rt></ruby>きを食べに{わざわざ}<ruby>広島<rt>ひろしま</rt></ruby>まで行ったそうだ。本当にグルメな人<small>(lovers of good food)</small>だ。</div>'+
        
        '<div class="problem">'+
          '<div class="inner-problem">'+
            'A：ごめん！借りてた本を家に忘れてきちゃった。今から取りに帰るね。<br><br>'+
            'B：{わざわざ}取りに帰らなくても、明日でいいよ。'+
          '</div>'+
        '</div>'+
        
        '<div class="problem">{せっかく}の休みだったのに、台風でどこにも行けませんでした。</div>'+
      '</div>'
    });
