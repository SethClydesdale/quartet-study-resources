    <script>Genki.generateQuiz({
      type : 'fill',
      info : '<span class="en">Listen to the audio and answer the questions.</span><span class="ja">会話を聞いて質問に答えなさい。</span>',
      
    quizlet : 
    '<div class="tango">'+
      '<span class="kotoba">ゴミ<ruby>捨<rt>す</rt></ruby>て<ruby>場<rt>ば</rt></ruby>　a garbage collection site</span>'+
      '<span class="kotoba"><ruby>管理人<rt>かんりにん</rt></ruby>　caretaker for an apartment</span>'+
      '<span class="kotoba">ゴミ<ruby>収集車<rt>しゅうしゅうしゃ</rt></ruby>　garbage wagon</span><br>'+
      '<span class="kotoba">てっきり　I thought for sure</span>'+
      '<span class="kotoba"><ruby>迷惑<rt>めいわく</rt></ruby>をかける　to bother someone</span><br>'+
      '<span class="kotoba">ご<ruby>迷惑<rt>めいわく</rt></ruby>をおかけしてすみません　I\'m sorry for causing you trouble</span>'+
    '</div>'+

    '<div id="static-audio">{!AUDIO|kaiwa_l6-2}</div>'+
    '<div class="center"><button class="button" onclick="Genki.toggle.chokaiScript(\'kaiwa_l6-2\');"><span class="en">Toggle Script</span><span class="ja">スクリプトをトグルする</span></button></div>'+
    '<div id="script-kaiwa_l6-2" class="chokai-script dialogue AB clear" style="display:none;">'+
      '<div class="sub-section text-passage">'+
        '<strong class="main-color">フォーマルな会話</strong>'+
        '<div class="title reduced center">ゴミ出しのルール</div>'+
        '<div class="line">'+
          '<div class="name"></div>'+
          '<div class="text">グエン・ヴァン・タン(グ：)が寮のゴミ捨て場に行く。そこで、<ruby>管理人<rt>かんりにん</rt></ruby>(管：)に会う。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">あ、管理人さん。おはようございます。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">管</div>'+
          '<div class="text">ちょっと、グエンさん。もう9時半ですよ。ゴミは8時半までに出すことになっていますよね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">あっ、すみません。<ruby>朝寝坊<rt>あさねぼう</rt></ruby>してしまったもので、つい……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">管</div>'+
          '<div class="text">もうゴミ収集車が行ってしまったので、そのゴミは部屋に持って帰ってください。次はきちんと8時半までに出しに来てくださいね。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">すみません。これからは、このようなことがないようにします。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">管</div>'+
          '<div class="text">お願いしますね。それと……そこに入っているペットボトルのことですけど。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">あ、はい。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">管</div>'+
          '<div class="text">ちゃんと分別してくれないと<ruby>困<rt>こま</rt></ruby>ります。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">えっ、ペットボトルって燃えるゴミじゃないんですか。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">管</div>'+
          '<div class="text">ペットボトルはリサイクルできるから資源ゴミです。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">えっ、そうだったんですか。てっきり、燃えるゴミだと思っていました。すみません。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">管</div>'+
          '<div class="text">分別していないと、持っていってもらえないから……。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">グ</div>'+
          '<div class="text">ご<ruby>迷惑<rt>めいわく</rt></ruby>をおかけしてすみませんでした。これからはちゃんと分けるようにします。本当にすみませんでした。</div>'+
        '</div>'+
        '<div class="line">'+
          '<div class="name">管</div>'+
          '<div class="text">よろしくお願いしますね。</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<br>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">1.</span>会話を聞いて、下の質問に答えなさい。</p>'+
    '<div class="count-problems indent-block">'+
      '<div class="problem">'+
        '<div class="inner-problem">'+
          'グエン・ヴァン・タンはどんなことを注意されましたか。2つ答えなさい。<br>'+
          '{!PLAY|kaiwa_l6-2|19.1} {ゴミは8時半までに出す|ゴミは8じはんまでにだす|' + Genki.getAlts('ゴミは8{時}{半}までに{出}す', 'じ|はん|だ') + 'answer;width:200}ことを注意されました。<br><br>'+
          '{!PLAY|kaiwa_l6-2|49.4} {ゴミはちゃんと分別する|ゴミはちゃんとぶんべつする|answer;width:200}ことを注意されました。'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem">'+
          'グエン・ヴァン・タンはどんな言い訳<small>(excuse)</small>をしましたか。2つ答えなさい。<br>'+
          '{!PLAY|kaiwa_l6-2|27.5} {朝寝坊してしまいました|あさねぼうしてしまいました|answer;width:340}。<br><br>'+
          '{!PLAY|kaiwa_l6-2|71.3} {ペットボトルは燃えるゴミだと思っていました|ペットボトルはもえるゴミだとおもっていました|' + Genki.getAlts('ペットボトルは{燃}えるゴミだと{思}っていました', 'も|おも') + 'answer;width:340}。'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<p class="sectionDesc"><span class="sectionNumber">2.</span>グエン・ヴァン・タンは<ruby>謝<rt>あやま</rt></ruby>る時、何と言っていましたか。</p>'+
    '<div class="indent-block count-problems">'+
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l6-2|27.5} <strong class="main-color">ゴミを出す時間についてあやまって、言い訳をする時</strong><br>'+
          '<div class="example">'+
            'あっ、すみません。<ruby>朝寝坊<rt>あさねぼう</rt></ruby>{してしまったもので、つい}……。'+
          '</div>'+
        '</div>'+
      '</div>'+
        
      '<div class="problem">'+
        '<div class="inner-problem text-passage nospacing">'+
          '{!PLAY|kaiwa_l6-2|82.9} <strong class="main-color">ゴミの分別についてあやまる時</strong><br>'+
          '<div class="example">'+
            'ご<ruby>迷惑<rt>めいわく</rt></ruby>を{おかけして}すみませんでした。<br><br>'+
            'これからは{ちゃんと分けるよう|ちゃんとわけるよう|answer}にします。<br><br>'+
            '本当にすみませんでした。'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
        
    '<div class="box-color bg padded min-width">'+
      '<h4 class="sub-title-color" style="margin:5px 0;"><i class="fa">&#xf0eb;</i> <span class="en">Noteworthy Points</span><span class="ja">ここにも注目</span></h4>'+
      '<ul>'+
        '<li>{!GRI|～もので／～ものですから|l6-p0002}</li>'+
        '<li>{!GRI|つい|l6-p0003}</li>'+
        '<li>{!GRI|てっきり|l6-p0004}</li>'+
      '</ul>'+
    '</div>'
    });
    
    // time ranges for highlighting the script lines
    Genki.chokai.highlight('kaiwa_l6-2', [
      [8.6, 14.4],
      [15.4, 18.7],
      [19.1, 27],

      [44.2, 48.9],
      [49.4, 55.9],
      [56.1, 57.6], // 8
      [58.4, 61.7],
      [61.9, 66.2],
      [66.8, 71.1],
      [71.3, 77.8],
      [78.6, 82.3],
      [82.9, 90.9],
      [91.5, 95]
    ]);
    
    // keeps the audio on-screen when the user scrolls out of view
    Genki.stickyAudio.init('static-audio');
