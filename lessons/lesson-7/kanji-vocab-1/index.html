    <script>Genki.generateQuiz({
      format : 'vocab',
      type : ['multi', 'drag', 'writing', 'fill'],
      info : [Genki.lang.vocab_multi, Genki.lang.std_drag, Genki.lang.vocab_writing, Genki.lang.vocab_fill],
      
      quizlet : {
        "壁画|へきが": "fresco; mural; wall painting", // 壁
        "壁|かべ": "wall; barrier|外国で生活すると、文化の<strong class='main-color'><ruby>壁<rt>かべ</rt></ruby></strong>を感じることがある。",
        "温厚(な)|おんこう(な)": "gentle", // 厚
        "厚さ|あつさ": "thickness|あのレストランのシテーキは、<strong class='main-color'><ruby>厚<rt>あつ</rt></ruby>さ</strong>が5センチもある。",
        "濃厚(な)|のうこう(な)": "strong; thick|彼の勝利は<strong class='main-color'><ruby>濃厚<rt>のうこう</rt></ruby></strong>です。", // 濃
        "濃い|こい": "thick; dense; strong|<ruby>眠<rt>ねむ</rt></ruby>かったので、<strong class='main-color'><ruby>濃<rt>こ</rt></ruby>い</strong>コーヒーを読んだ。",
        "選択|せんたく": "choice|彼は仕事の<strong class='main-color'><ruby>選択<rt>せんたく</rt></ruby></strong>を<ruby>誤<rt>あやま</rt></ruby>った。", // 択
        "二者択一|にしゃたくいつ": "alternatively; choice between two",
        "選択肢|せんたくし": "choices|4つの<strong class='main-color'><ruby>選択肢<rt>せんたくし</rt></ruby></strong>の中から正しい答えを1つ選んだ。", // 肢
        "余裕|よゆう": "room; (emotional) leeway|彼の両親は2人とも医者なので、経済的に<strong class='main-color'><ruby>余裕<rt>よゆう</rt></ruby></strong>がある。", // 裕
        "裕福(な)|ゆうふく(な)": "wealthy; rich|とても<strong class='main-color'><ruby>裕福<rt>ゆうふく</rt></ruby>な</strong>ご両親のようだ。",
        "差|さ": "difference|今日は<ruby>東京<rt>とうきょう</rt></ruby>と<ruby>北海道<rt>ほっかいどう</rt></ruby>で15度も気温の<strong class='main-color'><ruby>差<rt>さ</rt></ruby></strong>がある。", // 差
        "差別|さべつ": "discrimination|<ruby>不当<rt>ふとう</rt></ruby>な<strong class='main-color'><ruby>差別<rt>さべつ</rt></ruby></strong>を受けた。",
        "差し上げる|さしあげる": "to give (humble)|上司に、お土産を<strong class='main-color'><ruby>差<rt>さ</rt></ruby>し<ruby>上<rt>あ</rt></ruby>げた</strong>。",
        "落書き|らくがき": "graffiti; rough sketch", // 落
        "落語|らくご": "comic story telling|家族で<strong class='main-color'><ruby>落語<rt>らくご</rt></ruby></strong>を聞きに行った。",
        "落ち込む|おちこむ": "to get depressed|友達に悪口を言われて<strong class='main-color'><ruby>落<rt>お</rt></ruby>ち<ruby>込<rt>こ</rt></ruby>んだ</strong>。",
        "落ちる|おちる": "to fall|机から本が<strong class='main-color'><ruby>落<rt>お</rt></ruby>ちた</strong>。",
        "刺激|しげき": "stimulation; excitement|そのホラー映画は子どもには<strong class='main-color'><ruby>刺激<rt>しげき</rt></ruby></strong>が強すぎる。", // 刺
        "刺す|さす": "to stab; to sting|針で指を<strong class='main-color'><ruby>刺<rt>さ</rt></ruby>した</strong>。",
        "刺身|さしみ": "sashimi|まぐろの<strong class='main-color'><ruby>刺身<rt>さしみ</rt></ruby></strong>を食べました。",
        "激しい|はげしい": "violent; extreme|<strong class='main-color'><ruby>激<rt>はげ</rt></ruby>しい</strong>雨が降っています。", // 激
        "給与|きゅうよ": "salary|<strong class='main-color'><ruby>給与<rt>きゅうよ</rt></ruby></strong>だけで仕事を決めるべきではない。", // 与
        "与える|あたえる": "to give; to provide|彼は私に大きな影響を<strong class='main-color'><ruby>与<rt>あた</rt></ruby>えて</strong>くれた人です。",
        "逆に|ぎゃくに": "on the contrary; conversely|1月の日本は冬で寒いが、<strong class='main-color'><ruby>逆<rt>ぎゃく</rt></ruby>に</strong>オーストラリアは夏で暑い。", // 逆
        "逆らう|さからう": "to oppose|運命には<strong class='main-color'><ruby>逆<rt>さか</rt></ruby>らえない</strong>よ。"
      }
